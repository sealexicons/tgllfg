# Tempo (Phase 13.I): single-binary, OTLP/gRPC ingest from alloy, ephemeral
# local block storage under /tmp (dev — no persistence volume).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal
