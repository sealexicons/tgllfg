# Grafana datasource provisioning (Phase 13.I): the three LGTM backends,
# wired by service DNS so Grafana works out of the box on first `up`.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
