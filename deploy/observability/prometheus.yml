# Prometheus (Phase 13.I): scrapes itself; receives app metrics from alloy
# via remote-write (enabled with --web.enable-remote-write-receiver in the
# compose command).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
