# data/tgl/adj_paradigms.yaml
#
# Adjective derivation cells — Phase 5g §12.1, extended by
# Phase 5h §12.1. Each cell pairs an ``affix_class`` filter (which
# root opt-ins) with a list of operations applied to the root
# citation in YAML-declared order. The analyzer
# (:mod:`tgllfg.morph.analyzer`) sets ``PREDICATIVE: YES`` and
# ``LEMMA: <root.citation>`` on every derived ADJ surface
# intrinsically; per-cell ``feats`` may extend / override.
#
# All three Phase 5h productive cells fire on the same opt-in as
# the seed Phase 5g cell — ``affix_class: ma_adj`` — so any root
# that takes ``ma-`` adjectivisation also unlocks ``pinaka-``
# superlative, ``napaka-`` intensive, and (Commit 2) ``kasing-``
# / ``sing-`` equative derivations without per-root edits.
#
# Citations: S&O 1972 §5, Kroeger 1993 ch. 4 — the analytical
# treatment of ``ma-`` adjectival derivation as distinct from
# the ``ma-`` verbal non-volitional / stative paradigm. R&B 1986
# and R&G 1981 §6 cover the Phase 5h degree-marking morphology
# (``pinaka-``, ``napaka-``, ``kasing-``, ``sing-``).

# === Phase 5g: bare ``ma-`` adjective ===================================

- affix_class: ma_adj
  operations:
    - {op: prefix, value: "ma"}
  notes: |
    Productive ma- adjective derivation. Applies to ADJ roots
    declaring ``affix_class: [ma_adj]``. Surface is plain
    concatenation: ``ma-`` + root → ``maganda`` / ``matalino`` /
    ``matanda`` / ``maliit`` / ``mataas`` / ``mabilis``. No nasal
    substitution, no reduplication, no vowel-hiatus repair —
    Tagalog ``ma-`` adjective formation is among the most
    morphologically transparent productive prefixes in the
    language.

    Distinct from the verbal ``ma-`` non-volitional / stative
    cells (paradigms.yaml AV-PFV/IPFV/CTPL with MOOD=NVOL),
    which always reduplicate (CTPL: ``magaganda``) or use
    ``na-`` for realis (``naganda``). The bare ``ma + root``
    surface is reserved for the adjectival reading.

# Phase 9.X.pre-4.4: plural ma- adjective via CV-redup. Operations:
# cv_redup on bare root first, then prefix ma. ``liit`` → ``liliit``
# → ``maliliit`` "small (plural)"; ``tanda`` → ``tatanda`` →
# ``matatanda`` "old (plural)"; ``bilis`` → ``bibilis`` →
# ``mabibilis`` "fast (plural)". S&O 1972 §3.18 documents the
# CV-redup-on-root variant alongside the singular ``ma-root``
# form for ADJ-pluralization on collective / plural subjects.
- affix_class: ma_adj
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  feats: {NUM: PL}
  notes: |
    Productive plural CV-redup ma- adjective. Same opt-in as the
    bare-``ma`` cell (``affix_class: [ma_adj]``). Surfaces on
    plural / collective subjects: ``maliliit`` ("small ones"),
    ``matatanda`` ("old ones"), ``mabibilis`` ("fast ones").
    ``NUM=PL`` feat distinguishes from singular ``maliit`` /
    ``matanda`` / ``mabilis``.

# === Phase 5h: degree-marking productive prefixes =======================
#
# The two cells below mirror the Phase 5g ``ma_adj`` cell's
# productive opt-in: every root carrying ``affix_class: [ma_adj]``
# unlocks both. Phase 5h Commit 1 lands these two; Commit 2 adds
# ``kasing-`` / ``sing-`` equative cells (same opt-in, same shape).

- affix_class: ma_adj
  operations:
    - {op: prefix, value: "ma"}
    - {op: prefix, value: "pinaka"}
  feats: {COMP_DEGREE: SUPERLATIVE}
  notes: |
    Productive pinaka- superlative. Attaches to the
    already-ma-prefixed ADJ stem: ``pinaka`` + ``ma`` + ``ganda``
    → ``pinakamaganda`` "most beautiful". Operation order matters:
    prefix ``ma`` first, then prefix ``pinaka``, mirroring the
    morphological layering — the superlative scopes over the
    adjectival stem, not over the bare root. Cited per S&O 1972
    §5 / R&B 1986. The ``COMP_DEGREE: SUPERLATIVE`` feature rides
    into every generated surface so the (eventual) ranker /
    semantic-classifier can read off the degree marking.

- affix_class: ma_adj
  operations:
    - {op: prefix, value: "napaka"}
  feats: {COMP_DEGREE: INTENSIVE, INTENSIFIER: true}
  notes: |
    Productive napaka- intensifier. Attaches to the bare ADJ
    root (no ``ma-``): ``napaka`` + ``ganda`` → ``napakaganda``
    "very beautiful". Cited per S&O 1972 §5 / R&G 1981 §6 / R&B
    1986. The "very ADJ" semantics is morphologically encoded —
    the surface composes with the existing predicative-adj
    clause rule (Phase 5g Commit 3) and the NP-internal modifier
    rules (Phase 5g Commit 2) without any new syntactic
    intensifier rule. Both ``COMP_DEGREE: INTENSIVE`` and the
    redundant ``INTENSIFIER: YES`` flag are set so downstream
    consumers can branch on either.

- affix_class: ma_adj
  operations:
    - {op: prefix, value: "kasing"}
  feats: {COMP_DEGREE: EQUATIVE}
  notes: |
    Productive kasing- equative. Attaches to the bare ADJ root:
    ``kasing`` + ``ganda`` → ``kasingganda`` "as beautiful (as)";
    ``kasing`` + ``linis`` → ``kasinglinis`` "as clean (as)".
    Modern Tagalog has no adjective-stem reduplication for
    ``kasing-``; the archaic CV-reduplicated form
    (``kasing-da-dali`` "just as easy" — S&O 1972 §5) is
    deferred to a §18 entry. The two-NP standard-of-comparison
    construction (``Kasingganda si Maria si Ana``) needs a
    separate frame analysis and lands in Phase 5h Commit 6.

- affix_class: ma_adj
  operations:
    - {op: prefix, value: "sing"}
  feats: {COMP_DEGREE: EQUATIVE}
  notes: |
    Colloquial doublet of ``kasing-``. Same productive opt-in
    (``ma_adj``); distinct surface (``sing`` + ``ganda`` →
    ``singganda``). Cited per S&O 1972 §5 as the "shortened
    equative" — sociolinguistically more frequent in spoken
    register; both forms accepted in writing.

# === Phase 8.L: magkasing- distributive equative ========================
#
# The ``magkasing-`` prefix derives a distributive-equative ADJ:
# ``magkasing-X`` "be (jointly) equally X". Sociolinguistically it
# is the plural-subject counterpart of ``kasing-`` — where
# ``kasing-X si COMPAREE ng STANDARD`` compares two distinct NPs,
# ``magkasing-X`` selects a single plural / coordinated subject
# and asserts that its members are mutually equal in the X
# dimension: ``Magkasingtaas sina Maria at Ana.`` "Maria and Ana
# are (the) same height". Cited per S&O 1972 §5 (``magkasing-``
# distributive equative), R&C 1990 ch. 5 (``Magkasingbagsik ang
# mga aso natin.`` — Wave 2 audit closure).
#
# Productive opt-in is ``affix_class: ma_adj`` — every root that
# unlocks ``kasing-`` also unlocks ``magkasing-``, mirroring the
# Phase 5h Commit 2 derivation pattern. Operations: single prefix
# ``magkasing``; surface is plain concatenation (``magkasing`` +
# ``ganda`` → ``magkasingganda``, ``magkasing`` + ``taas`` →
# ``magkasingtaas``, ``magkasing`` + ``bagsik`` → ``magkasingbagsik``).
#
# Feats: ``COMP_DEGREE=EQUATIVE`` (shared with the ``kasing-`` and
# ``sing-`` cells) plus ``DISTRIB=true`` (the joint / multi-comparee
# semantics — selectionally a downstream consumer can branch on
# DISTRIB to enforce plural-subject licensing; this cell does not
# encode the plural constraint at c-structure level). The CV-redup
# intensive ``magkakasing-`` form (``magkakasingbuti`` — S&O 1972
# §5) and the ``mag(ka)sing-`` alternant for some speakers (per
# S&O 1972 §5 footnote) are pinned for a future §18 entry.
- affix_class: ma_adj
  operations:
    - {op: prefix, value: "magkasing"}
  feats: {COMP_DEGREE: EQUATIVE, DISTRIB: true}
  notes: |
    Productive magkasing- distributive equative. Plural-subject
    counterpart of ``kasing-`` (Phase 5h Commit 2 cell). Same
    ``ma_adj`` opt-in. ``COMP_DEGREE=EQUATIVE`` shared with the
    bare ``kasing-`` cell; ``DISTRIB=true`` marks the joint /
    multi-comparee semantics for downstream selectional code.

# === Phase 8.L Commit 2: magkakasing- intensive distributive ============
#
# The ``magkakasing-`` prefix is the 3+-comparee intensive form
# of ``magkasing-`` — S&O 1972 §5 calls out that "magkasing- is
# duplicated, the vowel or the duplicating syllable being short:
# e.g., nagkakasingtalino" (i.e., the ``ka`` of ``magkasing-``
# CV-reduplicates, yielding ``magka`` + ``ka`` + ``sing-`` +
# root). Semantically: where ``magkasing-X`` asserts equal-X-ness
# of two coordinated comparees, ``magkakasing-X`` extends the
# assertion to a set of three or more comparees.
#
# Wave 3 audit hit: S&O 1972 page 249 — "Binigyan ng premyo ang
# lahat ng magkakasingbuti ng grado." "All those who had equally
# good grades were given prizes" — the predicative ADJ
# ``magkakasingbuti`` selects the set of comparees from the
# ``lahat ng ...`` floor-quantifier matrix NP.
#
# The CV-redup is internal to the prefix (``ka`` → ``kaka``), not
# to the root, so we encode the cell as a single complex-prefix
# operation rather than as ``cv_redup`` + ``magkasing`` (the
# Phase 5n.C.3 L38 ``cv_redup`` operation reduplicates the root,
# not the prefix). Surface: ``magkakasing`` + bare ADJ root.
#
# Feats: ``COMP_DEGREE=EQUATIVE`` + ``DISTRIB=true`` (shared with
# the bare ``magkasing-`` cell) plus ``INTENS=STRONG`` (parallel
# to Phase 5n.C.3 ``redup_intens_adj``'s ``INTENS=MILD``; the
# ADJ-clause INTENS-lift in ``cfg/clause.py`` carries the value
# to the matrix).
- affix_class: ma_adj
  operations:
    - {op: prefix, value: "magkakasing"}
  feats: {COMP_DEGREE: EQUATIVE, DISTRIB: true, INTENS: STRONG}
  notes: |
    Productive magkakasing- intensive distributive equative.
    3+-comparee form of ``magkasing-``. ``INTENS=STRONG`` lets
    downstream consumers branch on the magkasing- vs
    magkakasing- distinction; the lemma stays as the bare root.

# === Phase 5n.A Commit 6: naka- resultative ADJ (§18 L61) ================
#
# The ``naka-`` resultative reading is the stative-locative ADJ
# counterpart of the verbal ``naka-`` abilitative cell (paradigms.yaml
# AV ABIL PFV/IPFV/CTPL — ``nakakain`` "was able to eat",
# ``nakatira`` "was able to live", etc.). The two readings share a
# surface (``nakatira``, ``nakaupo``, ``nakahiga``, ``nakatayo``,
# ``nakatabi``) but differ in POS:
#
#   ADJ[RESULTATIVE=YES]   "be living/sitting/lying/standing/beside"
#                          (Phase 5n.A Commit 6 — this cell).
#   VERB[VOICE=AV, MOOD=ABIL, ASPECT=PFV/IPFV/CTPL]
#                          "was/is/will be able to live/sit/..."
#                          (Phase 4 §7.6 ``maka`` paradigm).
#
# Both analyses surface from the same input; the predicative-ADJ rule
# (Phase 5g Commit 3) and the predicative-V rule fire in different
# contexts, so disambiguation is structural — not a ranker tiebreak.
# Specifically: ``Nakatira siyang mag-isa sa bahay.`` "He lives alone
# in the house" exercises the ADJ reading; ``Hindi siya nakatira sa
# bahay.`` "He could not live in the house" (with abilitative
# negation) exercises the VERB reading.
#
# Stative-locative roots that take this cell (S&O 1972 §6 — the
# canonical resultative inventory): ``tira`` (live), ``upo`` (sit),
# ``higa`` (lie), ``tayo`` (stand), ``tabi`` (be beside). Each is
# already a VERB[INTR] root in verbs.yaml (with ``maka`` in its
# affix_class for the abilitative reading); Phase 5n.A Commit 6 adds
# parallel ADJ entries in adjectives.yaml under the new "Resultative
# stative-locatives" section, opting into ``naka_resultative``.
#
# Required for R&G "Ang Manok" simples #1 (``May isang mamang
# nakatira sa isang bahay sa bukid.``) and #3 (``Nakatira siyang
# mag-isa sa bahay.``) — the ``nakatira`` ADJ reading is the
# canonical use in both. The full integration parses depend on
# Commit 7 (``mama`` lex + composition).
- affix_class: naka_resultative
  operations:
    - {op: prefix, value: "naka"}
  feats: {RESULTATIVE: true}
  notes: |
    Resultative naka- adjectival reading: ``naka`` + root → stative
    locative ADJ (``nakatira`` "be living", ``nakaupo`` "be sitting",
    ``nakahiga`` "be lying", ``nakatayo`` "be standing",
    ``nakatabi`` "be beside"). Distinct from the verbal abilitative
    naka- in paradigms.yaml (which produces VERB[MOOD=ABIL] cells)
    by output category — the structural disambiguation is at
    rule-match time. PREDICATIVE=YES rides intrinsically via the
    ADJ indexer.

# === Phase 10.J.post-8.5.2: ma-X-in disposition cell ====================
#
# Dispositional / habitual / character-quality ADJ derivation from
# emotive / psych roots: ``ma-`` + ROOT + ``-in``. Output is an ADJ
# describing a person's disposition or tendency to manifest the
# root quality. Examples:
#
#   hiya  → mahiyain   "shy-tempered, easily-embarrassed"
#   takot → matakutin  "fearful, easily-frightened"
#   selos → maselosin  "jealous-tempered"
#   tampo → matampuhin "easily-offended"
#   awa   → maawain    "compassionate"
#   gulat → magulatin  "easily-startled"
#
# Distinct from the ``ma_adj`` cell (which produces scalar ``ma-X``
# without the ``-in`` suffix — ``mahiya``, ``matakot``, ``maselos``).
# The ``-in`` disposition is per-root opt-in; not all emotive roots
# admit it (informant-gated; reference: S&O 1972 §3.13 dispositional
# adjectives).
#
# Operation order: prefix ``ma`` first, then suffix ``in``. V+V hiatus
# on the suffix boundary (vowel-final root + vowel-initial suffix)
# defaults to ``-h-`` epenthesis (S&O 1972 §4.21); opted-in roots
# carrying ``sandhi_flags: [no_h_epenthesis]`` produce the direct-
# concatenated variant (``mahiyain``, not ``mahiyahin``).
#
# PAG-AARAL/sent-3 closure target: ``Ang nahihirapan ay mga taong
# mahiyain at mahina ang loob.`` "Those who find it hard are shy-
# tempered, faint-hearted people."
- affix_class: ma_X_in
  operations:
    - {op: prefix, value: "ma"}
    - {op: suffix, value: in}
  feats: {DISPOSITION: true, PREDICATIVE: true}
  notes: |
    ma-X-in disposition ADJ from emotive/psych root: ``mahiyain``
    (shy-tempered), ``matakutin`` (fearful), ``maselosin`` (jealous-
    tempered), ``maawain`` (compassionate). Per-root opt-in via
    ``affix_class: [ma_X_in]``. V+V hiatus uses ``-h-`` epenthesis
    by default; vowel-final roots that should produce direct-
    concatenated forms opt into ``sandhi_flags: [no_h_epenthesis]``.

# === Phase 5h: bare-citation indexer for non-productive ADJ roots ======
#
# Phase 5h Commit 2 adds three lexicalised, non-productive ADJ
# entries to ``adjectives.yaml``: ``pareho`` (equative-identity
# predicate, polysemous with the Phase 5f Commit 23 ``Q[DUAL=YES]``
# float-quantifier reading), ``magkapareho`` (formal equative),
# and ``magkaiba`` (contrastive). These declare ``affix_class: []``
# — they have no productive ``ma-`` / ``pinaka-`` / ``napaka-`` /
# ``kasing-`` / ``sing-`` derivation; the bare citation IS the
# adjectival surface.
#
# The indexer dispatches on ``r.affix_class``: ADJ roots with a
# non-empty list go through ``_index_adjective_paradigms`` (cells
# above); ADJ roots with an empty list go through
# ``_index_adjective_bare_root`` which indexes the citation directly
# with the root's per-root feats (``EQUATIVE``, ``COMP_DEGREE``).
# A YAML "bare cell" with ``affix_class: ""`` would NOT work — the
# legacy ``_affix_class_match`` treats an empty cell_class as a
# wildcard ("fires on any root"), so it would inappropriately
# generate bare-root surfaces for every ``ma_adj`` root too.
