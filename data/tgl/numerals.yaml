# data/tgl/numerals.yaml
#
# NUM-pos roots for the cardinal numerals 1-10. Phase 5n.C.3 Commit 3
# (§18 L31): productive ``tig_distrib`` paradigm class is the
# motivating consumer — cells in ``data/tgl/paradigms.yaml`` with
# ``base_pos: NUM`` run against these roots and produce derived
# surfaces (e.g. ``tigisa`` "one each", ``tigdalawa`` "two each").
#
# Relationship to ``particles.yaml`` NUM entries: these NUM Roots are
# the paradigm-engine inputs only — they are NOT indexed as bare
# surfaces. The bare-numeral analyses (``isa`` / ``dalawa`` / etc.)
# continue to come from the matching ``particles.yaml`` entries
# loaded as :class:`tgllfg.morph.paradigms.Particle` records. The
# duplication is intentional and minimal: it gives us NUM-as-Root
# without disturbing the established bare-NUM particle entries the
# grammar already consumes.
#
# Citations: Schachter & Otanes 1972 §4 (cardinal numerals), §5.27
# (distributive tig-).

- citation: isa
  pos: NUM
  feats: {CARDINAL: true, CARDINAL_VALUE: "1", NUM: SG}
  affix_class: [tig_distrib, approx_redup]

- citation: dalawa
