# data/tgl/nouns.yaml
#
# Tagalog seed noun lexicon (split from data/tgl/roots.yaml,
# 2026-05-04, see docs/refactor-grammar-and-roots.md). Nouns are
# inert in the morphology engine — no paradigm cells fire — but
# carry per-root features (LEMMA, optional SEM_CLASS) that the
# grammar's NP-internal-modifier rules and the multi-OBL classifier
# consult. Phase 5f added the SEM_CLASS feature on time / frequency /
# fraction / season / weekday / month / collective-numeral nouns to
# gate construction-specific NP-internal-modifier rules.
#
# Citations: Ramos & Bautista 1986 (R&B), Schachter & Otanes 1972
# (S&O). Page numbers in comments where the entry is documented.

