# data/tgl/nouns.yaml
#
# Tagalog seed noun lexicon (split from data/tgl/roots.yaml,
# 2026-05-04, see docs/refactor-grammar-and-roots.md). Nouns are
# inert in the morphology engine — no paradigm cells fire — but
# carry per-root features (LEMMA, optional SEM_CLASS) that the
# grammar's NP-internal-modifier rules and the multi-OBL classifier
# consult. Phase 5f added the SEM_CLASS feature on time / frequency /
# fraction / season / weekday / month / collective-numeral nouns to
# gate construction-specific NP-internal-modifier rules.
#
# Citations: Ramos & Bautista 1986 (R&B), Schachter & Otanes 1972
# (S&O). Page numbers in comments where the entry is documented.

# === Common nouns ========================================================
# General-purpose noun roots — household items, body parts, food,
# people, places, abstract nouns, etc. Alphabetical by citation.
# Merges the pre-reorder "Common nouns" / "Phase 4 §7.1 anchor
# nouns" / "Phase 2C bulk noun scale-up (Commit 3b)" sub-sections
# (commit-organised splits with no linguistic distinction). Per-
# root linguistic notes (Phase 5c §7.7 ipang- test fixtures, Phase
# 5c §7.6 raising fixtures, etc.) live as inline comments on the
# specific entries.

- citation: aklat
  pos: NOUN
  gloss: book
  # Native Tagalog form. Spanish-borrowed ``libro`` is an
  # interchangeable synonym (Ramos 1971 dictionary entry: "aklát n.
  # book. --syn. libró."). Both forms surface in modern usage; the
  # native form is more frequent in literary register, the borrowed
  # form in colloquial / technical register.
  synonyms: [libro]

