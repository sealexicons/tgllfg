# === Seasons (Phase 5f Commit 14) ========================================
# Two-season canonical (taginit hot/dry, tagulan rainy) plus three
# `tag-` derivatives (taglamig cold spell, tagaraw sunny period,
# taggutom hunger season). Order preserved from the pre-reorder
# layout — canonical first, derivatives after — rather than
# alphabetised, because the two-season system has a clear
# canonical-vs-derivative distinction that alphabetising would
# obscure.
#
# Hyphenation note: the canonical orthography is `tag-init`, etc.
# The current tokenizer (`\w+|\S`) splits hyphens, so the seed
# stores single-token forms (`taginit`, `tagulan`); supporting the
# hyphenated forms requires a tokenizer pre-pass and is deferred.

- citation: taginit
  pos: NOUN
  gloss: hot/dry season
  feats: {SEM_CLASS: SEASON}

- citation: tagulan
  pos: NOUN
  gloss: rainy season
  feats: {SEM_CLASS: SEASON}

- citation: taglamig
  pos: NOUN
  gloss: cold spell
  feats: {SEM_CLASS: SEASON}

- citation: tagaraw
  pos: NOUN
  gloss: sunny period
  feats: {SEM_CLASS: SEASON}

- citation: taggutom
  pos: NOUN
  gloss: hunger season
  feats: {SEM_CLASS: SEASON}


# === Collective numerals (Phase 5f Commit 18) ============================
# Measure / collective NOUNs that take a complement N — pares "pair"
# (×2), dosena "dozen" (×12), daandaan "hundreds" (×100s),
# libulibo "thousands" (×1000s). Order preserved by ascending N.

- citation: pares
  pos: NOUN
  gloss: pair
  feats: {MEASURE: "YES"}

- citation: dosena
  pos: NOUN
  gloss: dozen
  feats: {MEASURE: "YES"}

- citation: daandaan
  pos: NOUN
  gloss: hundreds
  feats: {MEASURE: "YES", COLL_VALUE: HUNDREDS}

- citation: libulibo
  pos: NOUN
  gloss: thousands
  feats: {MEASURE: "YES", COLL_VALUE: THOUSANDS}


