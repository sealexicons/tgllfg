# === Phase 5f Commit 14: seasons (Group G) ===============================
# Two-season system (canonical): ``tag-init`` (hot / dry season)
# and ``tag-ulan`` (rainy season). Plus three other ``tag-``
# compounds: ``tag-lamig`` (cold spell — colloquial),
# ``tag-araw`` (sunny period), ``tag-gutom`` (hunger season —
# figurative). All zero-derived nouns built on ``tag-`` + N. Per
# plan §11.1 Group G: lex per attested form rather than productive
# paradigm — productive ``tag-`` carries figurative / colloquial
# readings beyond pure season-naming, so a hand-authored lex is
# more conservative than a productive class.
#
# SEM_CLASS=SEASON marks them for the LMT classifier and feeds
# the Phase 5f Commit 13 temporal-frame PP rule (new SEASON
# variant added in this commit) so:
#
#   tuwing tagulan  "every rainy season"   (PERIODIC PP)
#   noong taginit   "during the dry season" (PAST PP)
#
# Hyphenation note: the canonical orthography is ``tag-init``,
# ``tag-ulan``, etc. The current tokenizer
# (``src/tgllfg/text/tokenizer.py``: ``\w+|\S``) splits hyphens
# into three tokens (``tag``, ``-``, ``init``); supporting the
# hyphenated forms requires a tokenizer pre-pass and is deferred.
# For now the seed lex stores the single-token forms
# (``taginit``, ``tagulan``, ...) which compose via the standard
# NOUN path. (R&B 1986; S&O 1972 §6.13.)
- citation: taginit
  pos: NOUN
  gloss: hot/dry season
  feats: {SEM_CLASS: SEASON}
- citation: tagulan
  pos: NOUN
  gloss: rainy season
  feats: {SEM_CLASS: SEASON}
- citation: taglamig
  pos: NOUN
  gloss: cold spell
  feats: {SEM_CLASS: SEASON}
- citation: tagaraw
  pos: NOUN
  gloss: sunny period
  feats: {SEM_CLASS: SEASON}
- citation: taggutom
  pos: NOUN
  gloss: hunger season
  feats: {SEM_CLASS: SEASON}

# === Phase 5f Commit 18: collective numerals (Group H2 item 4) =============
# Measure / collective NOUNs that take a complement N — the
# measured noun — either via a GEN-NP marker (``isang pares ng
# sapatos`` "one pair of shoes") or via the linker (``isang
# dosenang itlog`` "one dozen eggs"). The GEN form composes via
# existing rules (Phase 5f Commit 1 cardinal NP-modifier +
# Phase 4 §7.8 NP-internal possessive); the linker form needs
# a small new measure-N rule (Phase 5f Commit 18 in
# src/tgllfg/cfg/grammar.py): ``N → N[MEASURE=YES] PART[LINK]
# N``.
#
# All four entries are NOUN with ``MEASURE: "YES"``. Spanish-
# borrowed pares / dosena (S&O 1972 §4.5) and reduplicated
# native daandaan / libulibo (R&B 1986). The reduplicated
# productive form (``X-X`` = "many X-units") generalises to
# higher-order multiples in principle (``milyong-milyon``
# "millions"), but per plan §11.1 Group H item 4 we lex per
# attested form rather than introduce a productive
# ``card_redup`` morph class. Deferred.
#
# Hyphenation note: the canonical orthography for the
# reduplicated forms is ``daan-daan`` and ``libu-libo``. The
# tokenizer (``\w+|\S``) splits hyphens, so the canonical
# surfaces tokenise as 3 tokens (``daan``, ``-``, ``daan``).
# For now the seed lex stores single-token forms (``daandaan``,
# ``libulibo``) — same precedent as Phase 5f Commit 14 seasons
# (``taginit``) and Commit 16 approximators
# (``humigitkumulang``). The hyphenated form awaits a
# tokenizer pre-pass.
- citation: pares
  pos: NOUN
  gloss: pair
  feats: {MEASURE: "YES"}
- citation: dosena
  pos: NOUN
  gloss: dozen
  feats: {MEASURE: "YES"}
- citation: daandaan
  pos: NOUN
  gloss: hundreds
  feats: {MEASURE: "YES", COLL_VALUE: HUNDREDS}
- citation: libulibo
  pos: NOUN
  gloss: thousands
  feats: {MEASURE: "YES", COLL_VALUE: THOUSANDS}

