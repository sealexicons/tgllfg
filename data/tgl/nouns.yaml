# === Frequency / multiplier nouns (Phase 5f Commit 5) ====================
# `beses` / `ulit` (FREQUENCY): "times (occurrences/repetitions)".
# `doble` / `triple` (MULTIPLIER): Spanish-borrowed multipliers
# surfacing in technical / commercial register (``doble ang
# singil`` "the charge is doubled"). Alphabetical by citation.

- citation: beses
  pos: NOUN
  gloss: times (occurrences)
  feats: {SEM_CLASS: FREQUENCY}
  synonyms: [ulit]

# Spanish-borrowed multipliers — surface in technical / commercial
# register (``doble ang singil`` "the charge is doubled"). Lex-only
# in this commit; treated as NOUN with SEM_CLASS=MULTIPLIER so the
# existing NP machinery handles their distribution.
- citation: doble
  pos: NOUN
  gloss: double
  feats: {SEM_CLASS: MULTIPLIER}

- citation: triple
  pos: NOUN
  gloss: triple
  feats: {SEM_CLASS: MULTIPLIER}

- citation: ulit
  pos: NOUN
  gloss: times (repetitions)
  feats: {SEM_CLASS: FREQUENCY}
  synonyms: [beses]


