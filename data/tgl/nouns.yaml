# Phase 10.D.post-1: ``angaw`` "million" — the native primary "millions"
# form (``angaw-angaw``), per S&O 1972 p.224, which lists
# daan-daan / libu-libo / angaw-angaw as the common indefinite-large-
# number reduplications and adds that ``milyon-milyon`` "also occurs,
# but is less common than the forms listed above." Fourth member of the
# card_redup series; ends in the glide ``-aw`` (no final /o/), so no
# ``redup_o_raise`` → ``angawangaw`` (cf. ``daandaan``). Native, so no
# ``loan`` field; shares ``COLL_VALUE=MILLIONS`` with the loan ``milyon``.
- citation: angaw
  pos: NOUN
  gloss: million
  affix_class: [card_redup]
  feats: {COLL_VALUE: MILLIONS}

