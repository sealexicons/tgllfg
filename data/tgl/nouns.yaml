# === Phase 5f Commit 5: frequency / multiplier nouns =====================
# Used in periphrastic multiplicative ratios (``dalawang beses``
# "twice", ``tatlong ulit`` "three times") via the existing Phase 5f
# Commit 1 cardinal-NP-modifier rules. SEM_CLASS=FREQUENCY marks
# them for the LMT classifier. (S&O 1972 §4.5.)
- citation: beses
  pos: NOUN
  gloss: times (occurrences)
  feats: {SEM_CLASS: FREQUENCY}
  synonyms: [ulit]
- citation: ulit
  pos: NOUN
  gloss: times (repetitions)
  feats: {SEM_CLASS: FREQUENCY}
  synonyms: [beses]
# Spanish-borrowed multipliers — surface in technical / commercial
# register (``doble ang singil`` "the charge is doubled"). Lex-only
# in this commit; treated as NOUN with SEM_CLASS=MULTIPLIER so the
# existing NP machinery handles their distribution.
- citation: doble
  pos: NOUN
  gloss: double
  feats: {SEM_CLASS: MULTIPLIER}
- citation: triple
  pos: NOUN
  gloss: triple
  feats: {SEM_CLASS: MULTIPLIER}

# === Phase 5f Commit 6: percentage NOUN ==================================
# Used in percentage expressions (``dalawampung porsiyento`` "20%",
# ``singkuwentang porsiyento`` "50%") via the existing Phase 5f
# Commit 1 cardinal-NP-modifier rule. SEM_CLASS=PERCENTAGE marks
# it for the LMT classifier and downstream consumers. (R&G 1981
# dialogue corpus, prices.)
- citation: porsiyento
  pos: NOUN
  gloss: percent
  feats: {SEM_CLASS: PERCENTAGE}

# === Phase 5f Commit 8: fraction NOUNs ===================================
# Half / quarter / part lex for fractions. Compositional fractions
# (``dalawang kalahati`` "two halves", ``apat na kapat`` "four
# quarters", ``ikatlong bahagi`` "third part") compose from
# cardinals (Phase 5f Commit 1) or ordinals (Phase 5f Commit 7)
# + the new fraction NOUN via the existing cardinal-NP-modifier
# and ordinal-NP-modifier rules — no new grammar required.
#
# ``kalahati`` and ``medya`` are bidirectional synonyms (native
# vs Spanish-borrowed); both mean "half". ``medya`` is canonical
# in clock-time register (``alas-otso y medya`` "8:30") which
# Group E will exercise. ``kapat`` "quarter" coexists with the
# existing NOUN ``kuwarto`` (currently glossed as "room"; in
# clock-time context ``kuwarto`` also means "quarter of the
# hour" — the polysemy is left to context, not lex). ``bahagi``
# "part" is the head N for the productive ``[ORDINAL]ng bahagi``
# fraction pattern (S&O 1972 §4.4).
- citation: kalahati
  pos: NOUN
  gloss: half
  feats: {SEM_CLASS: FRACTION}
  synonyms: [medya]
- citation: kapat
  pos: NOUN
  gloss: quarter
  feats: {SEM_CLASS: FRACTION}
- citation: medya
  pos: NOUN
  gloss: half (Spanish-borrowed; canonical in clock-time register)
  feats: {SEM_CLASS: FRACTION}
  synonyms: [kalahati]
- citation: bahagi
  pos: NOUN
  gloss: part
  feats: {SEM_CLASS: PART}

# === Phase 5f Commit 10: clock-time NOUNs (Group E item 1) ===============
# Spanish-borrowed clock-time terms 1-12. ``ala-`` (vowel-initial,
# only ``una`` for 1 o'clock) vs ``alas-`` (everything else).
# Single-token forms — the standard hyphenated orthography
# (``ala-una`` / ``alas-dos`` / etc.) requires a tokenizer pre-pass
# (the tokenizer splits hyphens), deferred follow-on. Multi-token
# variants (``ala una`` / ``alas dos``) are non-standard.
#
# SEM_CLASS=TIME marks them for the LMT classifier and downstream
# consumers (sa-NP routing, future temporal-frame ADJUNCT slot).
# TIME_VALUE records the hour (1-12). Used as:
#
# * DAT-NP for time adjunct: ``Pumunta ako sa alasotso.``
#   "I went at 8 o'clock." (sa-NP via existing rules.)
# * Bare-NP for time-stating: ``Alasotso na.`` "It's 8 o'clock
#   now." (verbless, with adv enclitic.)
# * Compositional with minute (``alasotso y medya`` 8:30,
#   ``alasotso menos singko`` 7:55) — minute composition is a
#   deferred follow-on.
# * With time-of-day modifier (``alasotso ng umaga`` "8 in the
#   morning") — time-of-day modifiers are a separate follow-on.
# (R&G 1981; S&O 1972 §6.13.)
- citation: alauna
  pos: NOUN
  gloss: one o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "1"}
- citation: alasdos
  pos: NOUN
  gloss: two o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "2"}
- citation: alastres
  pos: NOUN
  gloss: three o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "3"}
- citation: alaskuwatro
  pos: NOUN
  gloss: four o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "4"}
- citation: alassingko
  pos: NOUN
  gloss: five o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "5"}
- citation: alassais
  pos: NOUN
  gloss: six o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "6"}
- citation: alassiyete
  pos: NOUN
  gloss: seven o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "7"}
- citation: alasotso
  pos: NOUN
  gloss: eight o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "8"}
- citation: alasnuwebe
  pos: NOUN
  gloss: nine o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "9"}
- citation: alasdies
  pos: NOUN
  gloss: ten o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "10"}
- citation: alasonse
  pos: NOUN
  gloss: eleven o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "11"}
- citation: alasdose
  pos: NOUN
  gloss: twelve o'clock
  feats: {SEM_CLASS: TIME, TIME_VALUE: "12"}

# === Phase 5f Commit 11: time-of-day NOUNs (Group E item 2) ==============
# Time-of-day terms that serve as the head of GEN-NP time-of-day
# modifiers (``alasotso ng umaga`` "8 in the morning") via the
# existing Phase 4 §7.8 NP-internal possessive rule, and as the
# head of DAT-NP time adjuncts (``Pumunta ako sa umaga`` "I went
# in the morning") via the existing intransitive ADJUNCT routing.
# No new grammar required.
#
# ``gabi`` (night) already exists as a plain NOUN; not modified
# here to keep the diff focused — its plain-NOUN form already
# composes via existing rules. ``madaling-araw`` (dawn) is
# hyphenated and would need a tokenizer pre-pass; deferred.
# ``araw`` (day / sun) already exists as NOUN.
- citation: umaga
  pos: NOUN
  gloss: morning
  feats: {SEM_CLASS: TIME}
- citation: tanghali
  pos: NOUN
  gloss: noon / midday
  feats: {SEM_CLASS: TIME}
- citation: hapon
  pos: NOUN
  gloss: afternoon
  feats: {SEM_CLASS: TIME}

