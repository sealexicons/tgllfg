# === Seasons (Phase 5f Commit 14, migrated to productive paradigm
# 2026-05-10 in Phase 5n.C.3 Commit 4) =====================================
# The 5 hand-coded ``tag*`` season NOUN entries that previously
# lived here have been replaced with productive derivation via the
# ``tag_season`` paradigm cell (``data/tgl/paradigms.yaml`` —
# ``base_pos: NOUN, prefix tag, feats: {SEM_CLASS: SEASON}``).
# The base NOUN roots ``araw`` / ``gutom`` / ``ulan`` /
# ``init`` / ``lamig`` carry ``affix_class: [tag_season]`` to
# trigger the cell. ``init`` and ``lamig`` are added as NOUN
# roots below — they previously existed only as ADJ roots
# (producing ``mainit`` / ``malamig``). Their NOUN-pos
# counterparts are conventional nominalizations ("heat" /
# "cold") and don't conflict with the existing ADJ paradigm.
#
# Closes §18 L31 partial; addresses Phase 5f Commit 14's
# productive-paradigm deferral.

- citation: init
  pos: NOUN
  gloss: heat
  affix_class: [tag_season]

- citation: lamig
  pos: NOUN
  gloss: cold
  affix_class: [tag_season]


# === Collective numerals (Phase 5f Commit 18) ============================
# Measure / collective NOUNs that take a complement N — pares "pair"
# (×2), dosena "dozen" (×12), daandaan "hundreds" (×100s),
# libulibo "thousands" (×1000s). Order preserved by ascending N.

- citation: pares
  pos: NOUN
  gloss: pair
  feats: {MEASURE: "YES"}

- citation: dosena
  pos: NOUN
  gloss: dozen
  feats: {MEASURE: "YES"}

# Phase 5n.C.3 Commit 2 (§18 L31): replaced the hand-coded
# ``daandaan`` / ``libulibo`` entries with productive ``card_redup``
# paradigm cells. The base NOUN roots below carry COLL_VALUE
# (per-root, not productive) + ``affix_class: [card_redup]`` so
# the paradigms.yaml cell fires. ``libo`` and ``daan`` as
# cardinal-base NOUNs are distinct from the verb ``daan`` "pass
# through" (verbs.yaml line 290) — the polysemous-noun index
# resolves the cardinal vs verb sense at parse time.
- citation: daan
  pos: NOUN
  gloss: hundred
  feats: {COLL_VALUE: HUNDREDS}
  affix_class: [card_redup]

- citation: libo
