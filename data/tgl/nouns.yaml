# 9.X.c18: agent-N derivations. ``magsasaka`` and ``mag-aaral`` are
# productive mag-CV-redup-N "doer of X" nominals (parallel to
# magulang "parent"). The morph analyzer also produces V[VOICE=AV,
# ASPECT=IPFV] readings of these surfaces (from mag-paradigm of
