# === Phase 5e Commit 3: prepositions (PREP) ==============================
# Compound prepositions that head a PP with a sa-NP complement
# (PP → PREP NP[CASE=DAT]). Common Tagalog PPs: ``para sa X`` "for X",
# ``tungkol sa X`` "about X", ``mula sa X`` "from X", ``dahil sa X``
# "because of X". The PREP word itself contributes a PREP_TYPE feature
# that marks the semantic role the PP plays as a sentential modifier.
- surface: para
