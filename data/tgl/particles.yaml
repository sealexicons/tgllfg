# data/tgl/particles.yaml
#
# Closed-class function words: case markers, demonstratives,
# polarity, the standalone linker, and the second-position
# adverbial enclitic cluster. The bound `-ng` linker enclitic isn't
# represented here because it requires orthographic detection at
# tokenization time; that lives with §7.3 clitic-placement work in
# Phase 4.
#
# Conventions:
#   HUMAN     — distinguishes the personal-name series (si/ni/kay)
#               from the common-noun series (ang/ng/sa).
#   DEIXIS    — PROX (this), MED (that-near), DIST (that-far).
#   is_clitic — surfaces in the second-position (Wackernagel) cluster.

# === Common-noun case markers ============================================
- surface: ang
  pos: DET
  feats: {CASE: NOM, MARKER: ANG}
- surface: ng
  pos: ADP
  feats: {CASE: GEN, MARKER: NG}
- surface: sa
  pos: ADP
  feats: {CASE: DAT, MARKER: SA}

# === Personal-name case markers ==========================================
- surface: si
  pos: DET
  feats: {CASE: NOM, MARKER: SI, HUMAN: true}
- surface: ni
  pos: ADP
  feats: {CASE: GEN, MARKER: NI, HUMAN: true}
# Phase 8.V: focus-negation ``ni`` "not even" (S&O 1972 §7.20 — "Ni X
# ay hindi Y" focus-negation). Distinct morpheme from the GEN proper-
# name marker ``ni`` above. The two readings disambiguate at clause
# level: GEN proper-name ``ni`` admits a following bare proper-name
# NOUN; focus-negation ``ni`` precedes a NOM-NP / DEM-PRON focus and
# is followed by ``ay`` + a NEG-marked clause.
- surface: ni
  pos: PART
  feats: {FOCUS_NEG: true, LEMMA: ni}
- surface: kay
  pos: ADP
  feats: {CASE: DAT, MARKER: KAY, HUMAN: true}

# === Demonstratives ======================================================
# Three deixis values × three cases. ``DEM: YES`` marks every entry
# so the Phase 4 §7.8 standalone-demonstrative NP rule
# (``NP[CASE=X] → DET[CASE=X, DEM=YES]``) selects them without
# enumerating per-deixis variants.
- surface: ito
  pos: DET
  feats: {CASE: NOM, DEIXIS: PROX, DEM: true}
- surface: nito
  pos: ADP
  feats: {CASE: GEN, DEIXIS: PROX, DEM: true}
- surface: dito
  pos: ADP
  feats: {CASE: DAT, DEIXIS: PROX, DEM: true}

- surface: iyan
  pos: DET
  feats: {CASE: NOM, DEIXIS: MED, DEM: true}
- surface: niyan
  pos: ADP
  feats: {CASE: GEN, DEIXIS: MED, DEM: true}
- surface: diyan
  pos: ADP
  feats: {CASE: DAT, DEIXIS: MED, DEM: true}

- surface: iyon
  pos: DET
  feats: {CASE: NOM, DEIXIS: DIST, DEM: true}
- surface: niyon
  pos: ADP
  feats: {CASE: GEN, DEIXIS: DIST, DEM: true}
- surface: doon
  pos: ADP
  feats: {CASE: DAT, DEIXIS: DIST, DEM: true}

# === Polarity ============================================================
- surface: hindi
  pos: PART
  feats: {POLARITY: NEG}
- surface: huwag
  pos: PART
  feats: {POLARITY: NEG, MOOD: IMP}

# === Linker ==============================================================
# `na` is the standalone linker (after consonant-final hosts and as the
# default in many fixed phrases). `-ng` is the bound enclitic form
# attached to vowel-final hosts (the tokenizer splits it off as a
# separate token with surface `-ng`). Both carry `LINK` (string-valued,
# grammar-visible) so the relativization and ay-inversion rules can
# match `PART[LINK=NA]` / `PART[LINK=NG]` / `PART[LINK=AY]` distinctly.
- surface: na
  pos: PART
  feats: {LINK: NA}
- surface: -ng
  pos: PART
  feats: {LINK: NG}

# === Topicalization linker ===============================================
# `ay` is the linker between a fronted topic and the inner clause in
# the ay-inversion construction (Phase 4 §7.4).
- surface: ay
  pos: PART
  feats: {LINK: AY}

# === Phase 4 §7.8: quantifier-float lex entries ==========================
# Floating quantifiers (Schachter & Otanes 1972 §6.13). When floated
# to clause-final position they attach as a clause-level ADJ that
# binds the matrix SUBJ. Pre-NP partitive usage (``lahat ng bata``)
# is deferred — needs a new QP non-terminal.
- surface: lahat
  pos: Q
  feats: {QUANT: ALL}
- surface: iba
  pos: Q
  feats: {QUANT: OTHER}

# === Phase 5f Commit 15: vague cardinals (Group H1 item 1) =================
# Vague cardinals — quantifiers without an exact CARDINAL_VALUE.
# Like cardinals (Phase 5f Commit 1) they attach as NP-internal
# modifiers via the linker (parallel to the cardinal-NP-modifier
# rule generalised to Q heads). Unlike cardinals they ride
# ``QUANT`` (with values like MANY / FEW / VERY_FEW / MOST) instead
# of CARDINAL_VALUE. The ``VAGUE: "YES"`` feature gates the new
# Phase 5f Commit 15 vague-NP-modifier rule and is also used in a
# negation guard on the existing Phase 5b ``Q + NP[GEN]`` partitive
# rule, scoping that rule to ``lahat`` / ``iba`` (the linker form
# is the only Group H1 path for vague Qs).
#
# Reduplication-derived ``iilan`` (from ``isa``) and ``ka-…-an``
# derived ``karamihan`` are listed as attested forms; productive
# reduplication / ``ka-…-an`` morphology for vague cardinals is
# deferred (out of scope for Group H1). The count-mass distinction
# (``marami`` + count vs ``marami`` + mass — both grammatical with
# no morphological alternation; S&O 1972 §4.7) is lex-internal,
# not a syntactic split, so the lex entry is uniform.
#
# Linker note: ``ilan`` / ``iilan`` / ``karamihan`` are consonant-
# final and use the standalone ``na`` linker (``ilan na bata``).
# The contracted ``ilang bata`` form (irregular bound -ng on a
# consonant-final stem) is not covered — it would require a
# tokenizer-level pre-pass for the irregular contraction. Deferred.
- surface: ilan
  pos: Q
  feats: {QUANT: FEW, VAGUE: true}
- surface: marami
  pos: Q
  feats: {QUANT: MANY, VAGUE: true}
- surface: kaunti
  pos: Q
  feats: {QUANT: FEW, VAGUE: true}
- surface: konti
  pos: Q
  feats: {QUANT: FEW, VAGUE: true}
- surface: kakaunti
  pos: Q
  feats: {QUANT: VERY_FEW, VAGUE: true}
- surface: iilan
  pos: Q
  feats: {QUANT: FEW, VAGUE: true}
- surface: karamihan
  pos: Q
  feats: {QUANT: MOST, VAGUE: true}

# === Phase 5n.B Commit 4: pinaka- superlative Q heads (§18 L40) =============
#
# Productive ``pinaka-`` derivation on the closed-class vague-Q
# inventory: ``pinakamarami`` "the most", ``pinakakonti`` /
# ``pinakakaunti`` "the fewest", ``pinakakakaunti`` "the very
# fewest", ``pinakaiilan`` "the very few", ``pinakakaramihan``
# "the great majority". Closes §18 L40 (carried forward from
# Phase 5h §9.2: the productive ADJ ``pinaka_adj`` cell fires on
# ``ma_adj`` ADJ roots only; vague-Q heads are stored as static
# PART entries in particles.yaml and don't go through the
# adjective paradigm engine).
#
# Direct-lex (rather than a paradigm-engine extension to Q)
# because the vague-Q inventory is closed; productively-extending
# Q-paradigm infrastructure across particles is reserved for a
# Phase 6 generalisation. The orthographic-variant ``LEMMA``
# convention (Phase 5j Commit 7) routes each entry's analysis
# back to the bare-Q canonical lemma so existing partitive /
# NP-modifier rules see a Q with QUANT + VAGUE + the new
# COMP_DEGREE feat.
#
# The Phase 5n.B Commit 1 predicative-Q clause rule fires on
# these surfaces (``Pinakamarami ang aklat.`` "The books are
# the most"), and the Phase 5f Commit 15 vague-Q NP-modifier
# rule fires on the linker-fused forms (``pinakamaraming aklat``
# "the most books").
- surface: pinakamarami
  pos: Q
  feats: {QUANT: MANY, VAGUE: true, COMP_DEGREE: SUPERLATIVE, LEMMA: marami}
- surface: pinakakonti
  pos: Q
  feats: {QUANT: FEW, VAGUE: true, COMP_DEGREE: SUPERLATIVE, LEMMA: konti}
- surface: pinakakaunti
  pos: Q
  feats: {QUANT: FEW, VAGUE: true, COMP_DEGREE: SUPERLATIVE, LEMMA: kaunti}
- surface: pinakakakaunti
  pos: Q
  feats: {QUANT: VERY_FEW, VAGUE: true, COMP_DEGREE: SUPERLATIVE, LEMMA: kakaunti}
- surface: pinakaiilan
  pos: Q
  feats: {QUANT: FEW, VAGUE: true, COMP_DEGREE: SUPERLATIVE, LEMMA: iilan}
- surface: pinakakaramihan
  pos: Q
  feats: {QUANT: MOST, VAGUE: true, COMP_DEGREE: SUPERLATIVE, LEMMA: karamihan}

# === Phase 5f Commit 16: approximators (Group H1 item 2) ===================
# Approximators — closed-class pre-modifiers that wrap a NUM or Q
# head and add ``APPROX: YES`` to the result. ``halos`` "almost /
# nearly" and ``humigit-kumulang`` "approximately / more or less"
# are the canonical pair (S&O 1972 §4.7; R&B 1986). Per plan
# §11.1 Group H item 2: "Modifies a NUM or Q head" — see the
# Phase 5f Commit 16 grammar rules in src/tgllfg/cfg/nominal.py
# for the structural realisation.
#
# This commit also broadens the Phase 5f Commit 13 ``mga`` time-
# approximation rule (``N → PART[mga] N[SEM_CLASS=TIME]``) to
# numerals via a parallel ``NUM → PART[mga] NUM[CARDINAL=YES]``
# rule. Same lex entry; new rule. ``mga sampu`` "around ten" is
# the target. (Plural marking on regular nouns and DAY / MONTH
# approximation remain deferred per Commit 13.)
#
# Hyphenation note: ``humigit-kumulang`` is canonically
# hyphenated. The current tokenizer (``\w+|\S``) splits hyphens,
# so a tokenizer pre-pass would be needed to recognise the
# canonical form as a single lex item. For now the seed lex
# stores the single-token form ``humigitkumulang`` (parallel to
# the Phase 5f Commit 14 seasons treatment of ``tag-init`` /
# ``taginit``). The hyphenated form is deferred.
#
# Out of scope for this commit:
#
# * ``malapit sa NUM`` "close to N" — multi-word approximator
#   with a DAT-NP complement. Analytically more involved than
#   the simple pre-modifier; deferred.
- surface: halos
  pos: PART
  feats: {APPROX: true}
- surface: humigitkumulang
  pos: PART
  feats: {APPROX: true}

# === Phase 5f Commit 17: numeric comparatives (Group H1 item 3) ===========
# Numeric comparators that wrap a NUM[CARDINAL=YES] standard via
# the DAT marker ``sa`` and modify a NUM head with COMP feature.
# Four idiomatic phrase patterns, all with a frame rule per plan
# §11.1 Group H item 3: "These compose existing constituents
# (negation hindi, the NEG-headed copula in bababa / hihigit,
# DAT-NP sa NUM) plus a small frame rule for the NUM modifier."
#
#   higit sa N        "more than N"        COMP=GT
#   kulang sa N       "less than N"        COMP=LT
#   hindi bababa sa N "no less than N /    COMP=GE
#                      at least N"
#   hindi hihigit sa N "no more than N /   COMP=LE
#                       at most N"
#
# Each comparator carries a ``COMP_PHRASE`` tag identifying which
# of the four frame rules it gates. The ``COMP`` value on the
# wrapped matrix NUM is set by the rule itself (not the lex)
# because ``hindi bababa`` and ``hindi hihigit`` flip the
# semantics of the underlying head — the rule's literal ``COMP``
# is the "after-composition" value (GE / LE), not the lex's
# intrinsic semantics.
#
# Polysemy notes: ``higit`` is also a verb root in verbs.yaml
# ("higit" "pull, exceed", VERB). ``bababa`` is generated by
# the paradigm engine as the AV CTPL of root ``baba`` (descend);
# ``hihigit`` is the AV CTPL of root ``higit``. Adding these
# four surfaces as PART entries here creates polysemy with the
# verb / verb-form analyses; the morph analyzer returns both
# (different POS), and the parser picks the analysis that
# yields a successful parse. The frame rules require PART
# daughters, so VERB analyses are eliminated by the rule's POS
# constraint in the comparative context. The ``higit`` VERB
# root in verbs.yaml has no impact in practice — the bare root
# is rarely a finite verb form in normal sentences.
#
# Out of scope for this commit:
#
# * Gradable / scalar ``mas`` (without numeric reference) —
#   lives in Phase 5h (gradable adjective comparison).
# * Comparators on Q heads (``higit sa kalahati`` "more than
#   half") — extending the frame rule to admit FRACTION /
#   PERCENTAGE / MULTIPLIER daughters is additive but not in
#   Group H1 scope. Defer.
- surface: higit
  pos: PART
  feats: {COMP_PHRASE: HIGIT}
- surface: kulang
  pos: PART
  feats: {COMP_PHRASE: KULANG}
- surface: bababa
  pos: PART
  feats: {COMP_PHRASE: BABABA}
- surface: hihigit
  pos: PART
  feats: {COMP_PHRASE: HIHIGIT}

# === Phase 5f Commit 19: distributive tig- (Group H2 item 5) ===============
# Phase 5n.C.3 Commit 3 (§18 L31): migrated to productive
# paradigm via the ``tig_distrib`` cell in
# ``data/tgl/paradigms.yaml`` + NUM Roots in
# ``data/tgl/numerals.yaml``. The 10 hand-coded ``tig*`` particles
# that previously lived here have been removed — the productive
# paradigm now generates them.

# === Phase 5f Commit 20: universal `bawat` / `kada` (Group H2 item 6) ======
# Pre-N universal quantifiers — closes Group H2 (Group H sub-PR
# 2 of 3). Plan §11.1 Group H item 6 (S&O 1972 §4.7; R&B 1986):
#
#   bawat bata  "every child"
#   bawat isa   "every one"
#   kada bata   "every child" (Spanish-borrowed colloquial
#                synonym of bawat)
#
# Both are Q heads with ``UNIV: "YES"``. Unlike ``lahat`` /
# ``iba`` (Phase 4 §7.8 partitive Q heads taking GEN-NP) and
# unlike the vague Qs (Phase 5f Commit 15 taking linker + N),
# universals take a **bare N** complement (no linker, no DET
# between Q and N). This is the third Q-distribution Phase 5f
# has now covered:
#
#   Q + NP[GEN]              partitive (lahat / iba; Phase 5b)
#   Q + PART[LINK] + N        vague-Q-modifier (Phase 5f Commit 15)
#   Q + N                    universal (this commit)
#
# The new grammar rules (Phase 5f Commit 20 in
# src/tgllfg/cfg/nominal.py) parallel Phase 5f Commit 15 except
# the linker daughter is dropped. Three case-marked variants
# (DET/ADP[CASE=X] Q[UNIV=YES] N) plus one bare-NOM variant
# (Q[UNIV=YES] N) for surfaces like ``Bawat bata ay kumakain.``
# where bawat itself functions as the determiner-equivalent.
#
# The existing Phase 5b partitive rules gain ``¬ (↓2 UNIV)``
# (parallel to the Phase 5f Commit 15 ``¬ (↓2 VAGUE)`` gate)
# so universals only take the bare-N form (the partitive
# ``*ang bawat ng bata`` is non-standard and shouldn't compose).
#
# Out of scope for this commit:
#
# * ``bawat isa`` / ``bawat dalawa`` (Q + NUM as quantifier
#   over a number) — needs a parallel Q + NUM rule. Defer.
# * Q-quantification over a non-N head (``bawat sa kanila``
#   "every of them" with a DAT-NP complement) — additive but
#   structurally distinct.
# * Floated universals (``Kumakain ang bata bawat`` "the
#   children eat each one"?) — not idiomatic for ``bawat``;
#   the existing Phase 4 §7.8 ``S → S Q`` float rule would
#   mechanically fire but the result isn't natural Tagalog.
#   Defer.
- surface: bawat
  pos: Q
  feats: {QUANT: EVERY, UNIV: true}
- surface: kada
  pos: Q
  feats: {QUANT: EVERY, UNIV: true}

# === Phase 5f Commit 21: distributive-possessive (Group H3 item 7) =========
# Phase 5n.C.3 Commit 5 (§18 L31): migrated to productive
# paradigm via the ``kani_redup`` cell in
# ``data/tgl/paradigms.yaml`` + ``affix_class: [kani_redup]`` on
# the 3rd-person DAT pronouns (``kanya`` / ``kaniya`` / ``kanila``)
# in ``data/tgl/pronouns.yaml``. The 2 hand-coded
# ``kanikaniya`` / ``kanyakanya`` Q particles that previously
# lived here have been removed — the productive paradigm now
# generates them, plus the 3pl form ``kanikanila`` (which closes
# the 3pl gap left by Phase 5f Commit 21).

# === Phase 5f Commit 22: wholes `buo` / `buong` (Group H3 item 8) ==========
# Pre-N totality quantifier — ``buong bata`` "whole / entire
# child", ``buong araw`` "whole day", ``buong pamilya`` "entire
# family". Plan §11.1 Group H item 8 (S&O 1972 §4.7; R&B 1986).
#
# Single lex entry ``buo`` (the citation form, vowel-final).
# The bound ``-ng`` linker form ``buong`` is produced by the
# Phase 4 split_linker_ng pre-pass once ``buo`` is a known
# surface. The construction ``buong N`` parses as
# ``buo + -ng + N`` via a new Phase 5f Commit 22 grammar rule
# (Q[WHOLE=YES] + linker + N — same template as Phase 5f
# Commit 15 vague-Q-modifier and Commit 21 distributive-
# possessive, gated on a different feature).
#
# POS choice: Q rather than ADJ. Semantically ``buo`` is a
# totality quantifier (it quantifies over the entirety of the
# entity, not a property like color or size). The plan groups
# it under Group H quantifiers, and the linker-modifier
# distribution matches the established Q template. Treating
# ``buo`` as ADJ would force it through the (Phase 5g)
# adjective-modifier path, which doesn't exist yet and which
# would conflate genuine adjectives with totality quantifiers.
#
# Out of scope for this commit:
#
# * Predicative use (``Buo ang bata.`` "The child is whole /
#   intact") — would parse via a future predicate-Q rule;
#   defer.
# * Floated ``buo`` (``Kumain ang bata buo`` "the whole
#   child ate") — would mechanically fire via the existing
#   Phase 4 §7.8 ``S → S Q`` float rule; not idiomatic for
#   ``buo``, deferred.
- surface: buo
  pos: Q
  feats: {QUANT: WHOLE, WHOLE: true}

# === Phase 5f Commit 23: dual `pareho` / `kapwa` (Group H3 item 9) ==========
# Closes Phase 5f. Plan §11.1 Group H item 9 (S&O 1972 §4.7;
# R&B 1986). Two Q[DUAL=YES] entries — ``pareho`` "both /
# alike" and ``kapwa`` "both" (more formal):
#
#   Kumain sila pareho.   "they both ate"  (clause-final
#                          float; this commit's target form)
#   Kumain sila kapwa.    "they both ate"  (formal variant)
#
# Both consume the existing Phase 4 §7.8 ``S → S Q`` float
# rule unchanged — the float rule attaches Q at clause-final
# position as a member of the matrix's ADJ set with binding
# ``(↓2 ANTECEDENT) = (↑ SUBJ)``. The matrix's ADJ-member
# carries the Q lex's full f-structure (LEMMA, QUANT=BOTH,
# DUAL=YES). No new grammar required for the float use.
#
# Polysemy: ``pareho`` also has an equative-predicate reading
# (``Pareho ang kanilang sapatos`` "their shoes are the same"),
# which belongs in Phase 5h (gradable / equative comparison)
# per the plan. This commit covers only the floated-quantifier
# use; the equative-predicate use will be added as a separate
# (lemma, pos) entry when Phase 5h lands. Polysemy via
# different POS is the established pattern (Phase 5f Commit 17
# bababa / hihigit precedent).
#
# Out of scope for this commit:
#
# * **Clause-initial form** ``Pareho silang kumain.`` "they
#   both ate" — same surface-meaning as ``Kumain sila pareho.``
#   but with Q clause-initial. Plan §11.1 Group H item 9
#   describes this as the canonical surface, but parsing it
#   requires a new S frame rule (``S → Q[DUAL=YES] PRON[NOM]
#   PART[LINK] V``) modelling pareho as a clause-initial
#   predicate-like Q with linker-attached V complement.
#   Analytically distinct from the float construction this
#   commit covers; deferred to a later commit. Both surfaces
#   express the same proposition, so Phase 5f scope is
#   adequately covered by the float form.
# * **Equative predicate** ``Pareho ang kanilang sapatos.``
#   "their shoes are the same" — Phase 5h scope.
- surface: pareho
  pos: Q
  feats: {QUANT: BOTH, DUAL: true}
- surface: kapwa
  pos: Q
  feats: {QUANT: BOTH, DUAL: true}

# === Phase 4 §7.6: psych control predicates ==============================
# Pseudo-verbal predicates that select an XCOMP complement clause and
# take a GEN-marked experiencer. They have no verbal morphology
# (no voice / aspect / mood inflection), so they live here as
# closed-class entries with `pos: VERB` rather than as verbs.yaml
# entries that would drive the paradigm engine. The matrix SUBJ is
# the GEN-NP (a deviation from the otherwise-uniform NOM→SUBJ
# mapping; see docs/analysis-choices.md "Phase 4 §7.6"); SUBJ
# controls the embedded SUBJ via `(↑ SUBJ) = (↑ XCOMP REL-PRO)`.
- surface: gusto
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}
- surface: ayaw
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}
- surface: kaya
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}

# Phase 5i Commit 8: indirect-Q embedding ``alam`` "know". Like
# the psych pseudo-verbs above, ``alam`` is uninflected (no voice
# / aspect / mood) and takes a GEN-marked experiencer (``Alam ko
# X`` "I know X"). Unlike PSYCH, its complement is a CLOSED
# sentential complement (COMP), not an open XCOMP — the embedded
# clause has its own SUBJ (the wh-pivot), and there's no
# SUBJ-control / linker between matrix and embedded. The ``KNOW``
# control class keeps it from cross-firing on the existing
# PSYCH wrap rules (which require a linker + S_XCOMP open
# complement). PRED template ``KNOW <SUBJ, COMP>`` lives in
# core/lexicon.py. Phase 5i Commit 8 only admits indirect-Q
# (interrogative) complements; declarative-COMP factive
# embedding (``Alam kong kumain ang aso`` "I know that the dog
# ate") is Phase 5+ scope — see roadmap §18.
- surface: alam
  pos: VERB
  feats: {CTRL_CLASS: KNOW}

# Phase 5n.B Commit 12 (§18 L55): additional KNOW-class predicates.
# All four pattern syntactically like ``alam`` — uninflected
# pseudo-verbs taking a GEN-NP experiencer (matrix SUBJ) and a
# CLOSED COMP (typically an indirect-Q ``kung``-clause). PRED
# templates differ per predicate so downstream consumers can
# distinguish: BELIEVE (akala — connotes mistaken belief), THINK
# (isip), HEAR (naririnig — surface-form-as-lemma since the
# involuntary-IPFV ma-prefix paradigm of ``dinig`` isn't yet wired
# into the morphology engine), REMEMBER (naaalala — same
# treatment for the involuntary-IPFV form of ``alala``).
- surface: akala
  pos: VERB
  feats: {CTRL_CLASS: KNOW}
- surface: isip
  pos: VERB
  feats: {CTRL_CLASS: KNOW}
- surface: naririnig
  pos: VERB
  feats: {CTRL_CLASS: KNOW}
- surface: naaalala
  pos: VERB
  feats: {CTRL_CLASS: KNOW}

# Phase 5c §7.6 follow-on (Commit 5): raising verbs. Like the
# psych pseudo-verbs above, they're closed-class, uninflected,
# select an XCOMP. Unlike psych, they have no thematic SUBJ —
# the matrix SUBJ is structure-shared with the embedded SUBJ
# (``Mukhang kumakain ang bata`` "the child seems to be eating";
# matrix.SUBJ === XCOMP.SUBJ === bata). The lex's PRED uses the
# non-thematic notation ``SEEM <XCOMP> SUBJ`` (SUBJ outside
# angle-brackets). Both surfaces are also nouns (``mukha`` "face",
# ``baka`` "cow"); the noun reading lives in nouns.yaml. The
# grammar's wrap rule pattern (V[CTRL_CLASS=RAISING] + linker +
# embedded S) is sufficiently distinctive that no pre-parse
# disambiguation is needed — only one reading completes.
- surface: mukha
  pos: VERB
  feats: {CTRL_CLASS: RAISING}
- surface: baka
  pos: VERB
  feats: {CTRL_CLASS: RAISING}

# Phase 5d Commit 1: additional evidential raising verbs. These
# syntactically pattern with mukha / baka but differ in linker
# behaviour — `parang` and `tila` typically appear WITHOUT a
# following linker (`Parang umuulan`, `Tila kumain ang bata`),
# whereas mukha takes the bound `-ng` linker (`Mukhang umuulan`).
# A second matrix wrap rule in cfg/control.py admits the no-linker
# form for V[CTRL_CLASS=RAISING]. `yata` "supposedly" is also
# evidential but is a Wackernagel 2P clitic in Tagalog (already
# seeded as PART[is_clitic=true] below) — not a raising verb.
# Phase 5e Commit 26: parang carries an extra COMPARATIVE feature
# distinguishing the comparative reading (`Parang aso ang bata.`
# "The child is like a dog") from tila's evidential-only reading.
# Both keep CTRL_CLASS=RAISING_BARE for the existing evidential
# (Phase 5d Commit 1) form `Parang umuulan` / `Tila umuulan`. The
# comparative grammar rule (cfg/clause.py) constrains on
# `(↓1 COMPARATIVE) =c 'YES'` to fire only on parang (not tila).
- surface: parang
