# === Phase 5e Commit 3: temporal adverbs (ADV) ===========================
# Closed-class temporal expressions that appear as sentential modifiers
# (clause-final or as ay-fronted topic). Tagalog also admits these as
# bare nouns in certain contexts (`kahapon` already has a NOUN entry in
# nouns.yaml as "yesterday"); the ADV reading here is additive — both
# analyses surface and the grammar picks whichever fits. ADV_TYPE=TIME
# is exposed for grammar-rule matching; DEIXIS_TIME (PAST / PRES / FUT)
# captures temporal anchoring without conflating with the spatial DEIXIS
# feature on demonstratives.
