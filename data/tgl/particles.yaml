# data/tgl/particles.yaml
#
# Closed-class function words: case markers, demonstratives,
# polarity, the standalone linker, and the second-position
# adverbial enclitic cluster. The bound `-ng` linker enclitic isn't
# represented here because it requires orthographic detection at
# tokenization time; that lives with §7.3 clitic-placement work in
# Phase 4.
#
# Conventions:
#   HUMAN     — distinguishes the personal-name series (si/ni/kay)
#               from the common-noun series (ang/ng/sa).
#   DEIXIS    — PROX (this), MED (that-near), DIST (that-far).
#   is_clitic — surfaces in the second-position (Wackernagel) cluster.

# === Common-noun case markers ============================================
- surface: ang
  pos: DET
  feats: {CASE: NOM, MARKER: ANG}
- surface: ng
  pos: ADP
  feats: {CASE: GEN, MARKER: NG}
- surface: sa
  pos: ADP
  feats: {CASE: DAT, MARKER: SA}

# === Personal-name case markers ==========================================
- surface: si
  pos: DET
  feats: {CASE: NOM, MARKER: SI, HUMAN: true}
- surface: ni
  pos: ADP
  feats: {CASE: GEN, MARKER: NI, HUMAN: true}
- surface: kay
  pos: ADP
  feats: {CASE: DAT, MARKER: KAY, HUMAN: true}

# === Demonstratives ======================================================
# Three deixis values × three cases. ``DEM: YES`` marks every entry
# so the Phase 4 §7.8 standalone-demonstrative NP rule
# (``NP[CASE=X] → DET[CASE=X, DEM=YES]``) selects them without
# enumerating per-deixis variants.
- surface: ito
  pos: DET
  feats: {CASE: NOM, DEIXIS: PROX, DEM: YES}
- surface: nito
  pos: ADP
  feats: {CASE: GEN, DEIXIS: PROX, DEM: YES}
- surface: dito
  pos: ADP
  feats: {CASE: DAT, DEIXIS: PROX, DEM: YES}

- surface: iyan
  pos: DET
  feats: {CASE: NOM, DEIXIS: MED, DEM: YES}
- surface: niyan
  pos: ADP
  feats: {CASE: GEN, DEIXIS: MED, DEM: YES}
- surface: diyan
  pos: ADP
  feats: {CASE: DAT, DEIXIS: MED, DEM: YES}

- surface: iyon
  pos: DET
  feats: {CASE: NOM, DEIXIS: DIST, DEM: YES}
- surface: niyon
  pos: ADP
  feats: {CASE: GEN, DEIXIS: DIST, DEM: YES}
- surface: doon
  pos: ADP
  feats: {CASE: DAT, DEIXIS: DIST, DEM: YES}

# === Polarity ============================================================
- surface: hindi
  pos: PART
  feats: {POLARITY: NEG}
- surface: huwag
  pos: PART
  feats: {POLARITY: NEG, MOOD: IMP}

# === Linker ==============================================================
# `na` is the standalone linker (after consonant-final hosts and as the
# default in many fixed phrases). `-ng` is the bound enclitic form
# attached to vowel-final hosts (the tokenizer splits it off as a
# separate token with surface `-ng`). Both carry `LINK` (string-valued,
# grammar-visible) so the relativization and ay-inversion rules can
# match `PART[LINK=NA]` / `PART[LINK=NG]` / `PART[LINK=AY]` distinctly.
- surface: na
  pos: PART
  feats: {LINK: NA}
- surface: -ng
  pos: PART
  feats: {LINK: NG}

# === Topicalization linker ===============================================
# `ay` is the linker between a fronted topic and the inner clause in
# the ay-inversion construction (Phase 4 §7.4).
- surface: ay
  pos: PART
  feats: {LINK: AY}

# === Phase 4 §7.8: quantifier-float lex entries ==========================
# Floating quantifiers (Schachter & Otanes 1972 §6.13). When floated
# to clause-final position they attach as a clause-level ADJ that
# binds the matrix SUBJ. Pre-NP partitive usage (``lahat ng bata``)
# is deferred — needs a new QP non-terminal.
- surface: lahat
  pos: Q
  feats: {QUANT: ALL}
- surface: iba
  pos: Q
  feats: {QUANT: OTHER}

# === Phase 4 §7.6: psych control predicates ==============================
# Pseudo-verbal predicates that select an XCOMP complement clause and
# take a GEN-marked experiencer. They have no verbal morphology
# (no voice / aspect / mood inflection), so they live here as
# closed-class entries with `pos: VERB` rather than as roots.yaml
# entries that would drive the paradigm engine. The matrix SUBJ is
# the GEN-NP (a deviation from the otherwise-uniform NOM→SUBJ
# mapping; see docs/analysis-choices.md "Phase 4 §7.6"); SUBJ
# controls the embedded SUBJ via `(↑ SUBJ) = (↑ XCOMP REL-PRO)`.
- surface: gusto
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}
- surface: ayaw
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}
- surface: kaya
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}

# Phase 5c §7.6 follow-on (Commit 5): raising verbs. Like the
# psych pseudo-verbs above, they're closed-class, uninflected,
# select an XCOMP. Unlike psych, they have no thematic SUBJ —
# the matrix SUBJ is structure-shared with the embedded SUBJ
# (``Mukhang kumakain ang bata`` "the child seems to be eating";
# matrix.SUBJ === XCOMP.SUBJ === bata). The lex's PRED uses the
# non-thematic notation ``SEEM <XCOMP> SUBJ`` (SUBJ outside
# angle-brackets). Both surfaces are also nouns (``mukha`` "face",
# ``baka`` "cow"); the noun reading lives in roots.yaml. The
# grammar's wrap rule pattern (V[CTRL_CLASS=RAISING] + linker +
# embedded S) is sufficiently distinctive that no pre-parse
# disambiguation is needed — only one reading completes.
- surface: mukha
  pos: VERB
  feats: {CTRL_CLASS: RAISING}
- surface: baka
  pos: VERB
  feats: {CTRL_CLASS: RAISING}

# Phase 5d Commit 1: additional evidential raising verbs. These
# syntactically pattern with mukha / baka but differ in linker
# behaviour — `parang` and `tila` typically appear WITHOUT a
# following linker (`Parang umuulan`, `Tila kumain ang bata`),
# whereas mukha takes the bound `-ng` linker (`Mukhang umuulan`).
# A second matrix wrap rule in cfg/grammar.py admits the no-linker
# form for V[CTRL_CLASS=RAISING]. `yata` "supposedly" is also
# evidential but is a Wackernagel 2P clitic in Tagalog (already
# seeded as PART[is_clitic=true] below) — not a raising verb.
- surface: parang
  pos: VERB
  feats: {CTRL_CLASS: RAISING_BARE}
- surface: tila
  pos: VERB
  feats: {CTRL_CLASS: RAISING_BARE}

# === Second-position adverbial enclitics =================================
# These attach to the first prosodic word in the clause; §7.3 will
# add the clitic-placement c-structure rules. Schachter & Otanes 1972
# §3.5 documents the cluster ordering.

- surface: na
  pos: PART
  feats: {ASPECT_PART: ALREADY}
  is_clitic: true
  clitic_class: 2P
- surface: pa
  pos: PART
  feats: {ASPECT_PART: STILL}
  is_clitic: true
  clitic_class: 2P
- surface: ba
  pos: PART
  feats: {QUESTION: true}
  is_clitic: true
  clitic_class: 2P
- surface: daw
  pos: PART
  feats: {EVID: REPORT}
  is_clitic: true
  clitic_class: 2P
- surface: raw
  pos: PART
  feats: {EVID: REPORT}
  is_clitic: true
  clitic_class: 2P
- surface: din
  pos: PART
  feats: {ADV: ALSO}
  is_clitic: true
  clitic_class: 2P
- surface: rin
  pos: PART
  feats: {ADV: ALSO}
  is_clitic: true
  clitic_class: 2P
- surface: lang
  pos: PART
  feats: {ADV: ONLY}
  is_clitic: true
  clitic_class: 2P
- surface: nga
  pos: PART
  feats: {EMPHATIC: true}
  is_clitic: true
  clitic_class: 2P
- surface: pala
  pos: PART
  feats: {MIRATIVE: true}
  is_clitic: true
  clitic_class: 2P
- surface: kasi
  pos: PART
  feats: {DISCOURSE: BECAUSE}
  is_clitic: true
  clitic_class: 2P
- surface: man
  pos: PART
  feats: {ADV: EVEN}
  is_clitic: true
  clitic_class: 2P
- surface: yata
  pos: PART
  feats: {EPISTEMIC: PRESUMABLY}
  is_clitic: true
  clitic_class: 2P
