# === Phase 5f Commit 6: decimal separator (Spanish-borrowed) =============
# ``dos punto singko`` "2.5", ``apat punto lima`` "4.5". The
# ``punto`` particle joins integer-part and fractional-part
# cardinals. Tagged ``DECIMAL_SEP=YES`` to gate the new
# Phase 5f Commit 6 NUM-internal grammar rule
# (``NUM → NUM PART[DECIMAL_SEP] NUM``); doesn't carry CASE or
# any other particle features. (R&G 1981 dialogue corpus, prices.)
#
# ``.`` is the symbolic decimal separator (digit tokenization
# closing deferral, 2026-05-04) — same shape, slots into the same
# rule with ``5 . 3`` / ``5.3`` (the tokenizer's ``\\w+|\\S`` regex
# emits the dot as its own token in either spacing). The dot also
# carries ``ORTHOGRAPHIC_TERMINATOR=YES`` so the dedicated S-level
# absorption rule (in ``cfg/discourse.py``) consumes a sentence-
# final ``.`` without polluting the matrix f-structure. Question
# mark and exclamation get the same treatment.
- surface: punto
  pos: PART
  feats: {DECIMAL_SEP: true}
- surface: "."
  pos: PART
  feats: {DECIMAL_SEP: true, ORTHOGRAPHIC_TERMINATOR: true}
- surface: "?"
  pos: PART
  feats: {ORTHOGRAPHIC_TERMINATOR: true}
- surface: "!"
  pos: PART
