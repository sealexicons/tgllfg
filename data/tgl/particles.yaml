# data/tgl/particles.yaml
#
# Closed-class function words: case markers, demonstratives,
# polarity, the standalone linker, and the second-position
# adverbial enclitic cluster. The bound `-ng` linker enclitic isn't
# represented here because it requires orthographic detection at
# tokenization time; that lives with §7.3 clitic-placement work in
# Phase 4.
#
# Conventions:
#   HUMAN     — distinguishes the personal-name series (si/ni/kay)
#               from the common-noun series (ang/ng/sa).
#   DEIXIS    — PROX (this), MED (that-near), DIST (that-far).
#   is_clitic — surfaces in the second-position (Wackernagel) cluster.

# === Common-noun case markers ============================================
- surface: ang
  pos: DET
  feats: {CASE: NOM, MARKER: ANG}
- surface: ng
  pos: ADP
  feats: {CASE: GEN, MARKER: NG}
- surface: sa
  pos: ADP
  feats: {CASE: DAT, MARKER: SA}

# === Personal-name case markers ==========================================
- surface: si
  pos: DET
  feats: {CASE: NOM, MARKER: SI, HUMAN: true}
- surface: ni
  pos: ADP
  feats: {CASE: GEN, MARKER: NI, HUMAN: true}
- surface: kay
  pos: ADP
  feats: {CASE: DAT, MARKER: KAY, HUMAN: true}

# === Demonstratives ======================================================
# Three deixis values × three cases. ``DEM: YES`` marks every entry
# so the Phase 4 §7.8 standalone-demonstrative NP rule
# (``NP[CASE=X] → DET[CASE=X, DEM=YES]``) selects them without
# enumerating per-deixis variants.
- surface: ito
  pos: DET
  feats: {CASE: NOM, DEIXIS: PROX, DEM: YES}
- surface: nito
  pos: ADP
  feats: {CASE: GEN, DEIXIS: PROX, DEM: YES}
- surface: dito
  pos: ADP
  feats: {CASE: DAT, DEIXIS: PROX, DEM: YES}

- surface: iyan
  pos: DET
  feats: {CASE: NOM, DEIXIS: MED, DEM: YES}
- surface: niyan
  pos: ADP
  feats: {CASE: GEN, DEIXIS: MED, DEM: YES}
- surface: diyan
  pos: ADP
  feats: {CASE: DAT, DEIXIS: MED, DEM: YES}

- surface: iyon
  pos: DET
  feats: {CASE: NOM, DEIXIS: DIST, DEM: YES}
- surface: niyon
  pos: ADP
  feats: {CASE: GEN, DEIXIS: DIST, DEM: YES}
- surface: doon
  pos: ADP
  feats: {CASE: DAT, DEIXIS: DIST, DEM: YES}

# === Polarity ============================================================
- surface: hindi
  pos: PART
  feats: {POLARITY: NEG}
- surface: huwag
  pos: PART
  feats: {POLARITY: NEG, MOOD: IMP}

# === Linker ==============================================================
# `na` is the standalone linker (after consonant-final hosts and as the
# default in many fixed phrases). `-ng` is the bound enclitic form
# attached to vowel-final hosts (the tokenizer splits it off as a
# separate token with surface `-ng`). Both carry `LINK` (string-valued,
# grammar-visible) so the relativization and ay-inversion rules can
# match `PART[LINK=NA]` / `PART[LINK=NG]` / `PART[LINK=AY]` distinctly.
- surface: na
  pos: PART
  feats: {LINK: NA}
- surface: -ng
  pos: PART
  feats: {LINK: NG}

# === Topicalization linker ===============================================
# `ay` is the linker between a fronted topic and the inner clause in
# the ay-inversion construction (Phase 4 §7.4).
- surface: ay
  pos: PART
  feats: {LINK: AY}

# === Phase 4 §7.8: quantifier-float lex entries ==========================
# Floating quantifiers (Schachter & Otanes 1972 §6.13). When floated
# to clause-final position they attach as a clause-level ADJ that
# binds the matrix SUBJ. Pre-NP partitive usage (``lahat ng bata``)
# is deferred — needs a new QP non-terminal.
- surface: lahat
  pos: Q
  feats: {QUANT: ALL}
- surface: iba
  pos: Q
  feats: {QUANT: OTHER}

# === Phase 4 §7.6: psych control predicates ==============================
# Pseudo-verbal predicates that select an XCOMP complement clause and
# take a GEN-marked experiencer. They have no verbal morphology
# (no voice / aspect / mood inflection), so they live here as
# closed-class entries with `pos: VERB` rather than as roots.yaml
# entries that would drive the paradigm engine. The matrix SUBJ is
# the GEN-NP (a deviation from the otherwise-uniform NOM→SUBJ
# mapping; see docs/analysis-choices.md "Phase 4 §7.6"); SUBJ
# controls the embedded SUBJ via `(↑ SUBJ) = (↑ XCOMP REL-PRO)`.
- surface: gusto
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}
- surface: ayaw
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}
- surface: kaya
  pos: VERB
  feats: {CTRL_CLASS: PSYCH}

# Phase 5c §7.6 follow-on (Commit 5): raising verbs. Like the
# psych pseudo-verbs above, they're closed-class, uninflected,
# select an XCOMP. Unlike psych, they have no thematic SUBJ —
# the matrix SUBJ is structure-shared with the embedded SUBJ
# (``Mukhang kumakain ang bata`` "the child seems to be eating";
# matrix.SUBJ === XCOMP.SUBJ === bata). The lex's PRED uses the
# non-thematic notation ``SEEM <XCOMP> SUBJ`` (SUBJ outside
# angle-brackets). Both surfaces are also nouns (``mukha`` "face",
# ``baka`` "cow"); the noun reading lives in roots.yaml. The
# grammar's wrap rule pattern (V[CTRL_CLASS=RAISING] + linker +
# embedded S) is sufficiently distinctive that no pre-parse
# disambiguation is needed — only one reading completes.
- surface: mukha
  pos: VERB
  feats: {CTRL_CLASS: RAISING}
- surface: baka
  pos: VERB
  feats: {CTRL_CLASS: RAISING}

# Phase 5d Commit 1: additional evidential raising verbs. These
# syntactically pattern with mukha / baka but differ in linker
# behaviour — `parang` and `tila` typically appear WITHOUT a
# following linker (`Parang umuulan`, `Tila kumain ang bata`),
# whereas mukha takes the bound `-ng` linker (`Mukhang umuulan`).
# A second matrix wrap rule in cfg/grammar.py admits the no-linker
# form for V[CTRL_CLASS=RAISING]. `yata` "supposedly" is also
# evidential but is a Wackernagel 2P clitic in Tagalog (already
# seeded as PART[is_clitic=true] below) — not a raising verb.
# Phase 5e Commit 26: parang carries an extra COMPARATIVE feature
# distinguishing the comparative reading (`Parang aso ang bata.`
# "The child is like a dog") from tila's evidential-only reading.
# Both keep CTRL_CLASS=RAISING_BARE for the existing evidential
# (Phase 5d Commit 1) form `Parang umuulan` / `Tila umuulan`. The
# comparative grammar rule (cfg/grammar.py) constrains on
# `(↓1 COMPARATIVE) =c 'YES'` to fire only on parang (not tila).
- surface: parang
  pos: VERB
  feats: {CTRL_CLASS: RAISING_BARE, COMPARATIVE: "YES"}
- surface: tila
  pos: VERB
  feats: {CTRL_CLASS: RAISING_BARE}

# === Second-position adverbial enclitics =================================
# These attach to the first prosodic word in the clause; §7.3 will
# add the clitic-placement c-structure rules. Schachter & Otanes 1972
# §3.5 documents the cluster ordering.

- surface: na
  pos: PART
  feats: {ASPECT_PART: ALREADY}
  is_clitic: true
  clitic_class: 2P
- surface: pa
  pos: PART
  feats: {ASPECT_PART: STILL}
  is_clitic: true
  clitic_class: 2P
- surface: ba
  pos: PART
  feats: {QUESTION: true}
  is_clitic: true
  clitic_class: 2P
- surface: daw
  pos: PART
  feats: {EVID: REPORT}
  is_clitic: true
  clitic_class: 2P
- surface: raw
  pos: PART
  feats: {EVID: REPORT}
  is_clitic: true
  clitic_class: 2P
- surface: din
  pos: PART
  feats: {ADV: ALSO}
  is_clitic: true
  clitic_class: 2P
- surface: rin
  pos: PART
  feats: {ADV: ALSO}
  is_clitic: true
  clitic_class: 2P
- surface: lang
  pos: PART
  feats: {ADV: ONLY}
  is_clitic: true
  clitic_class: 2P
- surface: nga
  pos: PART
  feats: {EMPHATIC: true}
  is_clitic: true
  clitic_class: 2P
- surface: pala
  pos: PART
  feats: {MIRATIVE: true}
  is_clitic: true
  clitic_class: 2P
- surface: kasi
  pos: PART
  feats: {DISCOURSE: BECAUSE}
  is_clitic: true
  clitic_class: 2P
- surface: man
  pos: PART
  feats: {ADV: EVEN}
  is_clitic: true
  clitic_class: 2P
- surface: yata
  pos: PART
  feats: {EPISTEMIC: PRESUMABLY}
  is_clitic: true
  clitic_class: 2P

# === Phase 5e Commit 3: temporal adverbs (ADV) ===========================
# Closed-class temporal expressions that appear as sentential modifiers
# (clause-final or as ay-fronted topic). Tagalog also admits these as
# bare nouns in certain contexts (`kahapon` already has a NOUN entry in
# roots.yaml as "yesterday"); the ADV reading here is additive — both
# analyses surface and the grammar picks whichever fits. ADV_TYPE=TIME
# is exposed for grammar-rule matching; DEIXIS_TIME (PAST / PRES / FUT)
# captures temporal anchoring without conflating with the spatial DEIXIS
# feature on demonstratives.
- surface: kahapon
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST}
- surface: ngayon
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PRES}
- surface: bukas
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: FUT}
- surface: mamaya
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: FUT}

# === Phase 5e Commit 3: prepositions (PREP) ==============================
# Compound prepositions that head a PP with a sa-NP complement
# (PP → PREP NP[CASE=DAT]). Common Tagalog PPs: ``para sa X`` "for X",
# ``tungkol sa X`` "about X", ``mula sa X`` "from X", ``dahil sa X``
# "because of X". The PREP word itself contributes a PREP_TYPE feature
# that marks the semantic role the PP plays as a sentential modifier.
- surface: para
  pos: PREP
  feats: {PREP_TYPE: BENEFICIARY}
- surface: tungkol
  pos: PREP
  feats: {PREP_TYPE: TOPIC}
- surface: mula
  pos: PREP
  feats: {PREP_TYPE: SOURCE}
- surface: dahil
  pos: PREP
  feats: {PREP_TYPE: REASON}

# === Phase 5f Commit 1: native cardinals 1-10 ============================
# Cardinals as NP-internal modifiers via the linker
# (``isang bata`` "one child", ``tatlong libro`` "three books").
# CARDINAL=YES gates the cardinal-NP-modifier rule (see
# src/tgllfg/cfg/grammar.py Phase 5f Commit 1). CARDINAL_VALUE is
# quoted so PyYAML returns a string — the lex-equation pipeline
# filters non-string atomic values (see Phase 5e Commit 16/26
# YAML-boolean-trap memo), so unquoted integers would be dropped
# silently. NUM is SG for `isa` and PL for 2-10 (the cardinal
# contributes the matrix N's number).
- surface: isa
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "1", NUM: SG}
- surface: dalawa
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "2", NUM: PL}
- surface: tatlo
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "3", NUM: PL}
- surface: apat
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "4", NUM: PL}
- surface: lima
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "5", NUM: PL}
- surface: anim
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "6", NUM: PL}
- surface: pito
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "7", NUM: PL}
- surface: walo
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "8", NUM: PL}
- surface: siyam
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "9", NUM: PL}
- surface: sampu
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "10", NUM: PL}

# === Phase 5f Commit 2: Spanish-borrowed cardinals 1-10 ==================
# Same syntactic distribution as the native cardinals — no grammar
# changes needed; the Phase 5f Commit 1 cardinal-NP-modifier rules
# (NP-level + N-level) fire on these once the lex is in place.
# Spanish cardinals dominate in prices, ages, telephone numbers,
# and clock times; native forms dominate in counting and ritual /
# ceremonial register. (S&O 1972 §4; R&G 1981 dialogue corpus.)
#
# Linker variant follows the borrowed surface form, not the original
# Spanish: vowel-final forms (uno, kuwatro, singko, siyete, otso,
# nuwebe) take the bound ``-ng`` linker; consonant-final forms (dos,
# tres, sais, dies) take the standalone ``na`` linker.
- surface: uno
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "1", NUM: SG}
- surface: dos
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "2", NUM: PL}
- surface: tres
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "3", NUM: PL}
- surface: kuwatro
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "4", NUM: PL}
- surface: singko
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "5", NUM: PL}
- surface: sais
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "6", NUM: PL}
- surface: siyete
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "7", NUM: PL}
- surface: otso
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "8", NUM: PL}
- surface: nuwebe
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "9", NUM: PL}
- surface: dies
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "10", NUM: PL}

# === Phase 5f Commit 3: compound cardinals 11-1000 =======================
# Hand-authored single-token lex for the high-frequency compound
# cardinals: teens (11-19), decades (20-90), 100, 1000. Same
# syntactic distribution as the simple cardinals from Commits 1-2;
# the cardinal-NP-modifier rules fire on these unchanged.
#
# The productive morphology (labing- prefix on the 1-9 base for
# the teens; -pu suffix with sandhi for the decades; sandaan /
# sanlibo for hundreds / thousands) is real, but for v1 reference-
# grammar coverage the hand-authored lex is sufficient. A
# productive paradigm with sandhi rules is a deferred follow-on
# (plan §11.1 Group A item 3 — "likely both"). See plan §18 if
# productive treatment becomes needed.
#
# Coordinated higher numerals (``apat na pu`t lima`` 45,
# ``isang daan at dalawampu`` 120) need the bound ``'t`` clitic
# split and NUM coordination — out of scope here, deferred to
# the Phase 5k coordination work which already plans the ``'t``
# pass (and to a follow-on cardinal-coordination commit).
#
# Orthography: this commit uses single-token spellings throughout
# (``labingisa`` not ``labing-isa``; ``apatnapu`` not ``apat na pu``).
# Both hyphenated and three-word variants are attested in modern
# Tagalog; the single-token form is what the existing tokenizer
# yields without modification. Multi-word variants would need
# either a tokenizer pre-pass or NUM-internal grammar rules
# (see deferred-items list above).

# --- Teens 11-19 (labing- + base) ----------------------------------------
- surface: labingisa
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "11", NUM: PL}
- surface: labindalawa
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "12", NUM: PL}
- surface: labintatlo
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "13", NUM: PL}
- surface: labingapat
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "14", NUM: PL}
- surface: labinlima
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "15", NUM: PL}
- surface: labinganim
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "16", NUM: PL}
- surface: labimpito
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "17", NUM: PL}
- surface: labingwalo
  pos: NUM
  feats: {CARDINAL: "YES", CARDINAL_VALUE: "18", NUM: PL}
- surface: labinsiyam
