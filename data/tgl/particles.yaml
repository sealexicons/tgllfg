# === Phase 5f Commit 5: maka- multiplicative adverbials 1-10 =============
# Productive ``maka-`` + cardinal stem yields a frequency / multi-
# plicative adverb (``makalawa`` "twice", ``makatlo`` "thrice",
# ``makaapat`` "four times"). Hand-authored lex following the same
# coverage strategy as the compound cardinals in Commit 3 — the
# productive maka- + cardinal morphology is real but a hand-authored
# inventory of high-frequency forms is sufficient for v1.
#
# ADV_TYPE=FREQUENCY routes these adverbs through the new
# Phase 5f Commit 5 sentential-ADJUNCT rule (``S → S AdvP[FREQ]``);
# MULTIPLIER_VALUE records the count for downstream consumers.
# The ``makaisa`` form is grammatically well-formed but semantically
# rare in modern usage — ``minsan`` "once / sometimes" is the more
# common form for "once". (The narrative idiom ``Nang isang beses``
# also means "once" but is a temporal-framing construction, not a
# productive frequency adverbial — ``*nang dalawang beses`` etc. are
# unnatural.) Included here for paradigm completeness.
#
# Periphrastic frequency (``dalawang beses``, ``tatlong ulit``) uses
# the existing Phase 5f Commit 1 cardinal-NP-modifier rule on the
# new ``beses`` / ``ulit`` NOUN entries (data/tgl/roots.yaml) — but
# the adverbial / adjunct attachment of bare ``dalawang beses`` is
# a deferred follow-on (see analysis-choices.md Phase 5f Commit 5
# Periphrastic section).
- surface: makaisa
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "1"}
- surface: makalawa
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "2"}
- surface: makatlo
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "3"}
- surface: makaapat
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "4"}
- surface: makalima
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "5"}
- surface: makaanim
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "6"}
- surface: makapito
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "7"}
- surface: makawalo
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "8"}
- surface: makasiyam
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "9"}
- surface: makasampu
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, MULTIPLIER_VALUE: "10"}

# === Phase 5f Commit 6: decimal separator (Spanish-borrowed) =============
# ``dos punto singko`` "2.5", ``apat punto lima`` "4.5". The
# ``punto`` particle joins integer-part and fractional-part
# cardinals. Tagged ``DECIMAL_SEP=YES`` to gate the new
# Phase 5f Commit 6 NUM-internal grammar rule
# (``NUM → NUM PART[DECIMAL_SEP] NUM``); doesn't carry CASE or
# any other particle features. (R&G 1981 dialogue corpus, prices.)
- surface: punto
  pos: PART
  feats: {DECIMAL_SEP: "YES"}

# === Phase 5f Commit 7: ordinals 1st-10th ================================
# Hand-authored single-token lex for the high-frequency ordinals.
# Same syntactic distribution as cardinals (NP-internal modifier
# via the linker, ``ang ikalawang anak`` "the second child"), but
# with ``ORDINAL=YES`` and ``ORDINAL_VALUE`` features instead of
# CARDINAL=YES / CARDINAL_VALUE. The Phase 5f Commit 7 ordinal-
# NP-modifier rules (src/tgllfg/cfg/grammar.py) parallel the
# Commit 1 cardinal rules.
#
# ``una`` (1st) is suppletive — not ``*ikaisa``. ``ikalawa`` and
# ``ikatlo`` show stem truncation (``ika-`` + ``dalawa`` →
# ikalawa, not *ikadalawa; ``ika-`` + ``tatlo`` → ikatlo, not
# *ikatatlo). Other ordinals are regular ``ika-`` + cardinal stem.
# ``pangalawa`` is a high-frequency colloquial alternative to
# ``ikalawa`` (S&O 1972 §4.4 footnote); other ``pang-`` ordinal
# variants are productive but irregular and not hand-authored
# in this commit.
#
# NUM is omitted: ordinals don't dictate noun number agreement —
# ``ang unang aklat ko`` (1st book, SG) and ``ang unang mga aklat
# ko`` (first books, PL with ``mga``) are both grammatical. The
# matrix NP's NUM comes from the head noun / mga marker, not the
# ordinal.
- surface: una
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "1"}
- surface: ikalawa
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "2"}
- surface: pangalawa
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "2"}
- surface: ikatlo
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "3"}
- surface: ikaapat
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "4"}
- surface: ikalima
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "5"}
- surface: ikaanim
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "6"}
- surface: ikapito
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "7"}
- surface: ikawalo
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "8"}
- surface: ikasiyam
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "9"}
- surface: ikasampu
  pos: NUM
  feats: {ORDINAL: "YES", ORDINAL_VALUE: "10"}

# === Phase 5f Commit 9: arithmetic operators (Group D) ===================
# Word-form arithmetic: ``Dalawa dagdag tatlo ay lima`` "2+3=5",
# ``Sampu bawas tatlo ay pito`` "10-3=7", ``Dalawa beses tatlo ay
# anim`` "2*3=6", ``Anim hati sa dalawa ay tatlo`` "6/2=3". The
# operators are PART tokens with an ``OP`` feature; the Phase 5f
# Commit 9 arithmetic S rules consume them.
#
# ``dagdag`` and ``bawas`` already exist as VERB roots (in
# data/tgl/roots.yaml) for the verbal "add to" / "subtract"
# meanings; the bare uninflected forms are _UNK from the verbal
# pipeline (no paradigm cell emits a bare form), so adding them
# here as PART introduces no ambiguity in their typical verbal
# uses (which always carry a voice/aspect prefix or infix).
#
# ``beses`` already exists as a NOUN with SEM_CLASS=FREQUENCY
# (Phase 5f Commit 5, used in periphrastic frequency phrases via
# the cardinal-NP-modifier rule). The PART entry coexists; the
# NOUN reading fires in NP positions, the PART reading fires in
# arithmetic-operator positions. Same coexistence pattern as
# ``na`` (LINK vs ASPECT_PART).
#
# Symbol-form arithmetic (``2 + 3 = 5``) is a tokenizer expansion
# track and is §18 out-of-scope; this commit covers only the
# word-form register. (R&B 1986 §3 glances at this register;
# S&O 1972 doesn't cover it.)
- surface: dagdag
  pos: PART
  feats: {OP: PLUS}
- surface: bawas
  pos: PART
  feats: {OP: MINUS}
- surface: beses
  pos: PART
  feats: {OP: TIMES}
- surface: hati
  pos: PART
  feats: {OP: DIVIDE}

# === Phase 5f Commit 11: native time deictics (Group E item 5) ===========
# ``kanina`` "earlier today" and ``kamakalawa`` "day before
# yesterday" — native time deictics parallel to the existing
# ``kahapon`` / ``ngayon`` / ``bukas`` / ``mamaya`` ADV entries
# above. Both are ADVs that can attach as clause-level ADJUNCT
# (the bare-AdvP-as-ADJUNCT path is currently FREQUENCY-only —
# the TIME deferral from Phase 5e Commit 3 stays in force, so
# ``kanina`` / ``kamakalawa`` work in ay-fronting position
# already but not yet as bare clause-final adjuncts). The lex
# entries are added now so they're available when the TIME
# deferral lifts.
- surface: kanina
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST}
- surface: kamakalawa
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST}

# === Phase 5f Commit 12: minute-composition operators (Group E item 4) ===
# Spanish-borrowed minute operators for clock-time composition:
# ``alasotso y medya`` "8:30", ``alasotso y singko`` "8:05",
# ``alasotso menos singko`` "7:55". The ``y`` operator counts
# forward (adds minutes); ``menos`` counts backward (subtracts).
# Both PARTs feed the Phase 5f Commit 12 minute-composition
# grammar rules (src/tgllfg/cfg/grammar.py).
- surface: y
  pos: PART
  feats: {MINUTE_OP: "Y"}
- surface: menos
  pos: PART
  feats: {MINUTE_OP: "MENOS"}

# === Phase 5f Commit 13: temporal-frame markers (Group F item 5) =========
# ``tuwing`` (every) and ``noong`` (last / past) introduce
# adverbial temporal frames over a bare-N complement:
# ``tuwing Lunes`` "every Monday", ``noong Pebrero`` "in
# February", ``noong umaga`` "this morning". Feed the new
# Phase 5f Commit 13 PP rule (PP → PART[TIME_FRAME] N).
- surface: tuwing
  pos: PART
  feats: {TIME_FRAME: "PERIODIC"}
- surface: noong
  pos: PART
  feats: {TIME_FRAME: "PAST"}

# === Phase 5f Commit 14: mga time approximation (Group E item 3) =========
# ``mga`` is the Tagalog plural / approximator particle. It marks
# plurality on regular nouns (``ang mga aklat`` "the books") AND
# approximation on temporal / quantitative NPs (``mga alasotso``
# "around 8 o'clock", ``mga sampu`` "around ten"). This commit
# adds the lex entry plus a grammar rule for the time-
# approximation reading; plural marking and cardinal
# approximation are deferred to follow-on commits.
#
# PLURAL_MARKER=YES distinguishes ``mga`` from other PARTs in
# the constraining equation on the approximator rule.
- surface: mga
  pos: PART
  feats: {PLURAL_MARKER: "YES"}
