  feats: {CTRL_CLASS: RAISING_BARE}

# Phase 7a.B Commit 2 (§18.1.1 item 3 / Phase 7a.C): katatapos as a
# RAISING_BARE matrix for the analytic recent-completive construction
# `Katatapos kainin ang isda.` "The fish had just been eaten."
#
# The plan-of-record (.claude/plans/tgllfg-phase-7a.md §3.3)
# identifies this as the canonical analytic alternative for non-AV
# "just-finished" readings, since the morphological non-AV RECPFV
# paradigm doesn't exist (Phase 5e Commit 23 + Phase 7a.C). The
# matrix `katatapos` raises the embedded V's SUBJ to its own SUBJ,
# allowing the embedded V's voice / pivot to be free.
#
# This static particle entry duplicates the morphological AV-RECPFV
# form generated by the paradigm engine (from `tapos`); the
# duplication is intentional — the morphological form has
# CTRL_CLASS=NONE (standard finite V), while this particle entry has
# CTRL_CLASS=RAISING_BARE for the raising construction. Both fire in
# the analyzer; the grammar's RAISING_BARE rule (cfg/control.py)
# selects this entry only when an embedded S follows.
- surface: katatapos
  pos: VERB
  feats: {CTRL_CLASS: RAISING_BARE, LEMMA: tapos, ASPECT: RECPFV}

