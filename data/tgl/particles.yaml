# === Phase 5f Commit 9: arithmetic operators (Group D) ===================
# Word-form arithmetic: ``Dalawa dagdag tatlo ay lima`` "2+3=5",
# ``Sampu bawas tatlo ay pito`` "10-3=7", ``Dalawa beses tatlo ay
# anim`` "2*3=6", ``Anim hati sa dalawa ay tatlo`` "6/2=3". The
# operators are PART tokens with an ``OP`` feature; the Phase 5f
# Commit 9 arithmetic S rules consume them.
#
# ``dagdag`` and ``bawas`` already exist as VERB roots (in
# data/tgl/verbs.yaml) for the verbal "add to" / "subtract"
# meanings; the bare uninflected forms are _UNK from the verbal
# pipeline (no paradigm cell emits a bare form), so adding them
# here as PART introduces no ambiguity in their typical verbal
# uses (which always carry a voice/aspect prefix or infix).
#
# ``beses`` already exists as a NOUN with SEM_CLASS=FREQUENCY
# (Phase 5f Commit 5, used in periphrastic frequency phrases via
# the cardinal-NP-modifier rule). The PART entry coexists; the
# NOUN reading fires in NP positions, the PART reading fires in
# arithmetic-operator positions. Same coexistence pattern as
# ``na`` (LINK vs ASPECT_PART).
#
# Symbol-form arithmetic (``5 + 3 = 8``, ``6 / 2 = 3``) is
# enabled by the Phase 5f closing deferral on digit tokenization
# (post-PR follow-on, 2026-05-04): ``+`` / ``-`` / ``*`` / ``/``
# are PART entries with the same ``OP`` feature as their word-form
# counterparts, and ``=`` carries ``LINK=AY`` to slot into the
# existing arithmetic rule's ``PART[LINK=AY]`` daughter (where
# ``ay`` was the original equality marker). The plus / minus /
# times rule is shared with the word-form path; symbolic division
# uses a parallel 5-daughter rule (the word-form ``hati sa Y`` has
# 6 daughters because of the DAT divisor marker; symbolic
# ``X / Y = Z`` has none). (R&B 1986 §3 glances at this register;
# S&O 1972 doesn't cover it.)
- surface: dagdag
  pos: PART
  feats: {OP: PLUS}
- surface: bawas
  pos: PART
  feats: {OP: MINUS}
- surface: beses
  pos: PART
  feats: {OP: TIMES}
- surface: hati
  pos: PART
  feats: {OP: DIVIDE}
# Symbolic forms (digit tokenization closing deferral, 2026-05-04).
- surface: "+"
  pos: PART
  feats: {OP: PLUS}
- surface: "-"
  pos: PART
  feats: {OP: MINUS}
# Phase 8.R: ``-`` is Unicode HYPHEN-MINUS (U+002D), which the
# Unicode Standard explicitly notes is "used generically for
# hyphen, minus sign or en dash, all of which have dedicated
# alternatives" (U+2010 HYPHEN, U+2212 MINUS SIGN, U+2013 EN DASH).
# In the ASCII range we get only the polysemous form, so the lex
# carries two readings:
#   (1) ``PART[OP=MINUS]`` (above) — arithmetic minus operator,
#       used in symbolic arithmetic (``5 - 3``).
#   (2) ``PUNCT[PUNCT_CLASS=HYPHEN]`` (below) — orthographic
#       compound-joining hyphen, parallel to ``PUNCT[PUNCT_CLASS=
#       COMMA]`` for ``,``. Used in ``Alas-tres`` "3 o'clock" and
#       similar R&C 1990 hyphenated compounds.
# The chart picks the reading by rule context; the two readings
# sit in different POS slots so there is no spurious-ambiguity
# between arithmetic and compound-joining uses.
- surface: "-"
  pos: PUNCT
  feats: {PUNCT_CLASS: HYPHEN}
- surface: "*"
  pos: PART
  feats: {OP: TIMES}
- surface: "/"
  pos: PART
  feats: {OP: DIVIDE, SYMBOLIC: true}
- surface: "="
  pos: PART
  feats: {LINK: AY}

# === Phase 5f Commit 11: native time deictics (Group E item 5) ===========
# ``kanina`` "earlier today" and ``kamakalawa`` "day before
# yesterday" — native time deictics parallel to the existing
# ``kahapon`` / ``ngayon`` / ``bukas`` / ``mamaya`` ADV entries
# above. Both are ADVs that can attach as clause-level ADJUNCT
# (the bare-AdvP-as-ADJUNCT path is currently FREQUENCY-only —
# the TIME deferral from Phase 5e Commit 3 stays in force, so
# ``kanina`` / ``kamakalawa`` work in ay-fronting position
# already but not yet as bare clause-final adjuncts). The lex
# entries are added now so they're available when the TIME
# deferral lifts.
- surface: kanina
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST}
- surface: kamakalawa
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST}

# === Phase 5f Commit 12: minute-composition operators (Group E item 4) ===
# Spanish-borrowed minute operators for clock-time composition:
# ``alas otso y medya`` "8:30", ``alas otso y singko`` "8:05",
# ``alas otso menos singko`` "7:55". The ``y`` operator counts
# forward (adds minutes); ``menos`` counts backward (subtracts).
# Both PARTs feed the Phase 5f Commit 12 minute-composition
# grammar rules (src/tgllfg/cfg/nominal.py).
- surface: y
  pos: PART
  feats: {MINUTE_OP: "Y"}
- surface: menos
  pos: PART
  feats: {MINUTE_OP: "MENOS"}

# === Phase 8.R: clock-time hour marker `alas` =============================
# Spanish-loan clock-time marker fully grammaticalized in Tagalog
# (< Sp. "a las" = "at the (hours)"). Combines with a Spanish
# cardinal numeral via the Phase 8.R N-rule in cfg/nominal.py to
# build N[SEM_CLASS=TIME, HOUR_VALUE=X] — feeds the existing
# Phase 5f Commit 12 minute composition (``alas otso y medya``),
# Phase 5f Commit 14 ``mga`` approximation (``mga alas otso``),
# and all standard NP wrappers (``sa alas otso``, ``ng alas otso``,
# bare-N predication).
- surface: alas
  pos: PART
  feats: {CLOCK_MARKER: true, LEMMA: alas}

# === Phase 5f Commit 13: temporal-frame markers (Group F item 5) =========
# ``tuwing`` (every) and ``noong`` (last / past) introduce
# adverbial temporal frames over a bare-N complement:
# ``tuwing Lunes`` "every Monday", ``noong Pebrero`` "in
# February", ``noong umaga`` "this morning". Feed the new
# Phase 5f Commit 13 PP rule (PP → PART[TIME_FRAME] N).
- surface: tuwing
  pos: PART
  feats: {TIME_FRAME: "PERIODIC"}
- surface: noong
  pos: PART
  feats: {TIME_FRAME: "PAST"}

# === Phase 5f Commit 14: mga time approximation (Group E item 3) =========
# ``mga`` is the Tagalog plural / approximator particle. It marks
# plurality on regular nouns (``ang mga aklat`` "the books") AND
# approximation on temporal / quantitative NPs (``mga alasotso``
# "around 8 o'clock", ``mga sampu`` "around ten"). This commit
# adds the lex entry plus a grammar rule for the time-
# approximation reading; plural marking and cardinal
# approximation are deferred to follow-on commits.
#
# PLURAL_MARKER=YES distinguishes ``mga`` from other PARTs in
# the constraining equation on the approximator rule.
- surface: mga
  pos: PART
  feats: {PLURAL_MARKER: true}

# === Phase 5h Commit 3: comparative ``mas`` (Group A degree marker) ======
# Roadmap §12.1: pre-ADJ degree marker producing a comparative-
# wrapped adjective. ``mas matalino`` "more intelligent" is the
# canonical surface; the wrapped ADJ is itself an ADJ, so it
# composes with the existing Phase 5g predicative-adj clause rule
# (``Mas matalino siya``) and NP-internal modifier rules
# (``mas matalinong bata``) without further changes — the
# ``ADJ → PART[COMP_DEGREE=COMPARATIVE] ADJ`` wrapper rule in
# ``cfg/nominal.py`` lifts this single PART entry into both
# constructions.
#
# Phase 5h Commit 4 adds the ``kaysa`` comparison-complement
# wrapper for ``Mas matalino siya kaysa kay Maria``.
# Phase 5h Commit 7 generalises this rule to wrap Q[VAGUE=YES]
# heads (``mas marami`` / ``mas kaunti``) — quantifier-comparison
# rather than ADJ-comparison.
#
# Pre-state (verified 2026-05-05): ``mas`` was ``_UNK``;
# ``Mas matalino siya.`` "parsed" via the parser's
# ``_strip_non_content`` that silently drops ``_UNK``-only tokens,
# producing a single parse of the residue ``Matalino siya.``.
# Once this entry lands, ``mas`` is a known PART and the strip no
# longer fires; the new wrapper rule consumes the PART and produces
# a comparative-wrapped ADJ. Top-1 changes for any baseline-corpus
# entry containing ``mas`` are flagged in this commit's audit.
- surface: mas
  pos: PART
  feats: {COMP_DEGREE: COMPARATIVE}

# === Phase 5h Commit 4: comparison complement ``kaysa`` (Group A) =======
# Roadmap §12.1: ``kaysa`` introduces the comparison standard in
# the comparative frame ``Mas X kaysa kay Y`` / ``Mas X kaysa sa Y``
# "more X than Y". The standard NP is structured by the existing
# ``kay`` (HUMAN) / ``sa`` (default) ADP machinery — no new NP
# rules needed. ``kaysa`` itself is a single PART entry with
# ``COMP_PHRASE: KAYSA`` (mirroring the Phase 5f Commit 17 numeric
# comparator family ``higit`` / ``kulang`` / ``bababa`` / ``hihigit``,
# all carrying ``COMP_PHRASE`` tags).
#
# The grammar rule that consumes this PART is in ``cfg/clause.py``:
#
#     S → S PART[COMP_PHRASE=KAYSA] NP[CASE=DAT]
#
# Adjoins the kaysa-headed phrase to the matrix S's ADJUNCT set
# with ``ROLE: STANDARD``. Composes with the Phase 5h Commit 3
# comparative-ADJ wrapper unchanged: ``Mas matalino siya kaysa kay
# Maria`` is parsed as the inner S ``Mas matalino siya`` plus the
# adjoined ``kaysa kay Maria``.
#
# The plan does NOT constrain the inner S to carry ``COMP_DEGREE:
# COMPARATIVE``. Tagalog usage typically pairs ``kaysa`` with
# ``mas`` (or another degree marker), but bare comparisons
# (``Matalino si Maria kaysa kay Juan``) are attested in colloquial
# register; the permissive rule accepts both. Tightening to require
# COMPARATIVE on the inner predicate is deferred — it would need
# COMP_DEGREE to be lifted onto the matrix S by the predicative-adj
# clause rule, which currently keeps it on the ADJ daughter.
- surface: kaysa
  pos: PART
  feats: {COMP_PHRASE: KAYSA}

# === Phase 5h Commit 5: particle intensifiers (Group A degree markers) ===
# Free-word degree markers that wrap an ADJ via the linker (or, for
# ``medyo``, optionally without a linker). Each carries
# ``INTENSIFIER: YES`` plus a per-particle ``INTENSITY`` tag for
# downstream consumers (ranker / classifier).
#
# Surface forms:
#
#   sobrang ganda     "too / overly beautiful"   (sobra + bound -ng)
#   sobra na ganda    "too / overly beautiful"   (rare; with NA linker)
#   medyo maganda     "somewhat beautiful"        (medyo + zero linker)
#   medyo na maganda  "somewhat beautiful"        (with NA linker, less common)
#   talagang maganda  "really / truly beautiful"  (talaga + bound -ng)
#   lubos na maganda  "completely beautiful"      (lubos + NA linker)
#   masyadong mainit  "too hot"                   (masyado + bound -ng)
#   masyado na mainit "too hot"                   (with NA linker)
#
# The bound ``-ng`` forms are produced by ``split_linker_ng`` at
# the pre-parse stage once each particle is a known surface — no
# extra entries needed.
#
# The grammar rule that consumes these PARTs (in ``cfg/nominal.py``)
# is the intensifier-ADJ wrapper:
#
#   ADJ → PART[INTENSIFIER=YES] PART[LINK=NA] ADJ
#   ADJ → PART[INTENSIFIER=YES] PART[LINK=NG] ADJ
#   ADJ → PART[INTENSITY=MODERATE] ADJ      (medyo zero-linker)
#
# Pre-state (verified 2026-05-05): all five surfaces were ``_UNK``;
# ``Sobrang maganda ang bata.``, ``Talagang maganda ang bata.``,
# ``Lubos na maganda ang bata.`` "parsed" today by silently dropping
# the unknown intensifier (``_strip_non_content``) and treating the
# residue. After this commit, the proper PART entries trigger the
# intensifier-ADJ wrapper and the matrix carries
# ``INTENSIFIER: YES`` / ``INTENSITY: <tag>``. Top-1 changes for any
# baseline-corpus entry containing these surfaces are flagged in
# this commit's audit.
- surface: sobra
  pos: PART
  feats: {INTENSIFIER: true, INTENSITY: EXCESSIVE}
- surface: medyo
  pos: PART
  feats: {INTENSIFIER: true, INTENSITY: MODERATE}
- surface: talaga
  pos: PART
  feats: {INTENSIFIER: true, INTENSITY: EMPHATIC}
- surface: lubos
  pos: PART
  feats: {INTENSIFIER: true, INTENSITY: COMPLETE}
- surface: masyado
  pos: PART
  feats: {INTENSIFIER: true, INTENSITY: EXCESSIVE}

# === Phase 5i Commit 1: wh-words (adverbial + Q + comp + tag) ============
#
# Roadmap §12.1 / plan-of-record §4.2-4.4. Wh-words that fall outside
# the PRON paradigm (those live in pronouns.yaml). Four sub-clusters:
#
# (a) Adverbial wh (saan / kailan / bakit / paano / papaano) — wh-ADV
#     with WH=YES + ADV_TYPE classification. Phase 5i Commit 4 adds
#     the wh-ADV fronting rule that consumes these.
#
# (b) Quantitative + selectional wh (magkano / aling / alin-Q /
#     ilan-WH polysemy) — wh on Q heads. ``magkano`` is amount-wh;
#     ``aling`` is the bound-``-ng`` form for pre-N modifier use;
#     ``alin`` here is the Q-WH polysemy with the PRON entry in
#     pronouns.yaml; ``ilan`` adds a polysemous WH variant alongside
#     the Phase 5f Commit 15 vague-quantifier reading.
#
# (c) Complementizer ``kung`` (Phase 5i Commit 8 indirect-Q
#     embedding under control verbs).
#
# (d) Tag-Q particle ``di`` (Phase 5i Commit 7 ``di ba?`` tag).
#
# Pre-state (verified 2026-05-06): all eleven new surfaces were
# ``_UNK`` (except ``ilan`` which had its non-WH Q reading). Same
# silent-drop flip-risk pattern as Phase 5h Commits 3 / 5: once
# these entries land, the strip stops and the new fronting / wrap
# rules in Commits 2 / 4 / 7 / 8 must consume them. Audit before
# Commits 2 / 4: none of the corpus's 1251 baseline entries contain
# wh-words.
#
# Citations: S&O 1972 §6 (interrogatives), R&B 1986 (chapter on
# question formation), R&G 1981 §8.

# (a) Adverbial wh — ADV with WH=YES + per-wh ADV_TYPE
- surface: saan
  pos: ADV
  feats: {WH: true, ADV_TYPE: LOCATION, LEMMA: saan}
- surface: kailan
  pos: ADV
  feats: {WH: true, ADV_TYPE: TIME, LEMMA: kailan}
- surface: bakit
  pos: ADV
  feats: {WH: true, ADV_TYPE: REASON, LEMMA: bakit}
- surface: paano
  pos: ADV
  feats: {WH: true, ADV_TYPE: MANNER, LEMMA: paano}
- surface: papaano
  pos: ADV
  feats: {WH: true, ADV_TYPE: MANNER, LEMMA: papaano}
- surface: kumusta
  pos: ADV
  feats: {WH: true, ADV_TYPE: MANNER, LEMMA: kumusta}
  # Phase 8.N: Spanish-loan interrogative predicate ("how is X?").
  # Parallel registration to ``paano``/``papaano``; the bare NOUN
  # sense "regards, greetings" (``Magandang kumusta!``) lives in
  # ``nouns.yaml``. Both POS analyses are produced for the surface;
  # the parser selects on context.

# (b) Quantitative + selectional wh — Q heads
# magkano: amount-wh, never takes a count complement (`magkano ang
# halaga` "how much is the price?")
- surface: magkano
  pos: Q
  feats: {WH: true, QUANT: HOW_MUCH, VAGUE: true, LEMMA: magkano}
# alin: bare-form polysemy partner with the PRON entry in
# pronouns.yaml. Used standalone in predicative-Q contexts
# (``Alin ang aklat?`` parses via the Phase 5i cleft-style wh-
# fronting rule consuming the PRON reading) and as the pre-N
# selector head with bound ``-ng`` linker (``aling bata`` →
# ``alin`` + ``-ng`` + ``bata`` after ``split_linker_ng``).
# Phase 5i Commit 6 dropped the explicit ``aling`` entry so the
# pre-pass splits the bound form; without that split, the Phase
# 5f Commit 15 vague-Q NP-modifier rule (which expects three
# daughters: marker + Q + PART[LINK] + N) couldn't fire.
- surface: alin
  pos: Q
  feats: {WH: true, VAGUE: true, LEMMA: alin}
# ilan-WH: polysemy partner with the Phase 5f vague-Q reading
# (Q[QUANT=FEW, VAGUE=YES]). The wh variant has its own QUANT
# value (HOW_MANY); rule context disambiguates between ``Ilan
# ang aklat?`` (wh) and ``ilan ng aklat`` (vague — "a few books").
- surface: ilan
  pos: Q
  feats: {WH: true, QUANT: HOW_MANY, VAGUE: true, LEMMA: ilan}

# (c) Complementizer for indirect questions
- surface: kung
  pos: PART
  feats: {COMP_TYPE: INTERROG, LEMMA: kung}

# (d) Tag-Q particle (colloquial shortening of ``hindi``)
# Phase 5i Commit 7 builds ``di ba?`` from ``di`` + 2P-clitic ``ba``
# in a sentence-final tag rule.
- surface: di
  pos: PART
  feats: {NEG_TAG: true, LEMMA: di}

# === Phase 5j Commit 1: existential clause-typers =========================
#
# ``may`` / ``mayroon`` (positive existential), ``wala`` (negative
# existential), ``nasa`` (locative existential). Per roadmap §12.1
# these are clause-typing predicates, NOT V-headed verbal frames —
# they get PART lex with diagnostic feats and dedicated grammar rules
# in ``cfg/clause.py`` (Phase 5j Commits 2-5). Each surface carries
# YAML-string ``"YES"`` for category-pattern-matching consistency
# with Phase 5h / 5i (boolean YAML breaks the matchers).
#
# ``mayroon`` is etymologically ``may`` + ``doon`` "there"; in
# modern Tagalog they are interchangeable in the bare existential
# (``May tao``, ``Mayroong tao``), but ``mayroon`` is preferred
# before clitics / linker-bound complements. Both get the same
# {EXISTENTIAL: true, POLARITY: POS} feats.
#
# ``wala`` is vowel-final and triggers bound ``-ng`` linker
# (``Walang aklat``); ``split_linker_ng`` strips the linker once
# ``wala`` is a known surface.
#
# ``nasa`` is etymologically ``na`` + ``sa`` (the locative case
# marker) but synchronically a fixed clause-typer with its own
# ``LOC_EXISTENTIAL: "YES"`` flag and a dedicated three-daughter
# rule shape (Commit 4).
- surface: may
  pos: PART
  feats: {EXISTENTIAL: true, POLARITY: POS, LEMMA: may}
- surface: mayroon
  pos: PART
  feats: {EXISTENTIAL: true, POLARITY: POS, LEMMA: mayroon}
- surface: wala
  pos: PART
  feats: {EXISTENTIAL: true, POLARITY: NEG, LEMMA: wala}
- surface: nasa
  pos: PART
  feats: {LOC_EXISTENTIAL: true, LEMMA: nasa}

# === Phase 5j Commit 6: modal verbs =======================================
#
# Closed-class modal predicates that select an XCOMP complement
# clause. Like the Phase 4 §7.6 psych predicates and Phase 5i ``alam``,
# they're uninflected (no voice / aspect / mood — ``*nagdadapat``
# etc. are ungrammatical), so they live here as ``pos: VERB``
# entries with the ``MODAL: "YES"`` flag and a fresh
# ``CTRL_CLASS: MODAL`` to keep the Commit 7 modal control wrap
# from cross-firing on existing PSYCH / KNOW / RAISING control
# rules.
#
# Surface-variant collapse: ``puwede`` / ``pwede`` / ``puede`` are
# three orthographic variants of the same lemma (``puwede`` is
# canonical; ``pwede`` is the most common written form; ``puede``
# is older / Spanish-influenced spelling). All three indexed
# under LEMMA=puwede so the Commit 7 control wrap fires uniformly
# regardless of input spelling.
#
# ``kailangan`` polysemy: the modal ("need / must") and a noun
# ("need", as in ``ang kailangan ko`` "what I need"). Two
# separate entries — one VERB[MODAL=YES], one NOUN. Single
# surface, two readings; rule context disambiguates.
#
# Subject control: modals take a SUBJ (the actor / experiencer)
# and an XCOMP whose SUBJ is structure-shared with the matrix
# SUBJ (``Dapat akong kumain`` "I should eat" — the embedded
# kumain's SUBJ is the same as the matrix's SUBJ). The Commit 7
# control wrap implements this with ``(↑ XCOMP SUBJ) = (↑ SUBJ)``.
#
# Pre-state: pre-Commit-6 the parser silently dropped these as
# _UNK; ``Hindi ka dapat kumain.`` parses today as ``EAT <SUBJ>``
# with POLARITY=NEG (with ``dapat`` silently dropped). After
# Commit 6 the strip stops firing and the sentence returns 0
# parses (temporary regression); after Commit 7's modal control
# wrap fires, the sentence returns 1 parse with PRED=MODAL,
# POLARITY=NEG, and an embedded XCOMP. This is the documented
# Phase 5j flip-risk surface (plan-of-record §3 / §6 / §7.2).
- surface: dapat
  pos: VERB
  feats: {MODAL: true, CTRL_CLASS: MODAL, LEMMA: dapat}
- surface: puwede
  pos: VERB
  feats: {MODAL: true, CTRL_CLASS: MODAL, LEMMA: puwede}
- surface: pwede
  pos: VERB
  feats: {MODAL: true, CTRL_CLASS: MODAL, LEMMA: puwede}
- surface: puede
  pos: VERB
  feats: {MODAL: true, CTRL_CLASS: MODAL, LEMMA: puwede}
- surface: maaari
  pos: VERB
  feats: {MODAL: true, CTRL_CLASS: MODAL, LEMMA: maaari}
- surface: kailangan
  pos: VERB
  feats: {MODAL: true, CTRL_CLASS: MODAL, LEMMA: kailangan}

# === Phase 5k Commit 1: coordinator + punctuation lex inventory ============
#
# Roadmap §12.1 / Phase 5k plan-of-record §4.1-§4.4. Lex foundation
# for the Phase 5k coordination work: NP-level + clausal coordinators,
# the structural comma punct, and the negative-conjunct PARTs (lex
# only — used opportunistically by other commits).
#
# Coordinators are PART-typed clause-typers / NP-typers that lift
# COORD onto the matrix without introducing a separate coord-PRED
# (parallel to the Phase 5j PART-typed clause-typers ``may`` /
# ``wala`` / ``nasa``). The matrix coord rule sets ``(↑ COORD)``
# from the daughter; the conjuncts sit in a SET-valued CONJUNCTS
# feature on the matrix.
#
# COORD value taxonomy (mutually exclusive):
#   AND     — additive (``at``)
#   OR      — disjunctive (``o``)
#   BUT     — adversative (``pero`` / ``ngunit`` / ``subalit``)
#   SO      — consequence (``kaya`` qua coordinator — distinct
#             from the Phase 4 §7.6 PSYCH-verb ``kaya`` "be able
#             to" entry above; rule context disambiguates)
#   BUT_NOT — asymmetric (``Si Maria, hindi si Juan`` via ``hindi``)
#
# ``kaya`` polysemy: the existing PSYCH verb entry above (line ~523)
# is unchanged. This new PART[COORD=SO] entry shares the surface
# but the rule contexts (matrix S vs sister-of-S vs sister-of-NP)
# disambiguate. Same precedent as Phase 5j ``kailangan`` (V[MODAL]
# vs NOUN), Phase 5h ``pareho`` (predicative-ADJ vs Q-floated),
# Phase 5i ``alin`` / ``ilan`` (PRON / Q polysemy).
#
# Punctuation: the structural comma is added as ``pos: PUNCT`` so
# the multi-conjunct (Oxford comma + ``at``) and asymmetric coord
# rules can consume it as a daughter. The tokenizer
# (``text/tokenizer.py``, regex ``\w+|\S``) already emits ``,`` as a
# standalone token; without this lex entry it falls through as
# ``_UNK`` and gets silently dropped, hiding the structural role.
#
# Negative-conjunct PARTs (``kundi`` / ``pati`` / ``lamang``) are
# added here for opportunistic use by later constructions —
# correlative coordination ``hindi lang … kundi pati`` is deferred
# to a Phase 5k follow-on or Phase 5l (per plan-of-record §1
# / §9.2), but the lex entries cost almost nothing and unblock
# composition with existing rules. ``lamang`` is the formal
# of ``lang`` and is structurally identical (2P enclitic, ADV=ONLY).
- surface: at
  pos: PART
  feats: {COORD: AND, LEMMA: at}
- surface: o
  pos: PART
  feats: {COORD: OR, LEMMA: o}
- surface: pero
  pos: PART
  feats: {COORD: BUT, LEMMA: pero}
- surface: ngunit
  pos: PART
  feats: {COORD: BUT, LEMMA: ngunit}
- surface: subalit
  pos: PART
  feats: {COORD: BUT, LEMMA: subalit}
- surface: kaya
  pos: PART
  feats: {COORD: SO, LEMMA: kaya}
- surface: ","
  pos: PUNCT
  feats: {LEMMA: ",", PUNCT_CLASS: COMMA}
- surface: kundi
  pos: PART
  feats: {COORD: BUT_NOT, LEMMA: kundi}
- surface: pati
  pos: PART
  feats: {ADV: ALSO_INCL, LEMMA: pati}
# Phase 5n.A Commit 16 (§18 L82): ``saka`` "later/next/then" — lex
# component of the ``at saka`` multi-word coord ("and also / and
# then"). LEMMA-only entry feeds the multi-word combining rule in
# cfg/coordination.py; the matrix output is COORD=AND with
# SEQUENCE=YES discriminator.
- surface: saka
  pos: PART
  feats: {LEMMA: saka}
- surface: lamang
  pos: PART
  feats: {ADV: ONLY, LEMMA: lamang, is_clitic: true, CLITIC_CLASS: 2P}

# === Phase 5k Commit 7 + Phase 5n.A Commit 22: `naman` particle ==========
#
# ``naman`` has two distinct lex entries:
#
# 1. Non-clitic entry (Phase 5k Commit 7): consumed structurally by
#    the ``kaya naman`` two-word coord rule
#    (``S → S PART[COORD=SO] PART[ADV=ALSO] S``). Lacks
#    ``is_clitic`` so ``reorder_clitics`` leaves it in place,
#    preserving the fixed ``kaya naman`` adjacency.
#
# 2. Clitic entry (Phase 5n.A Commit 22, closes §18 L88): a 2P
#    enclitic parallel to ``din`` / ``rin``, also ADV=ALSO. Used
#    in free-standing forms like ``Kumain naman ako`` "I ate
#    too" where ``naman`` placement follows the standard 2P
#    Wackernagel pattern.
#
# Both entries share ADV=ALSO. The 2P-clitic absorption rule
# (``S → S PART[CLITIC_CLASS=2P]``) selects the clitic entry via
# the CLITIC_CLASS=2P daughter constraint; the kaya-naman rule
# selects the non-clitic entry via structural context (PART
# sandwiched between two complete S clauses with leading
# ``kaya``). Neither entry crossfires into the other's structural
# context: the clitic entry's reorder pass moves it next to a
# verbal host (incompatible with kaya-naman's between-Ss
# adjacency), while the non-clitic entry has no CLITIC_CLASS so
# the absorption rule's =c constraint rejects it.
- surface: naman
  pos: PART
  feats: {ADV: ALSO, LEMMA: naman}
- surface: naman
  pos: PART
  feats: {ADV: ALSO, LEMMA: naman}
  is_clitic: true
  clitic_class: 2P

# === Phase 5l Commit 1: subordinators (PART[COMP_TYPE=X]) + sana ==========
#
# Subordinator lex inventory for Phase 5l (subordination). Each
# subordinator is PART-typed with a ``COMP_TYPE`` feature that
# names the semantic role of the subordinate clause it heads —
# COND / CONC / TEMP_BEFORE / TEMP_AFTER / TEMP_WHILE /
# TEMP_UNTIL / TEMP_SINCE / TEMP_WHEN / PURP / REAS. The Phase 5i entry
# ``kung[COMP_TYPE=INTERROG]`` (above) is preserved; this commit
# adds a second ``kung`` entry with COMP_TYPE=COND. The chart
# picks the right reading from the rule context (sentence-initial
# / matrix-adjunct vs post-V[ASK]).
#
# ``para`` and ``dahil`` already exist as PREP entries (Phase 5e
# Commit 3) for ``para sa NP`` "for X" and ``dahil sa NP`` "because
# of X". Phase 5l adds NEW PART entries for the S-taking
# subordinator readings (``para S`` "in order to S",
# ``dahil S`` "because S"). Polysemy is resolved by POS — the
# chart picks PREP for NP complements, PART for S complements.
# Same precedent as Phase 5j ``wala`` (existential PART vs
# locative VERB).
#
# ``sana`` is a 2P enclitic (NOT a subordinator) that marks the
# matrix S as counterfactual (``Pumunta sana ako`` "I would have
# gone"). It carries ``is_clitic: true`` + a diagnostic
# ``COUNTERFACTUAL: "YES"`` feat. Cluster priority lives in
# ``data/tgl/clitics.yaml``.

# (a) Conditional — ``kung`` / ``kapag`` / ``pag`` / ``'pag`` / ``sakali``
#
# ``kapag`` is the canonical full form; ``pag`` is the colloquial
# short form; ``'pag`` is the elision-marked spelling of the short
# form (apostrophe = "elided ``ka``"). Phase 5n.A Commit 23 closes
# §18 L107 by routing all short forms to LEMMA=kapag via the
# Phase 5j Commit 7 LEMMA-collapse mechanic.
#
# The ``'pag`` surface is handled by the existing tokenization
# pipeline rather than a dedicated lex entry: the tokenizer splits
# ``'pag`` into ``'`` + ``pag`` (the ``'`` is a non-word character;
# see ``text/tokenizer.py``), then the parser's
# ``_strip_non_content`` filter drops the standalone apostrophe and
# the ``pag`` entry below matches the remainder. Adding a literal
# ``'pag`` lex entry would never fire because the tokenizer never
# yields a single ``'pag`` token.
- surface: kung
  pos: PART
  feats: {COMP_TYPE: COND, LEMMA: kung}
- surface: kapag
  pos: PART
  feats: {COMP_TYPE: COND, LEMMA: kapag}
- surface: pag
  pos: PART
  feats: {COMP_TYPE: COND, LEMMA: kapag}
- surface: sakali
  pos: PART
  feats: {COMP_TYPE: COND, LEMMA: sakali, SUBORD_VARIANT: IN_CASE}

# (b) Concessive — ``kahit`` / ``bagaman`` / ``bagamat``
#
# ``bagaman`` is the canonical full form; ``bagamat`` is the
# colloquial elided variant ("bagaman + at" → "bagamat", with
# the ``-an`` weakening to ``-a-`` before the suffixed ``at``).
# Phase 5n.A Commit 23 closes §18 L94 by adding ``bagamat`` as a
# distinct surface entry with LEMMA=bagaman so the LEMMA-collapse
# mechanic routes both surfaces to the canonical lemma.
- surface: kahit
  pos: PART
  feats: {COMP_TYPE: CONC, LEMMA: kahit}
- surface: bagaman
  pos: PART
  feats: {COMP_TYPE: CONC, LEMMA: bagaman, REGISTER: FORMAL}
- surface: bagamat
  pos: PART
  feats: {COMP_TYPE: CONC, LEMMA: bagaman, REGISTER: FORMAL}

# (c) Temporal — ``bago`` / ``pagkatapos`` / ``habang`` /
# ``hanggang`` / ``nang`` (post ``mula`` for "since")
- surface: bago
  pos: PART
  feats: {COMP_TYPE: TEMP_BEFORE, LEMMA: bago}
- surface: pagkatapos
  pos: PART
  feats: {COMP_TYPE: TEMP_AFTER, LEMMA: pagkatapos}
- surface: habang
  pos: PART
  feats: {COMP_TYPE: TEMP_WHILE, LEMMA: habang}
- surface: hanggang
  pos: PART
  feats: {COMP_TYPE: TEMP_UNTIL, LEMMA: hanggang}
- surface: nang
  pos: PART
  feats: {COMP_TYPE: TEMP_SINCE, LEMMA: nang, SUBORD_VARIANT: SINCE}
# Phase 8.M: ``nang`` as bare TEMP_WHEN subordinator ("when X happened").
# Distinct lex entry from the TEMP_SINCE variant above which only fires
# composed with ``mula`` (Phase 5l C7 ``mula nang`` rule). Bare ``Nang
# VERB[PFV] ..., S`` is the audit-named target from R&C 1990 / S&O 1972.
- surface: nang
  pos: PART
  feats: {COMP_TYPE: TEMP_WHEN, LEMMA: nang, SUBORD_VARIANT: WHEN}

# (d) Purpose — ``para`` (S-taking; second entry) / ``upang``
- surface: para
  pos: PART
  feats: {COMP_TYPE: PURP, LEMMA: para}
- surface: upang
  pos: PART
  feats: {COMP_TYPE: PURP, LEMMA: upang, REGISTER: FORMAL}

# (e) Reason — ``dahil`` (S-taking; second entry)
- surface: dahil
  pos: PART
  feats: {COMP_TYPE: REAS, LEMMA: dahil}

# (f) Counterfactual enclitic — ``sana``
- surface: sana
  pos: PART
  feats: {COUNTERFACTUAL: true, is_clitic: true, CLITIC_CLASS: 2P, LEMMA: sana}

# === Phase 5m Commit 1: discourse / register / indefinite particles ========
#
# Roadmap §12.1 (Phase 5m). Six lex sub-blocks covering politeness
# clitics, modal/mood particles, discourse connectives (single- and
# multi-word components), the emphatic post-N particle ``mismo``, and
# frequency-adverb expansion of the Phase 5f Commit 5 sentential-FREQ
# slot. Reference: R&B 1986 §15.4 / §15.5 / §15.7; R&G 1981 §6.6 /
# §7.3; S&O 1972 §3.5.
#
# (a) Politeness 2P clitics
#
# ``po`` (formal) and ``ho`` (colloquial-polite) are 2P enclitics
# adding REGISTER=POLITE / COLLOQUIAL_POLITE to the matrix S via
# the existing Phase 5i Rule A (generic 2P absorption). Distribution
# covers both clause-medial (``Pumupunta po siya``) and clause-final
# (``Salamat po``) positions; the Wackernagel placement logic
# admits both. Reference: R&B 1986 §15.4.
- surface: po
  pos: PART
  feats: {REGISTER: POLITE, LEMMA: po}
  is_clitic: true
  clitic_class: 2P
- surface: ho
  pos: PART
  feats: {REGISTER: COLLOQUIAL_POLITE, LEMMA: ho}
  is_clitic: true
  clitic_class: 2P

# (b) Modal / mood particles
#
# ``siguro`` (colloquial) and ``marahil`` (formal) are epistemic
# particles ("maybe / perhaps") with two attested surface positions:
#
# * **Sentence-initial**: ``Siguro pumupunta siya.`` Composes via
#   the Phase 5m Commit 4 rule ``S → PART[DISCOURSE_POS=
#   SENTENCE_INITIAL] S`` (cfg/discourse.py). The original entry.
#
# * **Clause-medial 2P-clitic** (Phase 5n.B Commit 16, §18 L98):
#   ``Pumupunta siguro siya.`` Composes via the Phase 4 §7.3
#   generic 2P-clitic absorption rule (cfg/clitic.py Rule A),
#   parallel to other 2P clitics (na / pa / daw / rin / nga / lang).
#   The clitic-cluster placement engine handles the surface
#   ordering. The polysemous entry pattern (mirroring kung —
#   COND vs INTERROG — and other 5l/5m polysemy resolutions)
#   keeps the two readings disjoint at parse time: clause-initial
#   surfaces consume the DISCOURSE_POS=SENTENCE_INITIAL entry;
#   clause-medial surfaces consume the CLITIC_CLASS=2P entry.
#
# Reference: R&B 1986 §15.5.
- surface: siguro
  pos: PART
  feats: {EPISTEMIC: PROBABLY, DISCOURSE_POS: SENTENCE_INITIAL, LEMMA: siguro}
- surface: siguro
  pos: PART
  feats: {EPISTEMIC: PROBABLY, is_clitic: true, CLITIC_CLASS: 2P, LEMMA: siguro}
- surface: marahil
  pos: PART
  feats: {EPISTEMIC: PROBABLY, DISCOURSE_POS: SENTENCE_INITIAL, REGISTER: FORMAL, LEMMA: marahil}
- surface: marahil
  pos: PART
  feats: {EPISTEMIC: PROBABLY, is_clitic: true, CLITIC_CLASS: 2P, LEMMA: marahil}

# (c) Discourse connectives — single-word (sentence-initial)
#
# Both feed the same sentence-initial PART rule as the modal
# particles in (b) via DISCOURSE_POS=SENTENCE_INITIAL. The
# DISCOURSE feat distinguishes the connective sense for downstream
# semantics. Reference: R&B 1986 §15.7.
- surface: samakatuwid
  pos: PART
  feats: {DISCOURSE: THEREFORE, DISCOURSE_POS: SENTENCE_INITIAL, LEMMA: samakatuwid}
- surface: gayunpaman
  pos: PART
  feats: {DISCOURSE: HOWEVER, DISCOURSE_POS: SENTENCE_INITIAL, LEMMA: gayunpaman}

# (d) Discourse connective heads — multi-word components
#
# ``gayon`` / ``ganon`` (LEMMA-only PARTs) feed the Phase 5m Commit
# 11 multi-word rule ``PART[DISCOURSE=LIKEWISE] → PART[gayon|ganon]
# PART[din]``; the existing ``din`` 2P-clitic PART (line 617) is
# the second daughter. ``bukod`` feeds ``PART[DISCOURSE=ALSO] →
# PART[bukod] ADP[dito]`` against the existing demonstrative
# ``dito`` entry (line 49) — mixed-POS daughters are required
# because ``dito`` is the locative DEM, not a PART. The virtual
# PART output of these rules carries DISCOURSE_POS=SENTENCE_INITIAL
# so it slots into the sentence-initial-ADV rule of (c).
- surface: gayon
  pos: PART
  feats: {LEMMA: gayon}
- surface: ganon
  pos: PART
  feats: {LEMMA: ganon}
- surface: bukod
  pos: PART
  feats: {LEMMA: bukod}

# (e) Emphatic post-N particle
#
# ``mismo`` "self / exactly" attaches post-N as an ADJUNCT
# (``Maria mismo`` "Maria herself"). Distribution: post-NP only —
# pre-NP attachment is ungrammatical in Tagalog (cf. Spanish
# ``mismo Juan`` is valid but the Tagalog calque inverts).
# Composes via Phase 5m Commit 7 rule ``NP → NP PART[EMPHATIC=YES,
# LEMMA=mismo]``. Reference: R&G 1981 §7.3.
- surface: mismo
  pos: PART
  feats: {EMPHATIC: true, LEMMA: mismo}

# (f) Frequency adverbs — extends Phase 5f Commit 5 sentential-FREQ
#
# ``madalas`` "often", ``palagi`` "always", ``lagi`` "always
# (clitic-host variant)", ``minsan`` "sometimes / once". All carry
# ADV_TYPE=FREQUENCY which routes through the existing Phase 5f
# Commit 5 rule ``S → S AdvP[FREQ]`` in cfg/discourse.py. The new
# FREQ_VALUE feat (HIGH / HABITUAL / SOMETIMES / OCCASIONAL) is
# diagnostic only — it doesn't gate any grammar rule. Reference:
# S&O 1972 §3.5.
#
# Phase 6.I Commit 3 (§18.1.2 L105 close): ``paminsan-minsan``
# "occasionally" is now produced **productively** by the Phase 6.I
# Commit 2 ``adv_redup`` paradigm cell in ``data/tgl/paradigms.yaml``
# rather than as a static entry. The ``minsan`` entry below carries
# ``affix_class: [adv_redup]`` to opt into the productive derivation;
# the analyzer's new ``_index_particle_paradigms`` method generates
# the joined surface ``paminsanminsan`` with canonical hyphenated
# LEMMA ``paminsan-minsan`` and FREQ_VALUE=OCCASIONAL. The previous
# static ``paminsanminsan`` entry has been removed. The Phase 5f
# Commit 14 ``merge_hyphen_compounds`` tokenizer pre-pass continues
# to collapse the hyphenated input form to the joined surface for
# analyzer lookup (unchanged).
- surface: madalas
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: HIGH, LEMMA: madalas}
- surface: palagi
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: HABITUAL, LEMMA: palagi}
- surface: lagi
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: HABITUAL, LEMMA: lagi}
- surface: minsan
  pos: ADV
  affix_class: [adv_redup]
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: SOMETIMES, LEMMA: minsan}

# Phase 5n.B Commit 4 (§18 L40): pinaka- superlative ADV-FREQUENCY
# variants. Parallel to the Q-superlative entries above; the
# COMP_DEGREE=SUPERLATIVE rides into the existing Phase 5f Commit
# 5 sentential-FREQ ADV rule unchanged. ``pinakamadalas`` "most
# often" is the canonical example from §18 L40 — Phase 5h §9.2
# called out explicitly. ``palagi`` / ``lagi`` (always-class)
# don't naturally accept ``pinaka-`` ("most always" is degenerate);
# only ``madalas`` / ``minsan`` get the superlative form.
- surface: pinakamadalas
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: HIGH, COMP_DEGREE: SUPERLATIVE, LEMMA: madalas}
- surface: pinakaminsan
  pos: ADV
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: SOMETIMES, COMP_DEGREE: SUPERLATIVE, LEMMA: minsan}

# === Phase 5n.A Commit 5: mag-isa "alone" manner adverb (§18 L60) ===========
#
# ``mag-isa`` "alone / by oneself" is a hyphenated manner adverb that
# the default tokenizer splits on the hyphen into three tokens
# (``mag``, ``-``, ``isa``). The lex carries the joined form
# ``magisa`` so the Phase 5f Commit 14 ``merge_hyphen_compounds``
# pre-pass collapses the three tokens into one ``magisa`` token; the
# Phase 5j Commit 7 / Phase 5n.A Commit 4 LEMMA-collapse then maps the
# analysis's ``lemma`` field to the canonical hyphenated form
# ``mag-isa`` so the surface variant routes to a single canonical
# entry. Same pattern as Phase 5m Commit 5's
# ``paminsanminsan`` / ``LEMMA: paminsan-minsan``.
#
# The ``MAGISA: YES`` diagnostic flag is set so future grammar rules
# can constrain on it specifically. ADV_TYPE=MANNER aligns the entry
# with the existing wh-MANNER ``paano`` / ``papaano`` (Phase 5i)
# taxonomy.
#
# Required for R&G "Ang Manok" simple #3 (``Nakatira siyang mag-isa
# sa bahay.`` "He lives alone in the house"). The full integration
# parse depends on Commit 6 (``nakatira`` resultative paradigm) and
# Commit 7 (R&G simples #1/#3 unblock with ``mama`` lex). This
# commit lands the lex + tokenizer piece in isolation. References:
# S&O 1972 §3.5; R&G 1981 §6.6.
- surface: magisa
  pos: ADV
  feats: {ADV_TYPE: MANNER, MAGISA: true, LEMMA: mag-isa}

# === Phase 8.D2: discourse-interjection PARTs ===========================
#
# Affirmation / negation / deictic interjections used sentence-
# initially with a comma break (``Oo, kumain siya.`` "Yes, he ate.").
# The ``INTERJ: true`` feature gates the Phase 8.D2 PART-variant of
# the comma-fronted topic rule in ``cfg/clause.py``
# (``S → PART[INTERJ=true] PUNCT[COMMA] S``); other PARTs (linkers,
# 2P clitics, coordinators, etc.) lack the feat and don't match.
#
# ``opo`` is the polite-affirmation register form of ``oo`` (same
# semantics, REGISTER=POLITE per Phase 5m convention).
#
# References: Schachter & Otanes 1972 §15 (interjections);
# R&G 1981 §3 (greetings + affirmations).
- surface: oo
  pos: PART
  feats: {INTERJ: true, AFFIRM: true, LEMMA: oo}
- surface: opo
  pos: PART
  feats: {INTERJ: true, AFFIRM: true, REGISTER: POLITE, LEMMA: opo}
- surface: eto
  pos: PART
  feats: {INTERJ: true, DEICTIC: true, LEMMA: eto}

# === Phase 9.G: discourse markers + temporal adverbs + locative variants ===
#
# 12 audit-attested entries closing the rank-3..25 discourse / particle /
# locative gap in the post-9.F OOV TSV.
#
# Discourse interjections extend the Phase 8.D2 INTERJ family
# (aba/ha/heto). Locative existentials (narito) parallel nasa.
# DAT/DEM variants (rito/roon) are post-d→r-sandhi spellings
# pointing at canonical dito/doon via LEMMA. Temporal adverbs
# (noon/kagabi) extend the kahapon/ngayon/bukas/mamaya family.
# Discourse markers (muna/sige/tuloy) cover high-frequency
# audit-corpus particles.

- surface: aba
  pos: PART
  feats: {INTERJ: true, LEMMA: aba}
- surface: ha
  pos: PART
  feats: {INTERJ: true, LEMMA: ha}
- surface: heto
  pos: PART
  feats: {INTERJ: true, DEICTIC: true, LEMMA: heto}

- surface: narito
  pos: PART
  feats: {LOC_EXISTENTIAL: true, DEIXIS: PROX, LEMMA: narito}

- surface: rito
  pos: ADP
  feats: {CASE: DAT, DEIXIS: PROX, DEM: true, LEMMA: dito}
- surface: roon
  pos: ADP
  feats: {CASE: DAT, DEIXIS: DIST, DEM: true, LEMMA: doon}

- surface: noon
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST, LEMMA: noon}
- surface: kagabi
  pos: ADV
  feats: {ADV_TYPE: TIME, DEIXIS_TIME: PAST, LEMMA: kagabi}

- surface: ganoon
  pos: PART
  feats: {LEMMA: ganon}

- surface: muna
  pos: PART
  feats: {ADV: FIRST, LEMMA: muna}
  is_clitic: true
  clitic_class: 2P
- surface: sige
  pos: PART
  feats: {DISCOURSE: GO_AHEAD, DISCOURSE_POS: SENTENCE_INITIAL, LEMMA: sige}
- surface: tuloy
  pos: PART
  feats: {DISCOURSE: SO, LEMMA: tuloy}
