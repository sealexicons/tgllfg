# data/tgl/pronouns.yaml
#
# Full Tagalog personal pronoun paradigm: 7 person/number/clusivity
# slots × 3 cases (NOM, GEN, DAT). 2sg-NOM has two forms — the full
# `ikaw` and the second-position clitic `ka`. Genitive forms are
# clitics and pattern with the Wackernagel cluster (handled
# orthographically by clitics.py and syntactically in §7.3).
#
# Feature conventions:
#   PERS  ∈ {1, 2, 3}
#   NUM   ∈ {SG, PL}
#   CLUSV ∈ {INCL, EXCL}  (only on 1pl)
#   CASE  ∈ {NOM, GEN, DAT}
#
# Citations: Schachter & Otanes 1972 §3.2; Kroeger 1993 §2.2.

# --- 1sg ---
- surface: ako
  feats: {PERS: 1, NUM: SG, CASE: NOM}
  # Phase 5n.A Commit 2 (§18 L69): is_clitic: true added for the
  # full NOM-PRON inventory. Per Kroeger 1993 ch. 5 / S&O 1972 §3.2,
  # ``ako`` / ``siya`` / ``tayo`` / ``kami`` / ``kayo`` / ``sila``
  # are all 2P (Wackernagel) clitics in canonical surface position
  # (``Kumain ako``, ``Pumupunta ako``); the prior absence of
  # ``is_clitic: true`` on these entries blocked the Phase 4 §7.2
  # hindi-wrap from absorbing them, leaving sentences like
  # ``Hindi ako kumain`` / ``Hindi siya kumain`` 0-parsing despite
  # the canonical ``Hindi ka kumain`` working. Topic-position uses
  # (``Ako ay kumain`` ay-fronting; cleft ``Ako ang kumain``) are
  # preserved by a placement-pass exception that suppresses the
  # 2P move when the PRON is immediately followed by ``ay`` (see
  # ``src/tgllfg/clitics/placement.py:_is_pre_ay_pron``).
  is_clitic: true
- surface: ko
  feats: {PERS: 1, NUM: SG, CASE: GEN}
  is_clitic: true
- surface: akin
  feats: {PERS: 1, NUM: SG, CASE: DAT}

# --- 1pl inclusive ---
- surface: tayo
  feats: {PERS: 1, NUM: PL, CLUSV: INCL, CASE: NOM}
  is_clitic: true
- surface: natin
  feats: {PERS: 1, NUM: PL, CLUSV: INCL, CASE: GEN}
  is_clitic: true
- surface: atin
  feats: {PERS: 1, NUM: PL, CLUSV: INCL, CASE: DAT}

# --- 1pl exclusive ---
- surface: kami
  feats: {PERS: 1, NUM: PL, CLUSV: EXCL, CASE: NOM}
  is_clitic: true
- surface: namin
  feats: {PERS: 1, NUM: PL, CLUSV: EXCL, CASE: GEN}
  is_clitic: true
- surface: amin
  feats: {PERS: 1, NUM: PL, CLUSV: EXCL, CASE: DAT}

# --- 2sg ---
- surface: ikaw
  feats: {PERS: 2, NUM: SG, CASE: NOM}
  # ``ikaw`` is the strong / non-clitic 2sg-NOM counterpart used in
  # topic and cleft positions (``Ikaw ay kumain``, ``Ikaw ang
  # kumain``); no ``is_clitic`` flag — the clitic counterpart is
  # ``ka`` below.
- surface: ka
  feats: {PERS: 2, NUM: SG, CASE: NOM}
  is_clitic: true
- surface: mo
  feats: {PERS: 2, NUM: SG, CASE: GEN}
  is_clitic: true
- surface: iyo
  feats: {PERS: 2, NUM: SG, CASE: DAT}

# --- 2pl ---
- surface: kayo
  feats: {PERS: 2, NUM: PL, CASE: NOM}
  is_clitic: true
- surface: ninyo
  feats: {PERS: 2, NUM: PL, CASE: GEN}
  is_clitic: true
- surface: inyo
  feats: {PERS: 2, NUM: PL, CASE: DAT}

# --- 3sg ---
- surface: siya
  feats: {PERS: 3, NUM: SG, CASE: NOM}
  is_clitic: true
- surface: niya
  feats: {PERS: 3, NUM: SG, CASE: GEN}
  is_clitic: true
- surface: kanya
  feats: {PERS: 3, NUM: SG, CASE: DAT}

# --- 3pl ---
- surface: sila
  feats: {PERS: 3, NUM: PL, CASE: NOM}
  is_clitic: true
- surface: nila
  feats: {PERS: 3, NUM: PL, CASE: GEN}
  is_clitic: true
- surface: kanila
  feats: {PERS: 3, NUM: PL, CASE: DAT}

# --- Phase 5e Commit 20: kita fused clitic (1sg-GEN actor + 2sg-NOM SUBJ) ---
#
# Tagalog has a special second-position clitic ``kita`` that fuses
# the 1sg-GEN actor and 2sg-NOM SUBJ of a non-AV verb into a single
# token: ``Kinain kita`` "I ate you", ``Nakita kita`` "I saw you",
# ``Bibigyan kita ng libro`` "I will give you a book". The fusion
# is obligatory — *``Kinain ko ka`` is ungrammatical in modern
# Tagalog (Schachter & Otanes 1972 §3.2; Kroeger 1993 §2.2).
#
# The lex entry carries only the ``KITA: YES`` marker; the actual
# person/number/case feats for the two argument slots are set by
# the grammar rules in src/tgllfg/cfg/clitic.py (Phase 5e Commit
# 20 section). This keeps the lex flat (the loader doesn't support
# nested feats in pronouns.yaml) while letting the grammar route
# the dual binding into SUBJ and OBJ-AGENT.
#
# Note: ``kita`` also exists as a verb root (kita = "see, meet";
# see data/tgl/verbs.yaml). The morph analyzer returns BOTH
# analyses; the chart parser picks the PRON path when the syntactic
# context calls for a clitic.
- surface: kita
  feats: {KITA: "YES"}
  is_clitic: true

# === Phase 5i Commit 1: pronominal wh-words ============================
# Roadmap §12.1 / plan-of-record §4.1. Wh-PRONs that fill NP slots in
# Tagalog questions. Each carries ``WH: "YES"`` plus the standard
# PRON case feat so the existing Phase 4 NP-from-PRON shells
# (``NP[CASE=NOM] → PRON[CASE=NOM]`` etc.) consume them unchanged.
# The Phase 5i wh-fronting rules (Commit 2) constrain on ``WH=YES``
# to fire on these PRONs only.
#
# Pronominal wh inventory (S&O 1972 §6 / R&B 1986):
#
#   sino    "who"             — NOM, HUMAN
#   ano     "what"            — NOM (also fills OBL position in-situ)
#   kanino  "whose / to whom" — DAT, HUMAN (possessor / recipient wh)
#   alin    "which one"       — NOM (standalone form; pre-N selector
#                                ``aling`` lives in particles.yaml as Q-WH)
#
# Pre-state (verified 2026-05-06): all four were ``_UNK``. The
# parser's ``_strip_non_content`` silently dropped them, producing
# bogus parses for sentences like ``Saan ka pumunta?`` (saan _UNK,
# residue ``Pumunta ka.`` parsed as AV-intransitive). Once these
# entries land, the strip stops and Commit 2's wh-fronting rule
# consumes the PRON.
- surface: sino
  feats: {WH: "YES", CASE: NOM, HUMAN: True, LEMMA: sino}
- surface: ano
  feats: {WH: "YES", CASE: NOM, LEMMA: ano}
- surface: kanino
  feats: {WH: "YES", CASE: DAT, HUMAN: True, LEMMA: kanino}
- surface: alin
  feats: {WH: "YES", CASE: NOM, LEMMA: alin}

# === Phase 5m Commit 1: indefinite + answer-interjection PRONs =============
#
# Roadmap §12.1 (Phase 5m). Three new PRON entries.
#
# ``sinuman`` is the negative-indefinite "anyone / no one" used in
# the construction ``walang sinuman ang dumating`` "nobody came",
# composing via the existing Phase 5j ``walang NP`` existential
# negation grammar. Distribution: NOM only (no GEN/DAT-marked
# variants attested; defer if corpus pressure surfaces).
# Reference: R&G 1981 §6.6.
#
# ``opo`` / ``oho`` are fused affirmative-answer interjections
# (``opo`` = ``oo`` + ``po``; ``oho`` = ``oo`` + ``ho``). Lex'd
# as PRON[INTERJ=YES, ANSWER=AFFIRM] so they compose as
# stand-alone clause answers via the existing Phase 4 fragment-
# answer mechanism (parallel to ``oo`` / ``hindi`` PRON entries).
# REGISTER distinguishes them. Reference: R&B 1986 §15.4.
- surface: sinuman
  feats: {PRED: SOMEONE_NEG_INDEF, INDEF: NEG_INDEF, NUM: SG, PERS: 3, CASE: NOM, LEMMA: sinuman}
- surface: opo
  feats: {PRED: "YES", INTERJ: "YES", ANSWER: AFFIRM, REGISTER: POLITE, LEMMA: opo}
- surface: oho
  feats: {PRED: "YES", INTERJ: "YES", ANSWER: AFFIRM, REGISTER: COLLOQUIAL_POLITE, LEMMA: oho}
