  # implicit, often surfacing as a dahil-PP). Audit-corpus reach:
  # wave-2 rg-intermediate sent-1762 ``Nag-away sina Marina at
  # Ester dahil sa tsismis.`` "Marina and Ester quarreled because
  # of gossip" (closes with the paired ``tsismis`` NOUN below).
  # Parallel to ``maneho`` / ``kuwento`` / ``sagot`` / ``sunod``
  # / ``kilala`` in the AV_ABSOL family.
  # Phase 10.J.post-12.12: ``makipag`` opt-in admits AV-INTERACTION
  # ``makipag-away`` "fight with X" (S&O 1972 §5.27).
  affix_class: [um, mag, in_oblig, maka, makipag]
  feats: {AV_ABSOL: true}

