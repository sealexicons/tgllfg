# data/tgl/verbs.yaml
#
# Tagalog seed verb lexicon (split from data/tgl/roots.yaml,
# 2026-05-04, see docs/refactor-grammar-and-roots.md). Each verb
# declares its `affix_class` — the paradigm patterns it participates
# in. Generation only fires for cells whose affix_class is in the
# root's list, so a -um- only root never produces ungrammatical
# mag-/mang- forms.
#
# Affix-class vocabulary (Phase 2 supported set):
#
#   um         — AV with -um- infix
#   mag        — AV with mag-/nag- prefix
#   mang       — AV with mang-/nang- distributive + nasal substitution
#   maka       — AV with naka-/maka- abilitative (MOOD=ABIL)
#   in_oblig   — OV with -in suffix / -in- realis infix
#   an_oblig   — DV with -an suffix
#   i_oblig    — IV with i- prefix
#
# Other R&B-attested classes (ipag-, ipang-, magpa-, ika-, magka-,
# pag- -an, ma-/ma- -an, maki-, magsi-) are not yet in the engine
# and are deferred to a Phase 2C / Phase 4 follow-on. Where R&B
# records additional classes for a root, they're noted in comments
# but not encoded.
#
# Citations: Ramos & Bautista 1986 (R&B), Schachter & Otanes 1972
# (S&O), Kroeger 1993 ch. 4. R&B page numbers in comments where the
# verb's full paradigm is documented.

# --- -um- class transitives -----------------------------------------------

- citation: kain
  pos: VERB
  gloss: eat
  transitivity: TR
  # R&B 126: -um- / -in / -an. + maka- abilitative (productive).
  # Phase 4 §7.7: pa_in (pinakain "fed", direct causative) and
  # magpa (nagpakain "had-eat", biclausal causative). Phase 5c
  # §7.7 follow-on: ika (ikinakain "[reason for which X] ate",
  # reason applicative IV). Phase 5d Commit 2: pa_an
  # (pinakainan "fed-at"; locative-pivot causative DV).
  # Phase 5e Commit 12: mag_an (nagkainan "ate together",
  # reciprocal / social).
  affix_class: [um, in_oblig, an_oblig, i_oblig, maka, pa_in, magpa, ika, pa_an, mag_an]

- citation: bili
  pos: VERB
  gloss: buy
  transitivity: TR
  # R&B 37: -um- / -in / -an / i- / ipang-. mang- distributive
  # ("mamili" — to shop). +maka- abilitative. Phase 4 §7.7: ipag
  # (ipinagbili "sold-for", benefactive applicative IV). Phase 5c
  # §7.7 follow-on: ipang (ipinambili "instrument-bought",
  # instrumental applicative IV).
  # Phase 5e Commit 12: mag_an (nagbilihan "exchanged in trade",
  # reciprocal / social). Phase 5e Commit 14: mang_retain
  # (mambili — retain-pattern AV variant alongside mamili).
  affix_class: [um, in_oblig, an_oblig, i_oblig, mang, maka, ipag, ipang, mag_an, mang_retain]

- citation: inom
  pos: VERB
  gloss: drink
  transitivity: TR
  # R&B 117: -um- / -in / -an.
  # Phase 4 §7.7: pa_in (pininom "made-drink") and magpa
  # (nagpainom "had-drink", biclausal causative). Phase 5d
  # Commit 2: pa_an (pinainuman "drunk-at"; locative-pivot
  # causative DV).
  affix_class: [um, in_oblig, an_oblig, maka, pa_in, magpa, pa_an]

- citation: basa
  pos: VERB
  gloss: read
  transitivity: TR
  # R&B 24: -um- / -in / -an.
  # Phase 4 §7.7: pa_in (pinabasa "made-read") and magpa
  # (nagpabasa "had-read", biclausal causative). Phase 5d
  # Commit 2: pa_an (pinabasahan "read-at"; locative-pivot
  # causative DV).
  affix_class: [um, in_oblig, an_oblig, maka, pa_in, magpa, pa_an]

- citation: kuha
