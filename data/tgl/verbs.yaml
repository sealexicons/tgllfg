# Phase 8.I: orthographic variant ``alala`` (4-syllable contemporary
# spelling) of canonical ``alaala`` (5-syllable). R&C 1990 / R&G
# Intermediate audit corpus uses ``alala`` (``naalala``,
# ``nag-aalala``). Per the orthographic-variants convention, the
# variant carries ``LEMMA: alaala`` so derived surfaces canonicalize
# back to the 5-syllable citation. Both spellings share the same
# paradigm-class set so the same ma/maka/mag derivations apply.
- citation: alala
