- citation: tuto
  pos: VERB
  gloss: learn
  transitivity: INTR
  # Phase 10.J.post-7.4: ``ma_an`` adds the LV/DV NVOL paradigm
  # (``na-…-an`` realis, ``ma-…-an`` irrealis). With ``tuto``'s
  # native semantics "learning happens to me", this surfaces the
  # "learn from/about X" reading: ``natutuhan`` (PFV) /
  # ``natututuhan`` (IPFV) / ``matututuhan`` (CTPL); the X argument
  # is the locative/source pivot. The ``also_n_epenthesis`` sandhi
  # flag adds parallel ``-n-``-epenthesized variants (``natutunan`` /
  # ``natututunan`` / ``matututunan``) — Handbok of Tagalog Verbs
  # (Bayot 1973) §VIII lists both ``natutuhan / natutunan`` as
  # competing surfaces; Zamar 2023 §13.4 prefers the ``-n-`` form as
  # the modern principal.
  #
  # Transitivity: ``tuto`` is declared INTR for the AV paradigm
  # (``ma``/``mag``/``maka`` cells use the root's transitivity). The
  # ``ma_an`` cells declare ``transitivity: TR`` — that mismatch is
  # absorbed via _affix_class_match: the cell's TR is the cell's
  # frame-arity assertion (the LV/DV reading takes a source/location
  # OBJ-AGENT in addition to the SUBJ pivot), while the root's
  # native INTR tags the AV intransitive baseline.
  #
  # Phase 10.J.post-12.13: ``ma_inf`` opt-in licenses the bare
  # ``matuto`` INF/SOC surface for tough/equi-control complement
  # positions (``Madali matuto.`` / ``Mahilig matuto si X.``). The
  # ma- + cv_redup paradigm gives ``matututo`` (CTPL NVOL); the bare
  # cell adds ``matuto`` without redup for the INF reading.
  affix_class: [ma, mag, maka, ma_an, ma_inf]
  sandhi_flags: [also_n_epenthesis]

