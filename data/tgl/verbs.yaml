- citation: sunod
  pos: VERB
  gloss: follow, obey
  transitivity: TR
  # Phase 10.J.post-8.1: ``AV_ABSOL: true`` licenses bare
  # V[AV]+NP[CASE=NOM] forms — ``Sumunod ka sa iyong magulang.``
  # "Obey your parent" (wave-2 ramos1971 sent-160) has only an
  # NOM-pivot ``ka`` + a sa-OBL goal/directional; the OBJ
  # (what's being followed) is unspecified in the absolutive AV
  # reading. Without AV_ABSOL the AV-PFV ``sumunod`` only fires
  # with an overt OBJ that the surface lacks. Parallel to
  # ``maneho`` (post-7.5), ``kuwento`` (post-7.6), ``sagot``
  # (post-7.1).
  #
  # Phase 10.J.post-8.5.2: ``ma`` added — admits the ma-NVOL
  # AV paradigm so ``nasunod`` / ``nasusunod`` "is being followed"
  # surfaces (post-8 survey Cluster A item). Parallel to other
  # canonical TR verbs with NVOL passive-like uses
  # (``natutulog``, ``naaalala``).
  #
  # Phase 10.J.post-8.5.3: ``medial_vowel_syncope`` produces the
  # canonical ``sundin`` / ``sundan`` (not ``sunudin`` /
  # ``sunudan``) for the OV-CTPL / DV-CTPL bare cells. The
  # final-syllable ``o`` deletes before a V-initial suffix
  # (``sunod + -in → sundin``; ``sunod + -an → sundan``). S&O
  # 1972 §4.21 documents the syncope as a per-root lex choice.
  # Closes wave-2 ramos1971 sent-159 (``Sundin natin ang ating
  # guro.``) + rg-intermediate sent-1346 (``Sundin mo sila.``).
  affix_class: [um, in_oblig, an_oblig, ma, maka]
  feats: {AV_ABSOL: true}
  sandhi_flags: [medial_vowel_syncope]

