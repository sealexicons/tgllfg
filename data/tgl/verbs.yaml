  # ``dalihan``), matching R&G 1981 PANAHON sent-7's
  # ``nadadalian`` spelling. Parallel to ``luto`` /
  # ``trabaho`` / ``mali`` which carry the same flag.
  affix_class: [mag, maka, ma_an]
  sandhi_flags: [no_h_epenthesis]

