# intensive form of ``sama`` meaning "gather together / assemble
# / be all together". Adding as a separate ROOT entry (rather
# than deriving from ``sama`` via a new CV-X paradigm cell)
# because the reduplicated form has its own lex semantics
# distinct from the bare ``sama`` "accompany / go with". The
# ``pag_gerund`` opt-in admits BOTH:
#
#   pag + samasama          → pagsamasama       (no cv-redup)
#   pag + cv_redup + samasama → pagsasamasama   (with cv-redup —
#                                                PAG-AARAL/sent-5
#                                                target)
