# --- mag- class verbs -----------------------------------------------------

- citation: linis
  pos: VERB
  gloss: clean
  transitivity: TR
  # R&B 162: mag- / -in / ipang-. The realis -in- on sonorant-initial
  # roots surfaces as a ni- prefix (Phase 2C automatic rule), so OV
  # PFV is "nilinis" (not "linilis") and OV IPFV is "nililinis".
  affix_class: [mag, in_oblig, an_oblig, maka]

- citation: bigay
  pos: VERB
  gloss: give
  transitivity: TR
  # mag- AV; OV/DV/IV forms exist but require non-trivial sandhi
  # deferred to Phase 2C.
  affix_class: [mag, maka]

- citation: sulat
  pos: VERB
  gloss: write
  transitivity: TR
  # R&B 237: -um- / -in / i- / -an. Both -um- and mag- in AV.
