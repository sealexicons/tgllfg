# data/tgl/roots.yaml
#
# Tagalog seed lexicon. Each verb declares its `affix_class` — the
# paradigm patterns it participates in. Generation only fires for
# cells whose affix_class is in the root's list, so a -um- only root
# never produces ungrammatical mag-/mang- forms.
#
# Affix-class vocabulary (Phase 2 supported set):
#
#   um         — AV with -um- infix
#   mag        — AV with mag-/nag- prefix
#   mang       — AV with mang-/nang- distributive + nasal substitution
#   maka       — AV with naka-/maka- abilitative (MOOD=ABIL)
#   in_oblig   — OV with -in suffix / -in- realis infix
#   an_oblig   — DV with -an suffix
#   i_oblig    — IV with i- prefix
#
# Other R&B-attested classes (ipag-, ipang-, magpa-, ika-, magka-,
# pag- -an, ma-/ma- -an, maki-, magsi-) are not yet in the engine
# and are deferred to a Phase 2C / Phase 4 follow-on. Where R&B
# records additional classes for a root, they're noted in comments
# but not encoded.
#
# Citations: Ramos & Bautista 1986 (R&B), Schachter & Otanes 1972
# (S&O), Kroeger 1993 ch. 4. R&B page numbers in comments where the
# verb's full paradigm is documented.

# === Verb roots ===========================================================

# --- -um- class transitives -----------------------------------------------

- citation: kain
  pos: VERB
  gloss: eat
  transitivity: TR
  # R&B 126: -um- / -in / -an. + maka- abilitative (productive).
  affix_class: [um, in_oblig, an_oblig, i_oblig, maka]

