# --- -um/mag alternation, motion and intransitives -----------------------

- citation: takbo
  pos: VERB
  gloss: run
  transitivity: INTR
  # R&B 249: -um- / -in. "tumakbo" (run); mag- gives intensive.
  affix_class: [um, mag, maka]

- citation: tulog
  pos: VERB
  gloss: sleep
  transitivity: INTR
  # R&B 275: ma- / -an. ma- non-volitional is the primary AV class
  # ("natulog" / "natutulog" / "matutulog", MOOD=NVOL). The colloquial
  # mag- and -um- alternations are also kept.
  affix_class: [um, mag, ma, maka]

- citation: simula
  pos: VERB
  gloss: start, begin
  transitivity: TR
  # mag- / um-.
  affix_class: [um, mag, maka]

- citation: tapos
  pos: VERB
  gloss: finish
  transitivity: TR
  # mag- / -in.
  affix_class: [mag, in_oblig, maka]

- citation: tigil
  pos: VERB
  gloss: stop
  transitivity: INTR
  # mag- / i-.
  affix_class: [mag, i_oblig, maka]

- citation: lipat
  pos: VERB
  gloss: transfer, move
  transitivity: TR
  # R&B 165, 166: -um- / -an for intransitive; mag- / i- for
  # transitive.
  affix_class: [um, mag, an_oblig, i_oblig, maka]

- citation: lipad
  pos: VERB
  gloss: fly, travel by airplane
  transitivity: INTR
  # R&B 164: -um-.
  affix_class: [um, maka]

- citation: tawa
  pos: VERB
  gloss: laugh
  transitivity: INTR
  # -um-.
  affix_class: [um, maka]

- citation: iyak
  pos: VERB
  gloss: cry, weep
  transitivity: INTR
  # R&B 124: -um- / -an.
  affix_class: [um, an_oblig, maka]

- citation: kilos
  pos: VERB
  gloss: move, do something
  transitivity: INTR
  # -um-.
  affix_class: [um, maka]

- citation: tawid
  pos: VERB
  gloss: cross (a street)
  transitivity: TR
  # R&B 263, 264: -um- / -in for intransitive; mag- / i- for
  # transitive (carry across).
  affix_class: [um, mag, in_oblig, i_oblig, maka]

- citation: akyat
  pos: VERB
  gloss: climb
  transitivity: TR
  # R&B 5: -um- / -in. Ambitransitive — climbing is intransitive
  # (umakyat) but "to climb something" is transitive (akyatin); we
  # tag as TR to enable the OV/DV/IV cells.
  affix_class: [um, mag, in_oblig, an_oblig, i_oblig, maka]

# --- mang- distributive (b/p, t/d/s, k/g initials for nasal sub.) --------

- citation: huli
  pos: VERB
  gloss: catch
  transitivity: TR
  # R&B 111: -um- / -in / i- / ipang-.
  # mang- distributive: "manghuli" → manghuli (h is sonorant; no nasal sub).
  affix_class: [um, in_oblig, i_oblig, mang, maka]

- citation: damo
  pos: VERB
  gloss: pluck grass
  transitivity: INTR
  # mang- distributive: "manamo" (mang- + damo, d→n).
  affix_class: [mang, maka]

- citation: tao
  pos: VERB
  gloss: be born, become a person (figurative)
  transitivity: INTR
  # mang- distributive context.
  affix_class: [um, mang, maka]

- citation: gulay
  pos: VERB
  gloss: pick vegetables
  transitivity: INTR
  # mang- distributive: "mangulay" (mang- + gulay, g→ng).
  affix_class: [mang, maka]

