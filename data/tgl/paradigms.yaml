# === IV ‚Äî Instrumental / Benefactive Voice ===============================

# Bare IV `i-` carries APPL=CONVEY ‚Äî the conveyed-pivot reading
# (Phase 4 ¬ß7.7). Other applicative variants (BEN via ipag-,
# INSTR via ipang-, REASON via ika-) live under their own affix
# classes below.
- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinain, ibinili

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakain, ibinibili

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "i"}
  notes: ikakain, ibibili

# === AV ‚Äî RECPFV ("just-completed") =====================================
#
# Phase 4 ¬ß7.2: the recent-perfective aspect uses the ka- prefix +
# CV-redup of the root, no infix or voice morphology beyond the
# affix-class filter. Surfaces: "kakakain" (just ate), "kabibili"
# (just bought), "kasusulat" (just wrote). MOOD remains IND.
#
# Citations: Schachter & Otanes 1972 ¬ß5.31; Ramos & Bautista 1986
# paradigm tables (RECPFV column).

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: kakakain, kabibili (RECPFV across um-class roots)

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: kasusulat, kalilinis (RECPFV across mag-class roots)

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: katutulog, kakikita (RECPFV across ma-class roots)

# === AV ‚Äî ma- non-volitional / stative class =============================
#
# The ma- prefix marks non-volitional / accidental / stative readings
# distinct from the maka- abilitative (which carries MOOD=ABIL). MOOD
# here is NVOL ("non-volitional") ‚Äî Schachter & Otanes 1972 ¬ß5.27,
# Kroeger 1993 ¬ß4.5. The realis/irrealis split parallels mag-: na-
# in PFV/IPFV, ma- in CTPL.
#
# Examples: ma- + tulog ‚Üí natulog ("happened to fall asleep");
# ma- + upo ‚Üí naupo ("happened to sit down").

- voice: AV
  aspect: PFV
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: prefix, value: "na"}
  notes: natulog, naupo (ma- non-volitional realis PFV)

- voice: AV
  aspect: IPFV
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "na"}
  notes: natutulog, nauupo

- voice: AV
  aspect: CTPL
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  notes: matutulog, mauupo (ma- non-volitional irrealis)

# === Phase 4 ¬ß7.7: applicatives + causatives ============================
#
# Applicative IV variants beyond the bare ``i-`` (CONVEY) reading:
# ``ipag-`` benefactive (APPL=BEN) is added here.
# Phase 5c ¬ß7.7 follow-on (Commit 4) adds ``ipang-`` instrumental
# (APPL=INSTR) and ``ika-`` reason (APPL=REASON) using the new
# ``nasal_assim_prefix`` op for ipang-.
#
# Causatives use the ``pa-`` prefix in two configurations:
#   - **Monoclausal direct causative** (``pa_in`` OV): ``pinakain``
#     "fed (cause-eat)". Causee is pivot/SUBJ; causer is GEN/OBJ.
#     Single-clause; argument structure ``<SUBJ, OBJ>``.
#   - **Biclausal indirect causative** (``magpa`` AV): ``nagpakain``
#     "had-eaten / caused to eat". Causer is pivot/SUBJ; the caused
#     event is an XCOMP. Re-uses the ¬ß7.6 control infrastructure
#     via ``CTRL_CLASS=INTRANS`` on the lex entry.
#
# Citations: Schachter & Otanes 1972 ¬ß5.32‚Äì5.34; Ramos & Bautista
# 1986 paradigm tables (BEN, CAUS columns); Kroeger 1993 ¬ß6 on
# applicatives.

# --- ipag- benefactive applicative (APPL=BEN) -----------------------------
- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: ipag
  feats: {APPL: BEN}
  operations:
    - {op: prefix, value: "pag"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinaggawa, ipinagsulat (BEN PFV; agent GEN, beneficiary NOM)

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: ipag
  feats: {APPL: BEN}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pag"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinaggagawa, ipinagsusulat

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ipag
  feats: {APPL: BEN}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pag"}
    - {op: prefix, value: "i"}
  notes: ipaggagawa, ipagsusulat

# --- ipang- instrumental applicative (APPL=INSTR) -----------------------
#
# The pang- prefix's final ng place-assimilates to the base's
# initial consonant without dropping it (Phase 5c ¬ß7.7 follow-on,
# Commit 4): pang- + bili ‚Üí pambili, pang- + tahi ‚Üí pantahi.
# Distinguished from the AV distributive ``mang-`` on the same
# root, which DROPS the consonant (mang- + bili ‚Üí mamili "be a
# buyer"); both patterns coexist in modern Tagalog with different
# meanings. Operations mirror ipag- with nasal_assim_prefix("pang")
# in place of prefix("pag"). Surface forms for bili: ipinambili
# (PFV), ipinambibili (IPFV), ipambibili (CTPL).

- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: ipang
  feats: {APPL: INSTR}
  operations:
    - {op: nasal_assim_prefix, value: "pang"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinambili (‚Üê pang+bili ‚Üí pambili ‚Üí pinambili ‚Üí ipinambili), ipinantahi

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: ipang
  feats: {APPL: INSTR}
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "pang"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinambibili (‚Üê cv_redup of bili ‚Üí bibili ‚Üí pambibili ‚Üí pinambibili ‚Üí ipinambibili)

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ipang
  feats: {APPL: INSTR}
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "pang"}
    - {op: prefix, value: "i"}
  notes: ipambibili (CTPL ‚Äî cv-redup + pang-assim + i-)

# --- ika- reason applicative (APPL=REASON) ------------------------------
#
# The ka- prefix has no homorganic-nasal sandhi, so the cells are
# parametrically identical to ipag- (substituting "ka" for "pag").
# Reason readings: ikinakain "[reason for which X] ate";
# ikinasulat "[reason for which X] wrote". The base remains intact;
# the -in- realis infix sits between the prefix's "k" and "a".
# Surface forms for kain: ikinakain (PFV), ikinakakain (IPFV),
# ikakakain (CTPL).

- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: prefix, value: "ka"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakain (‚Üê ka+kain ‚Üí kakain ‚Üí kinakain ‚Üí ikinakain), ikinasulat

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakakain (‚Üê cv_redup of kain ‚Üí kakain ‚Üí kakakain ‚Üí kinakakain ‚Üí ikinakakain)

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
    - {op: prefix, value: "i"}
  notes: ikakakain (CTPL "long" form ‚Äî cv-redup + ka- prefix + i-)

# Phase 5e Commit 24: IV-REASON CTPL "short" form. Lifts the
# Phase 5d Commit 9 paradigm-gap deferral. The Handbook of
# Tagalog Verbs (Ramos & Schachter; data/tgl/dictionaries/)
# lists RF (Reason Focus) Cont with two variants separated by
# `/` ‚Äî e.g., for vowel-initial root `ingay`: `ikakaingay /
# ikaiingay` (line 4120 in OCR); for `init`: `ikakainit /
# ikaiinit` (line 4161). The first variant has an extra CV-
# redup; the second drops it.
#
# For consonant-initial bases like `kain`, the analogous
# "short" form is `ikakain` (i + ka + kain, no further redup) ‚Äî
# distinct from the "long" `ikakakain` only in whether the
# CV-redup fires. Both are valid IV-REASON CTPL surfaces.
#
# This cell uses operations `[prefix ka, prefix i]` (no
# cv_redup), producing the "short" form. Same operations as
# IV-CONVEY CTPL would produce the same surface for some bases
# (e.g., `kain` ‚Üí `ikakain`); the morph analyzer returns BOTH
# analyses (IV-CONVEY CTPL and IV-REASON CTPL "short"), and
# the chart parser explores both readings. For other bases,
# the surfaces differ:
#
#   kain    ‚Üí IV-CONVEY CTPL `ikakain`  + IV-REASON CTPL "short" `ikakain` (same surface)
#           ‚Üí IV-REASON CTPL "long" `ikakakain` (existing cell above)
#   bili    ‚Üí IV-CONVEY CTPL `ibibili`  + IV-REASON CTPL "short" `ikabili`
#           ‚Üí IV-REASON CTPL "long" `ikabibili` (existing cell above)
#   sulat   ‚Üí IV-CONVEY CTPL `isusulat` + IV-REASON CTPL "short" `ikasulat`
#           ‚Üí IV-REASON CTPL "long" `ikasusulat` (existing cell above)
- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: prefix, value: "ka"}
    - {op: prefix, value: "i"}
  notes: ikakain, ikabili (CTPL "short" form ‚Äî ka- prefix + i-, no cv-redup)

# --- pa-...-in monoclausal direct causative (CAUS=DIRECT, OV) -----------
- voice: OV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: pa_in
  feats: {CAUS: DIRECT}
  operations:
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
  notes: pinakain, pinabasa (causee=SUBJ via NOM; causer=OBJ via GEN)

- voice: OV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: pa_in
  feats: {CAUS: DIRECT}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
  notes: pinakakain, pinababasa

- voice: OV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: pa_in
  feats: {CAUS: DIRECT}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pa"}
    - {op: suffix, value: in}
  notes: "pakakainin, pababasahin (CTPL ‚Äî cv-redup + pa- prefix + -in suffix)"

# --- pa-...-an monoclausal direct causative, locative pivot (CAUS=DIRECT, DV) ---
#
# Phase 5d Commit 2: parallel to pa-...-in (OV) but with the
# DV `-an` suffix. The pivot is the location / recipient of
# the caused event rather than the causee. Surface forms
# mirror the pa_in pattern with `an` substituted for `in`:
#
#   PFV   pinakainan   ‚Üê pa+kain ‚Üí pinakain ‚Üí pinakainan
#   IPFV  pinakakainan ‚Üê cv_redup of kain + pa+ + -in- + -an
#   CTPL  pakakainan   ‚Üê cv_redup + pa- + -an (no -in- infix)

- voice: DV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: pa_an
  feats: {CAUS: DIRECT}
  operations:
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
    - {op: suffix, value: an}
  notes: "pinakainan, pinabasahan (PFV; location/recipient = SUBJ via NOM, causer = OBJ via GEN)"

- voice: DV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: pa_an
  feats: {CAUS: DIRECT}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
    - {op: suffix, value: an}
  notes: "pinakakainan, pinababasahan (IPFV)"

- voice: DV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: pa_an
  feats: {CAUS: DIRECT}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pa"}
    - {op: suffix, value: an}
  notes: "pakakainan, pababasahan (CTPL ‚Äî cv-redup + pa- prefix + -an suffix; no -in- infix)"

# --- magpa- biclausal indirect causative (CAUS=INDIRECT, AV) -----------
#
# These verb forms compose with the ¬ß7.6 control machinery: the
# matrix verb is AV, takes a NOM-marked causer as SUBJ, and selects
# an XCOMP via the linker (``na`` / ``-ng``). Lex entries set
# CTRL_CLASS=INTRANS so the existing control wrap rule fires.
- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: magpa
  feats: {CAUS: INDIRECT, CTRL_CLASS: INTRANS}
  operations:
    - {op: prefix, value: "pa"}
    - {op: prefix, value: "nag"}
  notes: nagpakain, nagpabasa (causer=SUBJ; XCOMP via linker)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: magpa
  feats: {CAUS: INDIRECT, CTRL_CLASS: INTRANS}
  operations:
    - {op: prefix, value: "pa"}
    - {op: cv_redup}
    - {op: prefix, value: "nag"}
  notes: nagpapakain (cv-redup of "pa" ‚Üí "papakain" ‚Üí "nagpapakain")

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: magpa
  feats: {CAUS: INDIRECT, CTRL_CLASS: INTRANS}
  operations:
    - {op: prefix, value: "pa"}
    - {op: cv_redup}
    - {op: prefix, value: "mag"}
  notes: magpapakain

# --- mag-...-an reciprocal / social (Phase 5e Commit 12) ----------------
#
# Schachter & Otanes 1972 ¬ß5.27 documents the ``mag-...-an`` pattern
# as the canonical Tagalog reciprocal / social form: an action
# performed cooperatively or mutually by a plural SUBJ. Examples:
# ``nag-iyak-an`` "cried together / cried at each other";
# ``nag-bigay-an`` "exchanged"; ``nag-kain-an`` "ate together".
#
# Phase 5e Commit 12 lifts this from the Phase 4 ¬ß7.2 SOC-as-
# inventory-only deferral. The plan ¬ß10.1 Group D originally
# flagged ``ka-...-an`` as the "reciprocal causative" affix, but
# investigation against S&O 1972 + Ramos 1971 + R&B 1986 confirmed
# that the well-attested reciprocal pattern is ``mag-...-an``
# (``ka-...-an`` is more typically a noun-deriving pattern in
# Tagalog and isn't a verbal voice/applicative). The implementation
# uses the attested form rather than the speculative one.
#
# Cell-level feat ``MOOD=SOC`` lifts the SOC mood from inventory-
# only status. Lex entries select these cells via
# ``morph_constraints={"MOOD": "SOC"}``.
- voice: AV
  aspect: PFV
  mood: SOC
  transitivity: ''
  affix_class: mag_an
  feats: {MOOD: SOC, RECP: true}
  operations:
    - {op: suffix, value: an}
    - {op: prefix, value: "nag"}
  notes: nagkainan, nagbigayan (mag- ‚Üí nag- realis + -an reciprocal)

- voice: AV
  aspect: IPFV
  mood: SOC
  transitivity: ''
  affix_class: mag_an
  feats: {MOOD: SOC, RECP: true}
  operations:
    - {op: cv_redup}
    - {op: suffix, value: an}
    - {op: prefix, value: "nag"}
  notes: nagkakainan, nagbibigayan

- voice: AV
  aspect: CTPL
  mood: SOC
  transitivity: ''
  affix_class: mag_an
  feats: {MOOD: SOC, RECP: true}
  operations:
    - {op: cv_redup}
    - {op: suffix, value: an}
    - {op: prefix, value: "mag"}
  notes: magkakainan, magbibigayan

# === Phase 5n.C.3: non-verbal paradigm cells (base_pos != VERB) =========
#
# Productive paradigms over NOUN / ADJ / PRON roots. The shared
# operation-execution engine (analyzer.generate_form + sandhi.py)
# is POS-agnostic; the ``base_pos`` discriminator on each cell
# (Phase 5n.C.3 Commit 1) routes the cell to the matching root POS
# during indexing. See ``src/tgllfg/morph/analyzer.py``
# ``_index_paradigm_via_base_pos``.

# --- Phase 5n.C.3 Commit 2: card_redup (¬ß18 L31) ------------------------
# Compound cardinals via full-root reduplication: ``libo`` ‚Üí
# ``libulibo`` "thousands of", ``daan`` ‚Üí ``daandaan`` "hundreds of".
# The ``full_redup`` op (analyzer.py + sandhi.full_reduplicate)
# duplicates the root and raises the first copy's final-syllable /o/
# to /u/ (same rule as ``attach_suffix``). Cell.feats contributes
# ``MEASURE=YES`` so the existing measure-N grammar rule
# (``cfg/nominal.py`` line 1011) fires on the derived surface.
# Root-side ``COLL_VALUE`` (HUNDREDS / THOUSANDS) propagates
# per-root via the standard root.feats merge.
# References: Schachter & Otanes 1972 ¬ß6 (collective cardinal redup);
# R&B 1986 paradigm tables.
- base_pos: NOUN
  affix_class: card_redup
  operations:
    - {op: full_redup}
  feats: {MEASURE: true}
  notes: card_redup ‚Äî libo ‚Üí libulibo, daan ‚Üí daandaan

# --- Phase 5n.C.3 Commit 3: tig_distrib (¬ß18 L31) -----------------------
# Productive distributive numerals: ``tig-isa`` "one each",
# ``tig-dalawa`` "two each", etc. Single ``prefix tig`` op produces
# the derived surface; cell.feats contributes the construction-
# level markers ``DISTRIB=YES`` (the distributive reading) and
# ``CARDINAL=YES`` (so the existing Phase 5f Commit 1 cardinal
# NP-modifier rule consumes the surface unchanged). Root-side
# ``CARDINAL_VALUE`` (1-10) propagates per-root via the standard
# merge.
#
# NUM-pos roots live in ``data/tgl/numerals.yaml``; the matching
# tokenizer pre-pass (``text/multiword.py`` hyphen-merge) folds
# ``tig-isa`` into ``tigisa`` so the productive surface tokenises
# cleanly. References: Schachter & Otanes 1972 ¬ß5.27 (distributive
# tig-); ¬ß4 (cardinal numerals).
- base_pos: NUM
  affix_class: tig_distrib
  operations:
    - {op: prefix, value: "tig"}
  feats: {DISTRIB: true, CARDINAL: true, NUM: PL}
  notes: tig_distrib ‚Äî isa ‚Üí tigisa, dalawa ‚Üí tigdalawa, ...

# --- Phase 5n.C.3 Commit 4: tag_season (¬ß18 L31) ------------------------
# Productive season noun derivation: ``tag-`` prefix + NOUN root
# yields a season name. ``araw`` "sun" ‚Üí ``tagaraw`` "sunny
# period"; ``ulan`` "rain" ‚Üí ``tagulan`` "rainy season";
# ``init`` "heat" ‚Üí ``taginit`` "hot/dry season"; ``lamig``
# "cold" ‚Üí ``taglamig`` "cold spell"; ``gutom`` "hunger" ‚Üí
# ``taggutom`` "hunger season".
#
# Replaces the 5 hand-coded ``tag*`` NOUN entries from Phase 5f
# Commit 14. The hyphen-merge tokenizer pre-pass
# (``text/multiword.py``) folds canonical ``tag-init`` etc. into
# the single-token form the productive cell generates. Cell.feats
# contributes ``SEM_CLASS=SEASON``; root-side affix_class
# ``[tag_season]`` gates the cell to the 5 season-base nouns.
# References: Schachter & Otanes 1972 ¬ß5 (``tag-`` derivation);
# R&B 1986 ch.4.
- base_pos: NOUN
  affix_class: tag_season
  operations:
    - {op: prefix, value: "tag"}
  feats: {SEM_CLASS: SEASON}
  notes: tag_season ‚Äî araw ‚Üí tagaraw, ulan ‚Üí tagulan, init ‚Üí taginit, lamig ‚Üí taglamig, gutom ‚Üí taggutom

# --- Phase 5n.C.3 Commit 5: kani_redup (¬ß18 L31) ------------------------
# Distributive-possessive redup on 3rd-person DAT pronouns ‚Äî
# productive replacement for the Phase 5f Commit 21 hand-coded
# ``kanikaniya`` / ``kanyakanya`` Q forms. The ``kani_redup`` op
# (analyzer.py + sandhi.kani_reduplicate) handles two patterns:
# 2-syllable bases (``kanya``) get full reduplication; 3-syllable
# bases (``kaniya`` / ``kanila``) have the first copy truncated to
# 2 syllables and concatenated with the full base.
#
# POS-flip: cell.pos=Q overrides the PRON base. Distributive-
# possessive surfaces are syntactically Q (preposed quantifier
# with linker complement, matching Phase 5f Commits 15 / 20 / 22),
# so the derived form is indexed as Q in the particles table ‚Äî
# the same shape consumers expect.
# References: Schachter & Otanes 1972 ¬ß10 (universal quantification);
# R&B 1986 ch.10 (distributive possessive pronouns).
- base_pos: PRON
  pos: Q
  affix_class: kani_redup
  operations:
    - {op: kani_redup}
  feats: {QUANT: EACH_OWN, DISTRIB_POSS: true}
  notes: kani_redup ‚Äî kanya ‚Üí kanyakanya, kaniya ‚Üí kanikaniya, kanila ‚Üí kanikanila

# --- Phase 5n.C.3 Commit 7: redup_intens_adj (¬ß18 L37) ------------------
# Reduplicated intensive adjectives ‚Äî "rather X" / "X-ish":
# ``maganda-ganda`` "rather beautiful", ``maliit-liit`` "rather
# small", ``mabilis-bilis`` "rather fast", ``mabait-bait`` "rather
# kind". The hyphen-merge tokenizer pre-pass collapses the
# canonical hyphenated form to the single-token surface that
# this paradigm generates (``magandaganda`` etc.).
#
# Operations: ``[prefix ma, redup_root]``. Order matters ‚Äî the
# Commit 6 ``redup_root`` op appends the root after the prefix
# has been attached, so the prefix appears only on the first
# copy. Distinct from ``full_redup`` which would put ``ma-`` on
# both copies. Reference: Schachter & Otanes 1972 ¬ß5
# (intensive redup); R&B 1986 ch.4.
#
# The cell re-uses the existing ``affix_class: ma_adj`` filter
# so every ma_adj-class ADJ root automatically produces an
# intensive form. The output is an ADJ with ``INTENS: MILD`` ‚Äî
# semantically weaker than the Phase 5h ``napaka-`` super-
# intensifier (``COMP_DEGREE: INTENSIFIER``). The two
# mechanisms are syntactically parallel (both are ADJ surfaces)
# but morphologically distinct.
- base_pos: ADJ
  affix_class: ma_adj
  operations:
    - {op: prefix, value: "ma"}
    - {op: redup_root}
  feats: {PREDICATIVE: true, INTENS: MILD}
  notes: redup_intens_adj ‚Äî ganda ‚Üí magandaganda (L37 redup intensive)

# --- Phase 5n.C.3 Commit 8: kasing_redup_adj (¬ß18 L38) ------------------
# CV-reduplicated equative variant ‚Äî "just as X" / "exactly as X":
# ``kasinggaganda``, ``kasingdadali``, ``kasingbabait``. Per
# Schachter & Otanes 1972 ¬ß5 the CV-redup form is a stylistic
# variant of the modern ``kasing-`` equative
# (``kasingganda`` "as beautiful (as)"). In modern usage the two
# forms are semantically equivalent ‚Äî both translate as "just as
# X" (verified 2026-05-10 via GT comparison of ``kasingganda``
# / ``kasinggaganda``). The earlier C8 ``REGISTER: ARCHAIC``
# distinguishing feat was dropped per the GT observation; the
# productive paradigm now produces a surface distinct from the
# bare ``kasing-`` form but f-structure-identical to it.
#
# Operations: ``[cv_redup, prefix kasing]``. CV-reduplicates the
# root first (``ganda`` ‚Üí ``gaganda``, ``dali`` ‚Üí ``dadali``,
# ``bait`` ‚Üí ``babait``), then prefixes with ``kasing``. Re-uses
# the existing ``cv_redup`` and ``prefix`` ops ‚Äî no new op
# needed.
#
# Cell.feats: ``COMP_DEGREE: EQUATIVE`` (so the existing Phase
# 5h Commit 2 equative grammar rules consume the surface
# unchanged) + ``PREDICATIVE: YES``. The note in
# ``adj_paradigms.yaml`` for the bare ``kasing-`` cell flagged
# this redup form as deferred to L38; this commit closes the
# deferral.
- base_pos: ADJ
  affix_class: ma_adj
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "kasing"}
  feats: {PREDICATIVE: true, COMP_DEGREE: EQUATIVE}
  notes: kasing_redup_adj ‚Äî ganda ‚Üí kasinggaganda, dali ‚Üí kasingdadali (L38 CV-redup equative)

# --- Phase 5n.C.3 Commit 9: redup_wh_plural (¬ß18 L49) -------------------
# Reduplicated wh-plural PRON surfaces ‚Äî ``ano-ano`` "what-PL /
# various things", ``sino-sino`` "who-PL / random people",
# ``kanino-kanino`` "to whom-PL", ``alin-alin`` "which-PL". The
# hyphen-merge tokenizer pre-pass collapses the canonical
# hyphenated form to the single-token surface this paradigm
# generates (``anoano`` etc.).
#
# Operations: ``[redup_root]``. The Commit 6 ``redup_root`` op
# appends the original ``root.citation`` to the current base; for
# a freshly-loaded synthetic Root from a wh-PRON, the initial
# base IS root.citation (no prior prefix), so the op produces
# ``ano`` + ``ano`` = ``anoano``, ``kanino`` + ``kanino`` =
# ``kaninokanino``, etc. No prefix, no sandhi.
#
# Distinct from ``full_redup`` (Commit 2) ‚Äî that op applies o‚Üíu
# raising on the first copy, which is wrong for wh-PRONs ending
# in /o/ (``ano`` would yield ``anuano`` ‚âÝ ``anoano``).
#
# Cell.feats: ``NUM: PL`` (the plural reading marker; bare
# wh-PRONs don't carry NUM). ``WH: YES`` already rides through
# from root.feats. Output pos stays PRON (no pos-flip) ‚Äî the
# derived form is syntactically a wh-PRON like its base.
#
# References: Phase 5i ¬ß9.2 (deferred from Phase 5i; corpus
# surfaced via Phase 5m wh+man builder work); S&O 1972 ¬ß6.
- base_pos: PRON
  affix_class: redup_wh_plural
  operations:
    - {op: redup_root}
  feats: {NUM: PL}
  notes: redup_wh_plural ‚Äî ano ‚Üí anoano, sino ‚Üí sinosino, kanino ‚Üí kaninokanino, alin ‚Üí alinalin (L49)
