# data/tgl/paradigms.yaml
#
# Verbal paradigm cells for the Kroeger four-voice system. Each cell
# is filtered by `affix_class` — a string the root's affix_class list
# must contain for the cell to fire. This prevents a -um- only root
# like `kain` from generating mag-/mang- forms it doesn't support.
#
# Operation order applied during generation (see analyzer.py):
#
#   1. cv_redup     — first-CV reduplication of the base
#   2. infix        — -um- (AV) or -in- (realis) after first consonant;
#                     prefix on vowel-initial bases
#   3. suffix       — -in (OV CTPL), -an (DV)
#   4. prefix       — i- (IV), nag-/mag-, naka-/maka-
#   5. nasal_prefix — nang-/mang- with nasal substitution
#
# CTPL (contemplative / future) cells omit the realis -in- infix; the
# realis/irrealis split is folded into ASPECT for now (the plan §7.2
# leaves a separate MOOD analysis to a later phase).
#
# Citations: Kroeger 1993 §§4.2–4.5; Schachter & Otanes 1972 §§5.20–5.30.

# === AV — Actor Voice (-um- class) =======================================

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: infix, value: um}
  notes: kumain, bumili (-um- after first consonant)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
    - {op: infix, value: um}
  notes: kumakain, bumibili

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
  notes: kakain, bibili (irrealis — no -um-)

# === AV — Actor Voice (mag- class) =======================================

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: prefix, value: "nag"}
  notes: naglinis, nagbigay (mag- → nag- in realis)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "nag"}
  notes: naglilinis, nagbibigay

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "mag"}
  notes: maglilinis, magbibigay (mag- in irrealis)

# Phase 5e Commit 21: AV-mag SOC (hortative) — bare `mag-` + base
# (no CV-redup, no realis), MOOD=SOC. Used in 1pl-INCL hortatives
# like `Maglinis tayo` "Let's clean", `Magbigay tayo ng X` "Let's
# give X", `Magkape tayo` "Let's have coffee". The same
# morphological surface is also the IMP form for 2nd-person
# subjects (`Maglinis ka` "Clean!" — addressee-imperative); the
# IMP variant lifts in a separate commit (Group G item 3,
# huwag-MOOD lift). For now, MOOD=SOC is asserted at the morph
# level — the existing AV S frames carry MOOD from V to matrix
# without needing new grammar rules.
#
# Lifts the Phase 4 §7.2 SOC-as-inventory-only deferral for the
# hortative case (Phase 5e Commit 12 already lifted SOC for the
# mag-...-an reciprocal).
- voice: AV
  aspect: CTPL
  mood: SOC
  transitivity: ''
  affix_class: mag
  feats: {MOOD: SOC}
  operations:
    - {op: prefix, value: "mag"}
  notes: maglinis, magbigay (mag- + base for hortative SOC; takes 1pl-INCL `tayo` SUBJ)

# === AV — magsi- plural-actor (Phase 7a.B Commit 2 / §18.1.1 #2) ========
#
# S&O 1972 §5.15 documents `magsi-` as the optional PLURALIZED AV
# formation, occurring only with a plural topic: `magsikanta sila`
# "they sing (pl.)", `magsikain sila ng kanin` "they eat rice (pl.)".
# Standard 3-aspect AV paradigm: PFV `nagsi-V`, IPFV `nagsisi-V`,
# CTPL `magsisi-V`. The cv_redup applies to the `si` outer-prefix
# (parallel to magpa's cv_redup of `pa`).
#
# Phase 7a.B scope: applies only to roots whose affix_class
# includes `magsi` (= -um- verbs). The S&O §5.15 variants
# `magsipag-` (for mag- bases) and `magsipang-` (for mang- bases)
# are morphologically distinct paradigm cells; deferred as
# follow-on work. The -nga- infix variant (e.g., `mangagsikanta`)
# is also out of scope per S&O note that it doesn't change meaning.
#
# Cells emit DISTRIB=true. No CAUS/RECP/MOOD — magsi- is pure
# pluralization, not reciprocal or causative.
- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: magsi
  feats: {DISTRIB: true}
  operations:
    - {op: prefix, value: "si"}
    - {op: prefix, value: "nag"}
  notes: nagsikanta, nagsikain (-um- base → nagsi- realis PFV)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: magsi
  feats: {DISTRIB: true}
  operations:
    - {op: prefix, value: "si"}
    - {op: cv_redup}
    - {op: prefix, value: "nag"}
  notes: nagsisikanta, nagsisikain (cv-redup of `si` outer-prefix)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: magsi
  feats: {DISTRIB: true}
  operations:
    - {op: prefix, value: "si"}
    - {op: cv_redup}
    - {op: prefix, value: "mag"}
  notes: magsisikanta, magsisikain (irrealis CTPL — mag- prefix)

# === AV — Actor Voice (mang- distributive class) =========================
#
# The mang- prefix exhibits nasal substitution: the prefix's final ng
# adapts to the base's first consonant, which then drops. nang- is
# the realis (PFV/IPFV) variant; mang- is the irrealis (CTPL). The
# IPFV/CTPL reduplication target is the *post-substitution* base
# (bili → mili → mimili), so the sequence is
# nasal_substitute → cv_redup → prefix.
#
# Examples: mang + bili → mamili; mang + kuha → manguha; mang + tahi
# → manahi. PFV uses na- as the prefix head, CTPL uses ma-.

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: prefix, value: "na"}
  notes: namili (← nang+bili), nanahi (← nang+tahi)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: cv_redup}
    - {op: prefix, value: "na"}
  notes: namimili (← nang+CV-redup of post-subst base)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  notes: mamimili (← mang+CV-redup of post-subst base)

# === AV — mang- retain pattern (Phase 5e Commit 14) =====================
#
# Schachter & Otanes 1972 §5.27 + Ramos 1971 paradigm tables note
# that some bases admit a retain-pattern variant of the mang-
# distributive alongside the default drop pattern. The retain
# pattern keeps the base's first consonant and adds a homorganic
# nasal (the same ``nasal_assim_prefix`` op introduced for the
# Phase 5c §7.7 ipang- IV-INSTR / ika- IV-REASON applicatives):
#
#   mang- + bili → drop:   mami → mamili    (existing mang class)
#   mang- + bili → retain: namb → nambili → namb-i-bili → mambili (Phase 5e)
#
# The two forms can carry slightly different semantics
# ("habitual buyer" vs "engaging in buying activity") or be
# dialectal variants. Per-base flagging via the new ``mang_retain``
# affix class lets bases opt into the retain pattern alongside
# the default drop pattern. The lex entries (BUY <SUBJ> etc.) are
# unchanged — both surface forms route to the same PRED.
- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: nasal_assim_prefix, value: "nang"}
  notes: nambili (← nang+bili, retain pattern). nantahi.

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "nang"}
  notes: nambibili (← nang+CV-redup of bili → nang+bibili → nambibili)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "mang"}
  notes: mambibili (← mang+CV-redup of bili)

# Phase 9.O B3 follow-on: bare CTPL without cv-redup — used in
# subordinate, modal-XCOMP, and hortative contexts (parallel to the
# Phase 5n.A bare OV cell and the Phase 9.O ma_an bare CTPL cell).
# Produces ``mangyari`` (mang + yari → mangyari with nasal-retain on
# sonorant onset) — the IMP/INF form of ``yari``-class roots. The
# 9.E deferral note ("``mangyari`` (IMP/INF) form is still missing —
# no IMP-aspect paradigm cell — deferred to 9.O / paradigm-cell-add
# work") closes here.
#
# Phase 9.O.5: ``feats: {POLITE_MARKER: true}`` flags this specific
# cell (not other mang_retain forms) for the polite-imperative wrap
# rule (``Mangyaring umalis kayo.`` "Kindly leave."). Only ``mangyari``
# (yari + bare CTPL) carries the politeness reading; the PFV
# ``nangyari`` and IPFV/CTPL-with-redup forms are just "happen"-tense.
- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: nasal_assim_prefix, value: "mang"}
  feats: {POLITE_MARKER: true}
  notes: |
    mangyari (bare CTPL without cv-redup — used in subordinate /
    modal-XCOMP / hortative contexts where the matrix carries
    aspect/mood semantics; parallel to the bare OV `kainin` cell
    from Phase 5n.A Commit 14 and the 9.O ma_an bare CTPL cell).
    The POLITE_MARKER flag licenses the 9.O.5 polite-imperative
    wrap rule.

# === AV — Actor Voice (maka- abilitative class) ==========================
#
# MOOD = ABIL distinguishes abilitative readings ("be able to ...").
# The naka-/maka- alternation parallels nag-/mag- in realis vs irrealis.

- voice: AV
  aspect: PFV
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: prefix, value: "naka"}
  notes: nakakain, nakabili ("was able to eat / buy")

- voice: AV
  aspect: IPFV
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "naka"}
  notes: nakakakain, nakakabili

- voice: AV
  aspect: CTPL
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "maka"}
  notes: makakakain, makakabili

# Phase 9.X.c5: bare maka- AV ABIL SOC cell — maka- prefix on
# bare root (no CV-redup). Parallel to the OV/DV/IV/ma_soc CTPL
# SOC bare-form cells (Phase 5n.A C14 / Phase 9.X.pre-4.1 /
# 9.X.pre-4.6). Surfaces: ``makatakas`` (maka + takas — "able to
# escape"), ``makatapos`` (maka + tapos — "able to finish"),
# ``makakain`` (maka + kain — "able to eat"). Used in modal-XCOMP
# contexts and infinitive complements where the matrix carries
# aspect/mood semantics (``para makatakas sa init...``).
- voice: AV
  aspect: CTPL
  mood: SOC
  transitivity: ''
  affix_class: maka
  feats: {MOOD: SOC}
  operations:
    - {op: prefix, value: "maka"}
  notes: makatakas, makatapos, makakain (bare maka- ABIL infinitive)

# === OV — Objective (Patient) Voice ======================================

- voice: OV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: infix, value: in}
  notes: kinain, binili

- voice: OV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: cv_redup}
    - {op: infix, value: in}
  notes: kinakain, binibili

- voice: OV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: cv_redup}
    - {op: suffix, value: in}
  notes: kakainin, bibilihin (sandhi for vowel-final root)

# Phase 5n.A Commit 14 (§18 L72): bare OV cell — root + -in suffix
# (no CV-redup, no realis infix), MOOD=SOC. Used as the OV
# counterpart to the AV-mag SOC bare-hortative cell above. Surfaces:
# kainin (kain + in), bilihin (bili + h-epenthesis + in), inumin
# (inom + o→u raising + in), gawin (gawa + in via vowel deletion).
# Distribution: imperative ("Kainin mo!" "Eat it!"), modal-XCOMP
# context ("Maaari mong kainin ang isda" "You can eat the fish"),
# and other dependent / non-finite OV positions where the matrix
# carries aspect/mood semantics. Matches the AV-mag SOC pattern
# established by Phase 5e Commit 21.
- voice: OV
  aspect: CTPL
  mood: SOC
  transitivity: TR
  affix_class: in_oblig
  feats: {MOOD: SOC}
  operations:
    - {op: suffix, value: in}
  notes: kainin, bilihin (bare OV + -in for hortative/imperative/modal-XCOMP)

# Phase 9.X.pre-4.5: paki- polite-request cell. Productive across
# TR VERB roots declaring ``affix_class: [paki]``. Surfaces:
# ``paki + abot → pakiabot`` ("please reach/pass"),
# ``paki + sara → pakisara`` ("please close"),
# ``paki + putol → pakiputol`` ("please cut"),
# ``paki + bura → pakibura`` ("please erase").
# Voice OV / aspect CTPL / mood SOC follows the same shape as
# the in_oblig / an_oblig / i_oblig SOC bare-form cells —
# paki- requests pattern with OV-transitive bare-stem imperatives
# rather than aspect-marked indicative forms. The ``POLITE_MARKER``
# feat distinguishes the polite-request reading from plain
# imperative for downstream consumers.
- voice: OV
  aspect: CTPL
  mood: SOC
  transitivity: TR
  affix_class: paki
  feats: {MOOD: SOC, POLITE_MARKER: true}
  operations:
    - {op: prefix, value: paki}
  notes: pakiabot, pakisara, pakiputol, pakibura (paki- polite request)

