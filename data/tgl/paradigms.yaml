# data/tgl/paradigms.yaml
#
# Verbal paradigm cells for the Kroeger four-voice system. Each cell
# is filtered by `affix_class` ‚Äî a string the root's affix_class list
# must contain for the cell to fire. This prevents a -um- only root
# like `kain` from generating mag-/mang- forms it doesn't support.
#
# Operation order applied during generation (see analyzer.py):
#
#   1. cv_redup     ‚Äî first-CV reduplication of the base
#   2. infix        ‚Äî -um- (AV) or -in- (realis) after first consonant;
#                     prefix on vowel-initial bases
#   3. suffix       ‚Äî -in (OV CTPL), -an (DV)
#   4. prefix       ‚Äî i- (IV), nag-/mag-, naka-/maka-
#   5. nasal_prefix ‚Äî nang-/mang- with nasal substitution
#
# CTPL (contemplative / future) cells omit the realis -in- infix; the
# realis/irrealis split is folded into ASPECT for now (the plan ¬ß7.2
# leaves a separate MOOD analysis to a later phase).
#
# Citations: Kroeger 1993 ¬ß¬ß4.2‚Äì4.5; Schachter & Otanes 1972 ¬ß¬ß5.20‚Äì5.30.

# === AV ‚Äî Actor Voice (-um- class) =======================================

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: infix, value: um}
  notes: kumain, bumili (-um- after first consonant)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
    - {op: infix, value: um}
  notes: kumakain, bumibili

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
  notes: kakain, bibili (irrealis ‚Äî no -um-)

# === AV ‚Äî Actor Voice (mag- class) =======================================

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: prefix, value: "nag"}
  notes: naglinis, nagbigay (mag- ‚Üí nag- in realis)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "nag"}
  notes: naglilinis, nagbibigay

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "mag"}
  notes: maglilinis, magbibigay (mag- in irrealis)

# Phase 5e Commit 21: AV-mag SOC (hortative) ‚Äî bare `mag-` + base
# (no CV-redup, no realis), MOOD=SOC. Used in 1pl-INCL hortatives
# like `Maglinis tayo` "Let's clean", `Magbigay tayo ng X` "Let's
# give X", `Magkape tayo` "Let's have coffee". The same
# morphological surface is also the IMP form for 2nd-person
# subjects (`Maglinis ka` "Clean!" ‚Äî addressee-imperative); the
# IMP variant lifts in a separate commit (Group G item 3,
# huwag-MOOD lift). For now, MOOD=SOC is asserted at the morph
# level ‚Äî the existing AV S frames carry MOOD from V to matrix
# without needing new grammar rules.
#
# Lifts the Phase 4 ¬ß7.2 SOC-as-inventory-only deferral for the
# hortative case (Phase 5e Commit 12 already lifted SOC for the
# mag-...-an reciprocal).
- voice: AV
  aspect: CTPL
  mood: SOC
  transitivity: ''
  affix_class: mag
  feats: {MOOD: SOC}
  operations:
    - {op: prefix, value: "mag"}
  notes: maglinis, magbigay (mag- + base for hortative SOC; takes 1pl-INCL `tayo` SUBJ)

# === AV ‚Äî Actor Voice (mang- distributive class) =========================
#
# The mang- prefix exhibits nasal substitution: the prefix's final ng
# adapts to the base's first consonant, which then drops. nang- is
# the realis (PFV/IPFV) variant; mang- is the irrealis (CTPL). The
# IPFV/CTPL reduplication target is the *post-substitution* base
# (bili ‚Üí mili ‚Üí mimili), so the sequence is
# nasal_substitute ‚Üí cv_redup ‚Üí prefix.
#
# Examples: mang + bili ‚Üí mamili; mang + kuha ‚Üí manguha; mang + tahi
# ‚Üí manahi. PFV uses na- as the prefix head, CTPL uses ma-.

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: prefix, value: "na"}
  notes: namili (‚Üê nang+bili), nanahi (‚Üê nang+tahi)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: cv_redup}
    - {op: prefix, value: "na"}
  notes: namimili (‚Üê nang+CV-redup of post-subst base)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  notes: mamimili (‚Üê mang+CV-redup of post-subst base)

# === AV ‚Äî mang- retain pattern (Phase 5e Commit 14) =====================
#
# Schachter & Otanes 1972 ¬ß5.27 + Ramos 1971 paradigm tables note
# that some bases admit a retain-pattern variant of the mang-
# distributive alongside the default drop pattern. The retain
# pattern keeps the base's first consonant and adds a homorganic
# nasal (the same ``nasal_assim_prefix`` op introduced for the
# Phase 5c ¬ß7.7 ipang- IV-INSTR / ika- IV-REASON applicatives):
#
#   mang- + bili ‚Üí drop:   mami ‚Üí mamili    (existing mang class)
#   mang- + bili ‚Üí retain: namb ‚Üí nambili ‚Üí namb-i-bili ‚Üí mambili (Phase 5e)
#
# The two forms can carry slightly different semantics
# ("habitual buyer" vs "engaging in buying activity") or be
# dialectal variants. Per-base flagging via the new ``mang_retain``
# affix class lets bases opt into the retain pattern alongside
# the default drop pattern. The lex entries (BUY <SUBJ> etc.) are
# unchanged ‚Äî both surface forms route to the same PRED.
- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: nasal_assim_prefix, value: "nang"}
  notes: nambili (‚Üê nang+bili, retain pattern). nantahi.

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "nang"}
  notes: nambibili (‚Üê nang+CV-redup of bili ‚Üí nang+bibili ‚Üí nambibili)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "mang"}
  notes: mambibili (‚Üê mang+CV-redup of bili)

# === AV ‚Äî Actor Voice (maka- abilitative class) ==========================
#
# MOOD = ABIL distinguishes abilitative readings ("be able to ...").
# The naka-/maka- alternation parallels nag-/mag- in realis vs irrealis.

- voice: AV
  aspect: PFV
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: prefix, value: "naka"}
  notes: nakakain, nakabili ("was able to eat / buy")

- voice: AV
  aspect: IPFV
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "naka"}
  notes: nakakakain, nakakabili

- voice: AV
  aspect: CTPL
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "maka"}
  notes: makakakain, makakabili

# === OV ‚Äî Objective (Patient) Voice ======================================

- voice: OV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: infix, value: in}
  notes: kinain, binili

- voice: OV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: cv_redup}
    - {op: infix, value: in}
  notes: kinakain, binibili

- voice: OV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: cv_redup}
    - {op: suffix, value: in}
  notes: kakainin, bibilihin (sandhi for vowel-final root)

# Phase 5n.A Commit 14 (¬ß18 L72): bare OV cell ‚Äî root + -in suffix
# (no CV-redup, no realis infix), MOOD=SOC. Used as the OV
# counterpart to the AV-mag SOC bare-hortative cell above. Surfaces:
# kainin (kain + in), bilihin (bili + h-epenthesis + in), inumin
# (inom + o‚Üíu raising + in), gawin (gawa + in via vowel deletion).
# Distribution: imperative ("Kainin mo!" "Eat it!"), modal-XCOMP
# context ("Maaari mong kainin ang isda" "You can eat the fish"),
# and other dependent / non-finite OV positions where the matrix
# carries aspect/mood semantics. Matches the AV-mag SOC pattern
# established by Phase 5e Commit 21.
- voice: OV
  aspect: CTPL
  mood: SOC
  transitivity: TR
  affix_class: in_oblig
  feats: {MOOD: SOC}
  operations:
    - {op: suffix, value: in}
  notes: kainin, bilihin (bare OV + -in for hortative/imperative/modal-XCOMP)

