  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: infix, value: in}
  notes: kinain, binili

- voice: OV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: cv_redup}
    - {op: infix, value: in}
  notes: kinakain, binibili

- voice: OV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: in_oblig
  operations:
    - {op: cv_redup}
    - {op: suffix, value: in}
  notes: kakainin, bibilhin (sandhi for vowel-final root)

