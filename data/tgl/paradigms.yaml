#
# Phase 4 §7.2: the recent-perfective aspect uses the ka- prefix +
# CV-redup of the root, no infix or voice morphology beyond the
# affix-class filter. Surfaces: "kakakain" (just ate), "kabibili"
# (just bought), "kasusulat" (just wrote). MOOD remains IND.
#
# Citations: Schachter & Otanes 1972 §5.31; Ramos & Bautista 1986
# paradigm tables (RECPFV column).

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: kakakain, kabibili (RECPFV across um-class roots)

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: kasusulat, kalilinis (RECPFV across mag-class roots)

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: katutulog, kakikita (RECPFV across ma-class roots)

# === AV — ma- non-volitional / stative class =============================
#
# The ma- prefix marks non-volitional / accidental / stative readings
# distinct from the maka- abilitative (which carries MOOD=ABIL). MOOD
# here is NVOL ("non-volitional") — Schachter & Otanes 1972 §5.27,
# Kroeger 1993 §4.5. The realis/irrealis split parallels mag-: na-
# in PFV/IPFV, ma- in CTPL.
#
# Examples: ma- + tulog → natulog ("happened to fall asleep");
# ma- + upo → naupo ("happened to sit down").

- voice: AV
  aspect: PFV
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: prefix, value: "na"}
  notes: natulog, naupo (ma- non-volitional realis PFV)

- voice: AV
  aspect: IPFV
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "na"}
  notes: natutulog, nauupo

- voice: AV
  aspect: CTPL
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  notes: matutulog, mauupo (ma- non-volitional irrealis)

# Phase 9.X.pre-4.7: pag- gerund nominalization. Two cells per
# opted-in VERB root, both with ``base_pos: VERB`` and
# ``pos: NOUN`` (POS-flip output to the nouns index via
# `_index_paradigm_via_base_pos`). The two cells generate the
# two productive surface variants:
#
# * No-redup: ``pag + ROOT`` = ``pagdating`` (C-initial main
#   "the arrival"), ``pagtulong`` ("the helping"), ``pagaral``
#   (V-initial no-redup variant; less common than ``pagaaral``
#   but attested).
# * CV-redup: ``pag + cv_redup(ROOT)`` = ``pagaaral`` (V-initial
#   main "the studying" — cv_redup on V-initial gives VV-redup
#   like ``aaral``), ``pagtatanim`` (C-initial intensive/IPFV
#   gerund), ``pagsasabi`` (C-initial intensive).
#
# Both forms ride on ``affix_class: pag_gerund`` opt-in. Per-root
# opt-in (rather than productive on every VERB) keeps scope
