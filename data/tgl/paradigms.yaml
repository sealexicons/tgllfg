# === IV — Instrumental / Benefactive Voice ===============================

# Bare IV `i-` carries APPL=CONVEY — the conveyed-pivot reading
# (Phase 4 §7.7). Other applicative variants (BEN via ipag-,
# INSTR via ipang-, REASON via ika-) live under their own affix
# classes below.
- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinain, ibinili

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakain, ibinibili

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "i"}
  notes: ikakain, ibibili

# === AV — RECPFV ("just-completed") =====================================
#
# Phase 4 §7.2: the recent-perfective aspect uses the ka- prefix +
# CV-redup of the root, no infix or voice morphology beyond the
# affix-class filter. Surfaces: "kakakain" (just ate), "kabibili"
# (just bought), "kasusulat" (just wrote). MOOD remains IND.
#
# Citations: Schachter & Otanes 1972 §5.31; Ramos & Bautista 1986
# paradigm tables (RECPFV column).

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: kakakain, kabibili (RECPFV across um-class roots)

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: kasusulat, kalilinis (RECPFV across mag-class roots)

- voice: AV
  aspect: RECPFV
  mood: IND
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
  notes: katutulog, kakikita (RECPFV across ma-class roots)

# === AV — ma- non-volitional / stative class =============================
#
# The ma- prefix marks non-volitional / accidental / stative readings
# distinct from the maka- abilitative (which carries MOOD=ABIL). MOOD
# here is NVOL ("non-volitional") — Schachter & Otanes 1972 §5.27,
# Kroeger 1993 §4.5. The realis/irrealis split parallels mag-: na-
# in PFV/IPFV, ma- in CTPL.
#
# Examples: ma- + tulog → natulog ("happened to fall asleep");
# ma- + upo → naupo ("happened to sit down").

- voice: AV
  aspect: PFV
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: prefix, value: "na"}
  notes: natulog, naupo (ma- non-volitional realis PFV)

- voice: AV
  aspect: IPFV
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "na"}
  notes: natutulog, nauupo

- voice: AV
  aspect: CTPL
  mood: NVOL
  transitivity: ''
  affix_class: ma
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  notes: matutulog, mauupo (ma- non-volitional irrealis)

# === Phase 4 §7.7: applicatives + causatives ============================
#
# Applicative IV variants beyond the bare ``i-`` (CONVEY) reading:
# ``ipag-`` benefactive (APPL=BEN) is added here.
# Phase 5c §7.7 follow-on (Commit 4) adds ``ipang-`` instrumental
# (APPL=INSTR) and ``ika-`` reason (APPL=REASON) using the new
# ``nasal_assim_prefix`` op for ipang-.
#
# Causatives use the ``pa-`` prefix in two configurations:
#   - **Monoclausal direct causative** (``pa_in`` OV): ``pinakain``
#     "fed (cause-eat)". Causee is pivot/SUBJ; causer is GEN/OBJ.
#     Single-clause; argument structure ``<SUBJ, OBJ>``.
#   - **Biclausal indirect causative** (``magpa`` AV): ``nagpakain``
#     "had-eaten / caused to eat". Causer is pivot/SUBJ; the caused
#     event is an XCOMP. Re-uses the §7.6 control infrastructure
#     via ``CTRL_CLASS=INTRANS`` on the lex entry.
#
# Citations: Schachter & Otanes 1972 §5.32–5.34; Ramos & Bautista
# 1986 paradigm tables (BEN, CAUS columns); Kroeger 1993 §6 on
# applicatives.

# --- ipag- benefactive applicative (APPL=BEN) -----------------------------
- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: ipag
  feats: {APPL: BEN}
  operations:
    - {op: prefix, value: "pag"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinaggawa, ipinagsulat (BEN PFV; agent GEN, beneficiary NOM)

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: ipag
  feats: {APPL: BEN}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pag"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinaggagawa, ipinagsusulat

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ipag
  feats: {APPL: BEN}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pag"}
    - {op: prefix, value: "i"}
  notes: ipaggagawa, ipagsusulat

# --- ipang- instrumental applicative (APPL=INSTR) -----------------------
#
# The pang- prefix's final ng place-assimilates to the base's
# initial consonant without dropping it (Phase 5c §7.7 follow-on,
# Commit 4): pang- + bili → pambili, pang- + tahi → pantahi.
# Distinguished from the AV distributive ``mang-`` on the same
# root, which DROPS the consonant (mang- + bili → mamili "be a
# buyer"); both patterns coexist in modern Tagalog with different
# meanings. Operations mirror ipag- with nasal_assim_prefix("pang")
# in place of prefix("pag"). Surface forms for bili: ipinambili
# (PFV), ipinambibili (IPFV), ipambibili (CTPL).

- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: ipang
  feats: {APPL: INSTR}
  operations:
    - {op: nasal_assim_prefix, value: "pang"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinambili (← pang+bili → pambili → pinambili → ipinambili), ipinantahi

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: ipang
  feats: {APPL: INSTR}
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "pang"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ipinambibili (← cv_redup of bili → bibili → pambibili → pinambibili → ipinambibili)

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ipang
  feats: {APPL: INSTR}
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "pang"}
    - {op: prefix, value: "i"}
  notes: ipambibili (CTPL — cv-redup + pang-assim + i-)

# --- ika- reason applicative (APPL=REASON) ------------------------------
#
# The ka- prefix has no homorganic-nasal sandhi, so the cells are
# parametrically identical to ipag- (substituting "ka" for "pag").
# Reason readings: ikinakain "[reason for which X] ate";
# ikinasulat "[reason for which X] wrote". The base remains intact;
# the -in- realis infix sits between the prefix's "k" and "a".
# Surface forms for kain: ikinakain (PFV), ikinakakain (IPFV),
# ikakakain (CTPL).

- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: prefix, value: "ka"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakain (← ka+kain → kakain → kinakain → ikinakain), ikinasulat

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakakain (← cv_redup of kain → kakain → kakakain → kinakakain → ikinakakain)

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "ka"}
    - {op: prefix, value: "i"}
  notes: ikakakain (CTPL "long" form — cv-redup + ka- prefix + i-)

# Phase 5e Commit 24: IV-REASON CTPL "short" form. Lifts the
# Phase 5d Commit 9 paradigm-gap deferral. The Handbook of
# Tagalog Verbs (Ramos & Schachter; data/tgl/dictionaries/)
# lists RF (Reason Focus) Cont with two variants separated by
# `/` — e.g., for vowel-initial root `ingay`: `ikakaingay /
# ikaiingay` (line 4120 in OCR); for `init`: `ikakainit /
# ikaiinit` (line 4161). The first variant has an extra CV-
# redup; the second drops it.
#
# For consonant-initial bases like `kain`, the analogous
# "short" form is `ikakain` (i + ka + kain, no further redup) —
# distinct from the "long" `ikakakain` only in whether the
# CV-redup fires. Both are valid IV-REASON CTPL surfaces.
#
# This cell uses operations `[prefix ka, prefix i]` (no
# cv_redup), producing the "short" form. Same operations as
# IV-CONVEY CTPL would produce the same surface for some bases
# (e.g., `kain` → `ikakain`); the morph analyzer returns BOTH
# analyses (IV-CONVEY CTPL and IV-REASON CTPL "short"), and
# the chart parser explores both readings. For other bases,
# the surfaces differ:
#
#   kain    → IV-CONVEY CTPL `ikakain`  + IV-REASON CTPL "short" `ikakain` (same surface)
#           → IV-REASON CTPL "long" `ikakakain` (existing cell above)
#   bili    → IV-CONVEY CTPL `ibibili`  + IV-REASON CTPL "short" `ikabili`
#           → IV-REASON CTPL "long" `ikabibili` (existing cell above)
#   sulat   → IV-CONVEY CTPL `isusulat` + IV-REASON CTPL "short" `ikasulat`
#           → IV-REASON CTPL "long" `ikasusulat` (existing cell above)
- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: ika
  feats: {APPL: REASON}
  operations:
    - {op: prefix, value: "ka"}
    - {op: prefix, value: "i"}
  notes: ikakain, ikabili (CTPL "short" form — ka- prefix + i-, no cv-redup)

# --- pa-...-in monoclausal direct causative (CAUS=DIRECT, OV) -----------
- voice: OV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: pa_in
  feats: {CAUS: DIRECT}
  operations:
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
  notes: pinakain, pinabasa (causee=SUBJ via NOM; causer=OBJ via GEN)

- voice: OV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: pa_in
  feats: {CAUS: DIRECT}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
  notes: pinakakain, pinababasa

- voice: OV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: pa_in
  feats: {CAUS: DIRECT}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "pa"}
    - {op: suffix, value: in}
  notes: "pakakainin, pababasahin (CTPL — cv-redup + pa- prefix + -in suffix)"

# --- pa-...-an monoclausal direct causative, locative pivot (CAUS=DIRECT, DV) ---
#
# Phase 5d Commit 2: parallel to pa-...-in (OV) but with the
# DV `-an` suffix. The pivot is the location / recipient of
# the caused event rather than the causee. Surface forms
# mirror the pa_in pattern with `an` substituted for `in`:
#
#   PFV   pinakainan   ← pa+kain → pinakain → pinakainan
#   IPFV  pinakakainan ← cv_redup of kain + pa+ + -in- + -an
#   CTPL  pakakainan   ← cv_redup + pa- + -an (no -in- infix)

- voice: DV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: pa_an
  feats: {CAUS: DIRECT}
  operations:
    - {op: prefix, value: "pa"}
    - {op: infix, value: in}
    - {op: suffix, value: an}
  notes: "pinakainan, pinabasahan (PFV; location/recipient = SUBJ via NOM, causer = OBJ via GEN)"

- voice: DV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: pa_an
  feats: {CAUS: DIRECT}
  operations:
