# data/tgl/paradigms.yaml
#
# Verbal paradigm cells for the Kroeger four-voice system. Each cell
# is filtered by `affix_class` — a string the root's affix_class list
# must contain for the cell to fire. This prevents a -um- only root
# like `kain` from generating mag-/mang- forms it doesn't support.
#
# Operation order applied during generation (see analyzer.py):
#
#   1. cv_redup     — first-CV reduplication of the base
#   2. infix        — -um- (AV) or -in- (realis) after first consonant;
#                     prefix on vowel-initial bases
#   3. suffix       — -in (OV CTPL), -an (DV)
#   4. prefix       — i- (IV), nag-/mag-, naka-/maka-
#   5. nasal_prefix — nang-/mang- with nasal substitution
#
# CTPL (contemplative / future) cells omit the realis -in- infix; the
# realis/irrealis split is folded into ASPECT for now (the plan §7.2
# leaves a separate MOOD analysis to a later phase).
#
# Citations: Kroeger 1993 §§4.2–4.5; Schachter & Otanes 1972 §§5.20–5.30.

# === AV — Actor Voice (-um- class) =======================================

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: infix, value: um}
  notes: kumain, bumili (-um- after first consonant)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
    - {op: infix, value: um}
  notes: kumakain, bumibili

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: um
  operations:
    - {op: cv_redup}
  notes: kakain, bibili (irrealis — no -um-)

# === AV — Actor Voice (mag- class) =======================================

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: prefix, value: "nag"}
  notes: naglinis, nagbigay (mag- → nag- in realis)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "nag"}
  notes: naglilinis, nagbibigay

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mag
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "mag"}
  notes: maglilinis, magbibigay (mag- in irrealis)

# Phase 5e Commit 21: AV-mag SOC (hortative) — bare `mag-` + base
# (no CV-redup, no realis), MOOD=SOC. Used in 1pl-INCL hortatives
# like `Maglinis tayo` "Let's clean", `Magbigay tayo ng X` "Let's
# give X", `Magkape tayo` "Let's have coffee". The same
# morphological surface is also the IMP form for 2nd-person
# subjects (`Maglinis ka` "Clean!" — addressee-imperative); the
# IMP variant lifts in a separate commit (Group G item 3,
# huwag-MOOD lift). For now, MOOD=SOC is asserted at the morph
# level — the existing AV S frames carry MOOD from V to matrix
# without needing new grammar rules.
#
# Lifts the Phase 4 §7.2 SOC-as-inventory-only deferral for the
# hortative case (Phase 5e Commit 12 already lifted SOC for the
# mag-...-an reciprocal).
- voice: AV
  aspect: CTPL
  mood: SOC
  transitivity: ''
  affix_class: mag
  feats: {MOOD: SOC}
  operations:
    - {op: prefix, value: "mag"}
  notes: maglinis, magbigay (mag- + base for hortative SOC; takes 1pl-INCL `tayo` SUBJ)

# === AV — Actor Voice (mang- distributive class) =========================
#
# The mang- prefix exhibits nasal substitution: the prefix's final ng
# adapts to the base's first consonant, which then drops. nang- is
# the realis (PFV/IPFV) variant; mang- is the irrealis (CTPL). The
# IPFV/CTPL reduplication target is the *post-substitution* base
# (bili → mili → mimili), so the sequence is
# nasal_substitute → cv_redup → prefix.
#
# Examples: mang + bili → mamili; mang + kuha → manguha; mang + tahi
# → manahi. PFV uses na- as the prefix head, CTPL uses ma-.

- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: prefix, value: "na"}
  notes: namili (← nang+bili), nanahi (← nang+tahi)

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: cv_redup}
    - {op: prefix, value: "na"}
  notes: namimili (← nang+CV-redup of post-subst base)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang
  operations:
    - {op: nasal_substitute}
    - {op: cv_redup}
    - {op: prefix, value: "ma"}
  notes: mamimili (← mang+CV-redup of post-subst base)

# === AV — mang- retain pattern (Phase 5e Commit 14) =====================
#
# Schachter & Otanes 1972 §5.27 + Ramos 1971 paradigm tables note
# that some bases admit a retain-pattern variant of the mang-
# distributive alongside the default drop pattern. The retain
# pattern keeps the base's first consonant and adds a homorganic
# nasal (the same ``nasal_assim_prefix`` op introduced for the
# Phase 5c §7.7 ipang- IV-INSTR / ika- IV-REASON applicatives):
#
#   mang- + bili → drop:   mami → mamili    (existing mang class)
#   mang- + bili → retain: namb → nambili → namb-i-bili → mambili (Phase 5e)
#
# The two forms can carry slightly different semantics
# ("habitual buyer" vs "engaging in buying activity") or be
# dialectal variants. Per-base flagging via the new ``mang_retain``
# affix class lets bases opt into the retain pattern alongside
# the default drop pattern. The lex entries (BUY <SUBJ> etc.) are
# unchanged — both surface forms route to the same PRED.
- voice: AV
  aspect: PFV
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: nasal_assim_prefix, value: "nang"}
  notes: nambili (← nang+bili, retain pattern). nantahi.

- voice: AV
  aspect: IPFV
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "nang"}
  notes: nambibili (← nang+CV-redup of bili → nang+bibili → nambibili)

- voice: AV
  aspect: CTPL
  mood: IND
  transitivity: ''
  affix_class: mang_retain
  operations:
    - {op: cv_redup}
    - {op: nasal_assim_prefix, value: "mang"}
  notes: mambibili (← mang+CV-redup of bili)

# === AV — Actor Voice (maka- abilitative class) ==========================
#
# MOOD = ABIL distinguishes abilitative readings ("be able to ...").
# The naka-/maka- alternation parallels nag-/mag- in realis vs irrealis.

- voice: AV
  aspect: PFV
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: prefix, value: "naka"}
  notes: nakakain, nakabili ("was able to eat / buy")

- voice: AV
  aspect: IPFV
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "naka"}
  notes: nakakakain, nakakabili

- voice: AV
  aspect: CTPL
  mood: ABIL
  transitivity: ''
  affix_class: maka
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "maka"}
  notes: makakakain, makakabili

