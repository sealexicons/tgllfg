# === Phase 5n.C.3: non-verbal paradigm cells (base_pos != VERB) =========
#
# Productive paradigms over NOUN / ADJ / PRON roots. The shared
# operation-execution engine (analyzer.generate_form + sandhi.py)
# is POS-agnostic; the ``base_pos`` discriminator on each cell
# (Phase 5n.C.3 Commit 1) routes the cell to the matching root POS
# during indexing. See ``src/tgllfg/morph/analyzer.py``
# ``_index_paradigm_via_base_pos``.

# --- Phase 5n.C.3 Commit 2 / Phase 10.D: card_redup (§18 L31) -----------
# Quantitative compound cardinals via full-root reduplication: ``daan``
# → ``daandaan`` "hundreds (of)", ``libo`` → ``libulibo`` "thousands
# (of)", ``milyon`` → ``milyonmilyon`` "millions (of)". Cell.feats
# contributes ``MEASURE=true`` so the existing measure-N grammar rule
# (``cfg/nominal.py``) fires on the derived surface; root-side
# ``COLL_VALUE`` (HUNDREDS / THOUSANDS / MILLIONS) propagates per-root.
#
# Phase 10.D unified this onto the ``redup_root`` op (was the
# bespoke ``full_redup`` op, now removed — card_redup was its sole
# user). First-copy /o/→/u/ raising is now the per-root
# ``redup_o_raise`` sandhi flag (same machinery as 10.A ``taon`` →
# ``taun-taon``) rather than baked into the op: ``libo`` opts in
# (→ ``libulibo``); ``daan`` has no stem /o/ so needs nothing
# (→ ``daandaan``); ``milyon`` is a Spanish loan whose closed final
# syllable /-on/ does NOT raise (→ ``milyonmilyon``, not
# ``*milyunmilyon``) so it also opts out. Surfaces for daan/libo are
# byte-identical to the pre-10.D ``full_redup`` output.
#
# Phase 10.D also stamps the cross-cutting ``REDUP=FULL`` +
# ``REDUP_SEM=QUANT`` morphology feats (QUANT = quantitative
# large-number redup, distinct from the DISTR/FREQ siblings). No
# ``lemma_redup_hyphen``: card_redup is NOUN→NOUN (no POS-flip), so
# per the established convention (POS-flip redup cells hyphenate the
# LEMMA; same-POS cells keep the root citation — cf. redup_intens_adj)
# the LEMMA stays the bare root (``libo`` / ``daan`` / ``milyon``),
# which also feeds MEASURE_HEAD cleanly.
#
# References: Schachter & Otanes 1972 §6 (collective cardinal redup;
# attests ``daan-daan`` / ``libu-libo`` + linker form ``libu-libong
# tao``); Phase 10 external-reviewer typology (daan-daan / libo-libo
# / milyon-milyon); R&B 1986 paradigm tables.
- base_pos: NOUN
  affix_class: card_redup
  operations:
    - {op: redup_root}
  feats: {MEASURE: true, REDUP: FULL, REDUP_SEM: QUANT}
  notes: card_redup — daan → daandaan, libo → libulibo (redup_o_raise), milyon → milyonmilyon (Phase 10.D)

# --- Phase 5n.C.3 Commit 3: tig_distrib (§18 L31) -----------------------
# Productive distributive numerals: ``tig-isa`` "one each",
# ``tig-dalawa`` "two each", etc. Single ``prefix tig`` op produces
# the derived surface; cell.feats contributes the construction-
# level markers ``DISTRIB=YES`` (the distributive reading) and
# ``CARDINAL=YES`` (so the existing Phase 5f Commit 1 cardinal
# NP-modifier rule consumes the surface unchanged). Root-side
# ``CARDINAL_VALUE`` (1-10) propagates per-root via the standard
# merge.
#
# NUM-pos roots live in ``data/tgl/numerals.yaml``; the matching
# tokenizer pre-pass (``text/multiword.py`` hyphen-merge) folds
# ``tig-isa`` into ``tigisa`` so the productive surface tokenises
# cleanly. References: Schachter & Otanes 1972 §5.27 (distributive
# tig-); §4 (cardinal numerals).
- base_pos: NUM
  affix_class: tig_distrib
  operations:
    - {op: prefix, value: "tig"}
  feats: {DISTRIB: true, CARDINAL: true, NUM: PL}
  notes: tig_distrib — isa → tigisa, dalawa → tigdalawa, ...

# Phase 9.X.c6: approximate-redup CV-reduplication of NUM stems.
# Productive opt-in via ``affix_class: [approx_redup]`` on numerals.
# Surfaces: ``dalawa`` → ``dadalawa`` "about/approximately two"
# (PANAHON sent-2: ``Dadalawa lamang ang masasabing tunay na
# panahon dito``); ``tatlo`` → ``tatatlo``; ``apat`` → ``aapat``.
# Distinct from the Phase 5n.C.3 ``tig_distrib`` distributive
# (``tigdalawa`` "two each"), the approximative carries
# ``APPROX: true``.
- base_pos: NUM
  affix_class: approx_redup
  operations:
    - {op: cv_redup}
  feats: {APPROX: true, CARDINAL: true}
  notes: approx_redup — dalawa → dadalawa, tatlo → tatatlo

# --- Phase 5n.C.3 Commit 4: tag_season (§18 L31) ------------------------
# Productive season noun derivation: ``tag-`` prefix + NOUN root
# yields a season name. ``araw`` "sun" → ``tagaraw`` "sunny
# period"; ``ulan`` "rain" → ``tagulan`` "rainy season";
# ``init`` "heat" → ``taginit`` "hot/dry season"; ``lamig``
# "cold" → ``taglamig`` "cold spell"; ``gutom`` "hunger" →
# ``taggutom`` "hunger season".
#
# Replaces the 5 hand-coded ``tag*`` NOUN entries from Phase 5f
# Commit 14. The hyphen-merge tokenizer pre-pass
# (``text/multiword.py``) folds canonical ``tag-init`` etc. into
# the single-token form the productive cell generates. Cell.feats
# contributes ``SEM_CLASS=SEASON``; root-side affix_class
# ``[tag_season]`` gates the cell to the 5 season-base nouns.
# References: Schachter & Otanes 1972 §5 (``tag-`` derivation);
# R&B 1986 ch.4.
- base_pos: NOUN
  affix_class: tag_season
  operations:
    - {op: prefix, value: "tag"}
  feats: {SEM_CLASS: SEASON}
  notes: tag_season — araw → tagaraw, ulan → tagulan, init → taginit, lamig → taglamig, gutom → taggutom

# --- Phase 8.C: pinaka_n NOUN superlative -------------------------------
# Productive ``pinaka-`` superlative derivation on inherently
# relational NOUN bases: ``ubod`` "core" → ``pinakaubod`` "the
# core/innermost"; ``puno`` "head/principal" → ``pinakapuno``
# "the head/chief". Audit-surfaced (rg81 ANG PAMILYA prose,
# Wave 1).
#
# Parallel to the Phase 5h ADJ superlative cell in
# ``adj_paradigms.yaml`` (``ma_adj`` + ``pinaka``) and the
# Phase 5n.B Commit 4 closed-class Q-head + ADV-FREQUENCY
# entries in ``particles.yaml`` — same prefix, same
# ``COMP_DEGREE: SUPERLATIVE`` feat, NOUN-shaped surface so
# standard NP rules consume it unchanged.
#
# Opt-in via per-root ``affix_class: [pinaka_n]``. The cell is
# narrow because the semantics are restricted: only inherently
# relational / scale-bearing nouns (head, core, leader, member,
# etc.) admit the "the most-X" reading; the cell does NOT fire
# on ordinary count nouns like ``aklat`` "book" or ``aso``
# "dog" — even though ``*pinakaaklat`` would be morphologically
# well-formed, it is semantically anomalous.
# References: S&O 1972 §5 (pinaka- superlative); R&G 1981 §6.
- base_pos: NOUN
  affix_class: pinaka_n
  operations:
    - {op: prefix, value: "pinaka"}
  feats: {COMP_DEGREE: SUPERLATIVE}
  notes: "pinaka_n — NOUN superlative: ubod → pinakaubod, puno → pinakapuno"

# --- Phase 8.C: pinaka_adj_from_n (POS-flipping superlative) ------------
# Companion to ``pinaka_n`` that outputs an ADJ-shaped surface from
# a NOUN base. The dual analysis is well-attested for ``puno`` —
# the same ``pinakapuno`` surface admits both readings:
#
#   NOUN: "the head, the chief, the principal one" (relational
#         nominal — used as NP head, e.g.
#         "ang ama ang pinakapuno ng pamilya")
#   ADJ:  "principal, most important" (predicate / modifier —
#         GT lists "most important" as the primary translation)
#
# The POS flip uses the ``cell.pos`` override on
# ``_index_paradigm_via_base_pos`` (Phase 8.C analyzer extension,
# mirroring the existing ``kani_redup`` PRON → Q flip route).
# Both cells fire on any NOUN root declaring the matching
# affix_class; opt-in is intentionally narrow because the ADJ
# reading is restricted to nouns with a comparable "principal-of"
# semantics.
#
# References: S&O 1972 §5; R&G 1981 §6; GT lexicographic glosses.
- base_pos: NOUN
  pos: ADJ
  affix_class: pinaka_adj_from_n
  operations:
    - {op: prefix, value: "pinaka"}
  feats: {COMP_DEGREE: SUPERLATIVE, PREDICATIVE: true}
  notes: "pinaka_adj_from_n — NOUN→ADJ superlative: puno (n. head) → pinakapuno (adj. principal/most important)"

# --- Phase 8.L Commit 3: kasing_n_eq (NOUN→ADJ equative) ----------------
# The ``kasing-`` prefix on a measurement-attribute NOUN produces
# an ADJ-shaped surface asserting equal-N-ness between two
# entities: ``kasing-edad`` "of the same age", ``kasing-bigat``
# "of the same weight", ``kasing-tangkad`` "of the same height
# (body)". The orthography is variable — solid (``kasingedad``),
# hyphen-joined (``kasing-edad``), or even space-separated
# (``kasing edad``) in less formal registers. Wave 2/3 audit hit
# (R&G Intermediate page 238 — ``Kasing-edad pala ni Nadette.``
# "She's the same age, no less, as Nadette") uses the hyphen
# form; this cell handles the solid form, and Phase 8.L Commit 4
# adds the hyphen-joined c-structure rule.
#
# Companion to the Phase 5h Commit 2 ADJ-base ``kasing-`` cell:
# both produce ADJ surfaces with ``COMP_DEGREE: EQUATIVE`` and
# ``PREDICATIVE: true``, so the existing predicative-ADJ clause
# rule and the two-NP equative frame rules (also Phase 5h C2)
# consume the surface unchanged.
#
# Feats: ``COMP_DEGREE: EQUATIVE`` (drives the existing equative
# grammar) + ``PREDICATIVE: true`` (drives the predicative-ADJ
# rule) + ``KASING_N: true`` (declarative marker — the surface
# originates from a NOUN base, in case downstream consumers need
# to distinguish ADJ-derived vs NOUN-derived equatives).
- base_pos: NOUN
  pos: ADJ
  affix_class: kasing_n_eq
  operations:
    - {op: prefix, value: "kasing"}
  feats: {COMP_DEGREE: EQUATIVE, PREDICATIVE: true, KASING_N: true}
  notes: "kasing_n_eq — NOUN→ADJ equative: edad → kasingedad, bigat → kasingbigat"

# --- Phase 5n.C.3 Commit 5: kani_redup (§18 L31) ------------------------
# Distributive-possessive redup on 3rd-person DAT pronouns —
# productive replacement for the Phase 5f Commit 21 hand-coded
# ``kanikaniya`` / ``kanyakanya`` Q forms. The ``kani_redup`` op
# (analyzer.py + sandhi.kani_reduplicate) handles two patterns:
# 2-syllable bases (``kanya``) get full reduplication; 3-syllable
# bases (``kaniya`` / ``kanila``) have the first copy truncated to
# 2 syllables and concatenated with the full base.
#
# POS-flip: cell.pos=Q overrides the PRON base. Distributive-
# possessive surfaces are syntactically Q (preposed quantifier
# with linker complement, matching Phase 5f Commits 15 / 20 / 22),
# so the derived form is indexed as Q in the particles table —
# the same shape consumers expect.
# References: Schachter & Otanes 1972 §10 (universal quantification);
# R&B 1986 ch.10 (distributive possessive pronouns).
- base_pos: PRON
  pos: Q
  affix_class: kani_redup
  operations:
    - {op: kani_redup}
  feats: {QUANT: EACH_OWN, DISTRIB_POSS: true}
  notes: kani_redup — kanya → kanyakanya, kaniya → kanikaniya, kanila → kanikanila

# --- Phase 5n.C.3 Commit 7: redup_intens_adj (§18 L37) ------------------
# Reduplicated intensive adjectives — "rather X" / "X-ish":
# ``maganda-ganda`` "rather beautiful", ``maliit-liit`` "rather
# small", ``mabilis-bilis`` "rather fast", ``mabait-bait`` "rather
# kind". The hyphen-merge tokenizer pre-pass collapses the
# canonical hyphenated form to the single-token surface that
# this paradigm generates (``magandaganda`` etc.).
#
# Operations: ``[prefix ma, redup_root]``. Order matters — the
# Commit 6 ``redup_root`` op appends the root after the prefix
# has been attached, so the prefix appears only on the first
# copy. Distinct from ``full_redup`` which would put ``ma-`` on
# both copies. Reference: Schachter & Otanes 1972 §5
# (intensive redup); R&B 1986 ch.4.
#
# The cell re-uses the existing ``affix_class: ma_adj`` filter
# so every ma_adj-class ADJ root automatically produces an
# intensive form. The output is an ADJ with ``INTENS: MILD`` —
# semantically weaker than the Phase 5h ``napaka-`` super-
# intensifier (``COMP_DEGREE: INTENSIFIER``). The two
# mechanisms are syntactically parallel (both are ADJ surfaces)
# but morphologically distinct.
- base_pos: ADJ
  affix_class: ma_adj
  operations:
    - {op: prefix, value: "ma"}
    - {op: redup_root}
  feats: {PREDICATIVE: true, INTENS: MILD}
  notes: redup_intens_adj — ganda → magandaganda (L37 redup intensive)

# --- Phase 5n.C.3 Commit 8: kasing_redup_adj (§18 L38) ------------------
# CV-reduplicated equative variant — "just as X" / "exactly as X":
# ``kasinggaganda``, ``kasingdadali``, ``kasingbabait``. Per
# Schachter & Otanes 1972 §5 the CV-redup form is a stylistic
# variant of the modern ``kasing-`` equative
# (``kasingganda`` "as beautiful (as)"). In modern usage the two
# forms are semantically equivalent — both translate as "just as
# X" (verified 2026-05-10 via GT comparison of ``kasingganda``
# / ``kasinggaganda``). The earlier C8 ``REGISTER: ARCHAIC``
# distinguishing feat was dropped per the GT observation; the
# productive paradigm now produces a surface distinct from the
# bare ``kasing-`` form but f-structure-identical to it.
#
# Operations: ``[cv_redup, prefix kasing]``. CV-reduplicates the
# root first (``ganda`` → ``gaganda``, ``dali`` → ``dadali``,
# ``bait`` → ``babait``), then prefixes with ``kasing``. Re-uses
# the existing ``cv_redup`` and ``prefix`` ops — no new op
# needed.
#
# Cell.feats: ``COMP_DEGREE: EQUATIVE`` (so the existing Phase
# 5h Commit 2 equative grammar rules consume the surface
# unchanged) + ``PREDICATIVE: YES``. The note in
# ``adj_paradigms.yaml`` for the bare ``kasing-`` cell flagged
# this redup form as deferred to L38; this commit closes the
# deferral.
- base_pos: ADJ
  affix_class: ma_adj
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "kasing"}
  feats: {PREDICATIVE: true, COMP_DEGREE: EQUATIVE}
  notes: kasing_redup_adj — ganda → kasinggaganda, dali → kasingdadali (L38 CV-redup equative)

# --- Phase 5n.C.3 Commit 9: redup_wh_plural (§18 L49) -------------------
# Reduplicated wh-plural PRON surfaces — ``ano-ano`` "what-PL /
# various things", ``sino-sino`` "who-PL / random people",
# ``kanino-kanino`` "to whom-PL", ``alin-alin`` "which-PL". The
# hyphen-merge tokenizer pre-pass collapses the canonical
# hyphenated form to the single-token surface this paradigm
# generates (``anoano`` etc.).
#
# Operations: ``[redup_root]``. The Commit 6 ``redup_root`` op
# appends the original ``root.citation`` to the current base; for
# a freshly-loaded synthetic Root from a wh-PRON, the initial
# base IS root.citation (no prior prefix), so the op produces
# ``ano`` + ``ano`` = ``anoano``, ``kanino`` + ``kanino`` =
# ``kaninokanino``, etc. No prefix, no sandhi.
#
# Distinct from ``full_redup`` (Commit 2) — that op applies o→u
# raising on the first copy, which is wrong for wh-PRONs ending
# in /o/ (``ano`` would yield ``anuano`` ≠ ``anoano``).
#
# Cell.feats: ``NUM: PL`` (the plural reading marker; bare
# wh-PRONs don't carry NUM). ``WH: YES`` already rides through
# from root.feats. Output pos stays PRON (no pos-flip) — the
# derived form is syntactically a wh-PRON like its base.
#
# References: Phase 5i §9.2 (deferred from Phase 5i; corpus
# surfaced via Phase 5m wh+man builder work); S&O 1972 §6.
- base_pos: PRON
  affix_class: redup_wh_plural
  operations:
    - {op: redup_root}
  feats: {NUM: PL}
  notes: redup_wh_plural — ano → anoano, sino → sinosino, kanino → kaninokanino, alin → alinalin (L49)

# --- Phase 6.I Commit 2: adv_redup (§18 L105) ---------------------------
# Productive ``pa-X-X`` reduplication of ADV-FREQUENCY roots —
# ``paminsan-minsan`` "occasionally" from ``minsan`` "sometimes".
# The Phase 5f Commit 14 ``merge_hyphen_compounds`` tokenizer pre-pass
# collapses the canonical hyphenated input to the single-token surface
# this paradigm generates (``paminsanminsan``); the analyzer's
# ``_index_particle_paradigms`` (Phase 6.I C2 new infrastructure)
# computes the canonical hyphenated LEMMA ``paminsan-minsan`` from
# the pre-redup base.
#
# Operations: ``[prefix pa, redup_root]``. Order matters — the
# Phase 5n.C.3 Commit 6 ``redup_root`` op appends the root after the
# prefix is attached, so ``pa`` appears only on the first copy
# (``paminsan`` + ``minsan`` = ``paminsanminsan``). Distinct from
# ``full_redup`` (Commit 2) which would put ``pa-`` on both copies.
#
# Cell.feats: ``ADV_TYPE=FREQUENCY`` + ``FREQ_VALUE=OCCASIONAL`` —
# the productive shift from the base's ``SOMETIMES`` to the derived
# ``OCCASIONAL`` meaning. ``ADV_TYPE`` is set explicitly to override
# any non-FREQUENCY ADV-base that wires ``affix_class: [adv_redup]``
# in the future (defensive; current base ``minsan`` is FREQUENCY).
#
# Inventory of one today (``minsan``) — future ADV-FREQUENCY entries
# requiring a parallel ``pa-X-X`` form land via lex-side
# ``affix_class: [adv_redup]`` wiring without paradigm-cell changes.
# References: Schachter & Otanes 1972 §3.5 (frequency adverb
# reduplication); R&B 1986 ch.4 (productive reduplication).
- base_pos: ADV
  affix_class: adv_redup
  operations:
    - {op: prefix, value: "pa"}
    - {op: redup_root}
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: OCCASIONAL}
  notes: adv_redup — minsan → paminsanminsan / LEMMA paminsan-minsan (L105 productive frequency redup)

# --- Phase 10.A: time_redup_freq (NOUN → FREQ-ADV bare X-X) -------------
# Productive bare reduplication of TIME-N roots ("every X") into the
# distributive-frequency adverb class: ``araw`` → ``araw-araw``
# "every day", ``gabi`` → ``gabi-gabi`` "every night", ``oras`` →
# ``oras-oras`` "every hour", ``taon`` → ``taun-taon`` "every year"
# (the last with /o/→/u/ raising on the first copy via the per-root
# ``redup_o_raise`` sandhi flag).
#
# Operations: ``[redup_root]`` — single op. The first copy is just
# ``root.citation`` (possibly with raising); the second copy is
# ``root.citation`` appended. The Phase 5f Commit 14
# ``merge_hyphen_compounds`` tokenizer pre-pass collapses the
# canonical hyphenated input ``araw-araw`` to the single-token
# surface ``arawaraw`` this cell generates.
#
# POS-flip: ``base_pos: NOUN, pos: ADV``. The TIME-N root keeps its
# bare-noun analysis (handled by the regular NOUN-indexing path);
# this cell adds a parallel ADV reading routed via the particles
# index (see :meth:`_index_paradigm_via_base_pos`). FREQ_VALUE is
# DISTRIBUTIVE — the new "every X" reading distinct from the
# existing OCCASIONAL (paminsan-minsan), HABITUAL (palagi, lagi),
# HIGH (madalas, kadalasan), and SOMETIMES (minsan) values.
#
# ``lemma_redup_hyphen: true`` (Phase 10.A) opts the cell into
# canonical-hyphenated LEMMA construction, parallel to what
# ``_index_particle_paradigms`` already does for ``adv_redup``:
# ``arawaraw`` carries LEMMA ``araw-araw``, ``tauntaon`` carries
# LEMMA ``taun-taon``. Without the flag the LEMMA would default to
# ``root.citation`` (just ``araw`` / ``taon``), conflicting with
# the established FREQ-ADV convention.
#
# Per-root opt-in via ``affix_class: [time_redup_freq]`` in
# nouns.yaml (currently 4 roots: araw, gabi, oras, taon). Adding a
# new TIME-N entry to the inventory is a one-line YAML wiring; no
# paradigm-cell or analyzer changes needed.
#
# Phase 10.B retrofit: stamps ``REDUP=FULL`` + ``REDUP_SEM=FREQ`` —
# the cross-cutting full-reduplication feats introduced with the
# Phase 10.B ``place_redup_distr`` cell below, per the Phase 10
# plan-of-record's REDUP=FULL / REDUP_SEM=DISTR|ITER|ATTEN|INTENS|FREQ
# enum and per external-reviewer recommendation (Phase 10 reviewer
# memo, archived in [[project_phase10_a_progress]]). These are
# orthogonal to ADV_TYPE / FREQ_VALUE: ``ADV_TYPE=FREQUENCY +
# REDUP_SEM=FREQ`` tags the AdvP as both a syntactic frequency
# adjunct and a morphological full-redup derivation; downstream
# consumers can gate on either axis.
#
# References: Schachter & Otanes 1972 §40.7 (frequency adverb
# reduplication — explicit list "araw-araw / oras-oras / gabi-gabi");
# Ramos 1971 dict (gabi-gabi); R&B 1986 ch.4 (productive
# reduplication); R&G 1981 Intermediate (taun-taon canonical
# orthography with raising).
- base_pos: NOUN
  pos: ADV
  affix_class: time_redup_freq
  operations:
    - {op: redup_root}
  feats: {ADV_TYPE: FREQUENCY, FREQ_VALUE: DISTRIBUTIVE, REDUP: FULL, REDUP_SEM: FREQ}
  lemma_redup_hyphen: true
  notes: time_redup_freq — araw/gabi/oras/taon → araw-araw etc. (Phase 10.A distributive-frequency redup; 10.B REDUP/REDUP_SEM retrofit)

# --- Phase 10.B: place_redup_distr (NOUN → distributive-LOC ADV) --------
# Productive bare reduplication of PLACE-N roots ("X to X") into the
# distributive-locative adverb class: ``bahay`` → ``bahay-bahay``
# "house to house", ``pinto`` → ``pinto-pinto`` "door to door",
# ``bayan`` → ``bayan-bayan`` "town to town", ``bundok`` →
# ``bundok-bundok`` "mountain after mountain", ``bukid`` →
# ``bukid-bukid`` "from farm to farm / rural areas".
#
# Mirrors the Phase 10.A ``time_redup_freq`` cell structure: single
# ``redup_root`` op, NOUN→ADV POS-flip, ``lemma_redup_hyphen: true``
# for canonical hyphenated LEMMA. No PLACE-N currently needs
# ``redup_o_raise`` — the external-reviewer's 100-form taxonomy
# attests ``pinto-pinto`` / ``bundok-bundok`` (no first-copy
# raising on stems with stem-final /o/ in PLACE-N use).
#
# ADV_TYPE=LOCATION (existing value, consumed by the wh-LOC
# ``saan`` / ``nasaan`` entries). REDUP_SEM=DISTR distinguishes
# the distributive-locative "X-to-X" reading from the FREQ
# "every X" reading on the TIME-N cell. The output AdvP does NOT
# yet have a clause-final attachment rule — per discourse.py
# §5f-C5 closing comment, clause-final LOCATION/MANNER AdvPs are
# still in the Phase 9.W-class deferral block (Wackernagel-cluster
# + quantifier-float interaction); the morphological cell here
# productizes the LEX side, with grammar-side attachment held back
# pending audit pressure. Reviewer endorsement to keep productive
# redup machinery in morphology/lex layer rather than CFG syntax
# (Phase 10 reviewer memo).
#
# Per-root opt-in via ``affix_class: [place_redup_distr]`` in
# nouns.yaml (currently 5 roots: bahay, pinto, bayan, bundok,
# bukid). Adding a new PLACE-N entry is a one-line YAML wiring;
# the reviewer's caveat "many roots would sound odd without
# contextual motivation" argues for per-root opt-in rather than
# wholesale generalization to every NOUN with SEM_CLASS=LOCATION.
#
# References: Phase 10 external-reviewer 100-example reduplication
# typology (archived in [[project_phase10_a_progress]]); S&O 1972
# (no explicit list — productive PLACE-N redup is treated as a
# semantically-constrained productive pattern rather than a
# closed lexical class).
- base_pos: NOUN
  pos: ADV
  affix_class: place_redup_distr
  operations:
    - {op: redup_root}
  feats: {ADV_TYPE: LOCATION, REDUP: FULL, REDUP_SEM: DISTR}
  lemma_redup_hyphen: true
  notes: place_redup_distr — bahay/pinto/bayan/bundok/bukid → bahay-bahay etc. (Phase 10.B distributive-locative redup)

# --- Phase 10.C: num_redup_distr (NUM → distributive-count ADV) ---------
# Productive bare reduplication of cardinal-NUM roots into the
# distributive-count adverb class ("X at a time / by Xs / one by
# one"): ``isa`` → ``isa-isa`` "one by one", ``dalawa`` →
# ``dalawa-dalawa`` "two at a time", ``tatlo`` → ``tatlo-tatlo``
# "three at a time", ..., ``sampu`` → ``sampu-sampu`` "by tens".
#
# Routing: fires on the NUM Roots in ``data/tgl/numerals.yaml``
# (NOT the bare-NUM particles in particles.yaml) via
# ``_index_paradigm_via_base_pos`` — the same NOUN/ADJ/NUM-root
# indexer that already drives ``tig_distrib`` (``tigisa``) and
# ``approx_redup`` (``dadalawa``). POS-flip NUM→ADV routes the
# derived surface into the particles index. ``lemma_redup_hyphen:
# true`` gives the canonical hyphenated LEMMA (``isa-isa``); the
# NUM-root path needs the explicit opt-in (the particle path's
# ``_index_particle_paradigms`` hyphenates unconditionally, but
# cardinals here are roots, not particles).
#
# No ``redup_o_raise`` — the external-reviewer typology attests
# ``tatlo-tatlo`` (not ``tatlu-tatlo``); /o/-final cardinals
# (tatlo / pito / walo) take no first-copy raising in this use.
#
# Feats: ``ADV_TYPE=MANNER`` (the distributive-count phrase is a
# manner-of-action adverbial, parallel to ``dahan-dahan``
# "slowly"); ``DISTRIB=true`` (the distributive reading, same
# binary feat ``tig_distrib`` sets); ``REDUP=FULL`` +
# ``REDUP_SEM=DISTR`` (the Phase 10.B cross-cutting morphology
# feats). ``CARDINAL=false`` overrides the inherited
# ``CARDINAL=true`` from the NUM root — the derived form is
# categorially an adverb, not a cardinal numeral, so it must NOT
# feed the cardinal-NP-modifier rule (which gates on
# ``NUM[CARDINAL]``; the ADV POS-flip already blocks it, but the
# explicit override keeps the feature semantics honest).
# ``CARDINAL_VALUE`` is retained from the root (useful: the
# "by Xs" reading where X is the value).
#
# Like the 10.B ``place_redup_distr`` sibling, this is
# morphology-only: no clause-final ``S → S AdvP[MANNER]`` /
# ``nang`` + distributive-ADV attachment rule. MANNER AdvPs are
# in the same discourse.py §5f-C5 deferral block as LOCATION;
# grammar-side attachment is a follow-on gated on audit pressure.
#
# Per-NUM opt-in via ``affix_class: [..., num_redup_distr]`` on
# all ten cardinal roots in numerals.yaml (distributive-count is
# productive across the full 1-10 series per S&O 1972 §4 + the
# external-reviewer typology).
#
# References: Schachter & Otanes 1972 §4 (cardinal numerals;
# attests ``isa-isa`` "by ones", ``apat-apat`` "by fours",
# ``lima-lima`` "by fives, in groups of five",
# ``nang isa-isa`` "one by one"); Phase 10 external-reviewer
# 100-form typology (isa-isa / dalawa-dalawa / tatlo-tatlo /
# apat-apat / lima-lima).
- base_pos: NUM
  pos: ADV
  affix_class: num_redup_distr
  operations:
    - {op: redup_root}
  feats: {ADV_TYPE: MANNER, DISTRIB: true, CARDINAL: false, REDUP: FULL, REDUP_SEM: DISTR}
  lemma_redup_hyphen: true
  notes: num_redup_distr — isa/dalawa/.../sampu → isa-isa etc. (Phase 10.C distributive-count redup)

# === Phase 9.X.post-1: pa- / i- ADJ-derived directional + spatial ========
#
# Two ADJ→POS-flip paradigm cells closing 4 stopwords-iso/stopwords-tl
# probe gaps in one stroke. Both fire on opted-in ADJ roots
# (currently `baba` and `taas`; opt-in via `affix_class: pa_direct`
# and `affix_class: i_loc` in adjectives.yaml) and produce different
# output POS:
#
# * pa_direct (ADJ → ADV): prefix `pa` on the bare ADJ root yields a
#   directional adverb. `pa + baba → pababa` "downward";
#   `pa + taas → pataas` "upward". Output is ADV with
#   ADV_TYPE=DIRECTION. The pa-prefix here is the same morpheme as
#   the directional locative case-marker; the productive cell
#   captures the per-ADJ-root opt-in pattern.
# * i_loc (ADJ → NOUN): prefix `i` on the bare ADJ root yields a
#   spatial noun. `i + baba → ibaba` "below, bottom";
#   `i + taas → itaas` "above, top". Output is NOUN with
#   SEM_CLASS=LOCATION. These are the canonical "the X part" /
#   "the X side" derivations used in `sa ibaba ng X` /
#   `sa itaas ng X` PP frames.
#
# Both cells use `base_pos: ADJ` (loader's _require validator skips
# voice/aspect on non-VERB cells) and set `pos` explicitly to flip
# output POS for analyzer indexing. Opt-in is per-root (audit-
# attestation-gated), matching the pre-4.7 pag_gerund pattern, so
# every ADJ root doesn't spuriously gain directional / spatial
# analyses.
#
# References: Schachter & Otanes 1972 §6 (directional pa-);
# R&B 1986 ch.7 (spatial i-/sa-prefix nouns).

- base_pos: ADJ
  pos: ADV
  affix_class: pa_direct
  operations:
    - {op: prefix, value: "pa"}
  feats: {ADV_TYPE: DIRECTION}
  notes: pa_direct — baba → pababa, taas → pataas (Phase 9.X.post-1 directional ADV)

- base_pos: ADJ
  pos: NOUN
  affix_class: i_loc
  operations:
    - {op: prefix, value: "i"}
  feats: {SEM_CLASS: LOCATION}
  notes: i_loc — baba → ibaba, taas → itaas (Phase 9.X.post-1 spatial NOUN)
