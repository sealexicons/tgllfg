# --- magpa-...-an reciprocal-distributive causative (Phase 7a.B) -------
#
# Closes §18.1.1 item 2 (magpa-...-an half). The circumfix combines
# `mag-` AV + `pa-` causative + `-an` reciprocal/distributive, yielding
# canonical reciprocal-distributive readings: `nagpatawagan sila`
# "they called one another", `nagpakainan ang mga bata` "the children
# fed each other", `magpahiraman tayo ng aklat` "let's lend each other
# books".
#
# Empirical scope (verified via GT 2026-05-14, see analysis-choices.md
# Phase 7a.B Commit 1 §2): the reciprocal-distributive reading is
# productive (`nagpatawagan` → "called each other"); the locative-
# distributive subtype claimed by the user-source consultation is NOT
# productive in modern Tagalog (4 negative GT tests; readings collapse
# to plain locative-focus). Phase 7a.B implements reciprocal-
# distributive only; locative-distributive deferred indefinitely.
#
# Cell shape mirrors `mag_an` reciprocal-AV (Phase 5e Commit 12;
# MOOD=SOC + RECP=true) with the causative `pa-` layer added between
# the `nag`/`mag` realis/irrealis prefix and the root. The cv_redup
# duplicates the `pa` outer-prefix in IPFV/CTPL — same pattern as the
# existing `magpa` IPFV/CTPL cells (producing `nagpapakain` /
# `magpapakain`).
#
# Cells emit {MOOD: SOC, RECP: true, DISTRIB: true}.
#
# CAUS=INDIRECT was considered but DROPPED — the existing AV-SOC
# clause frame (used by mag_an reciprocal) constrains CAUS=NONE on
# the verb (CAUS=INDIRECT verbs go through the biclausal magpa
# XCOMP frame instead). The morphological `pa-` is preserved in the
# surface form but the f-structure treats magpa_an semantically like
# mag_an plus DISTRIB=true. GT-confirmed productive readings
# ("called each other", "fed each other") suggest the causative
# layer is morphologically present but semantically bleached in
# modern usage anyway.
#
# Reference-grammar caveat: S&O 1972 and R&B 1986 do not document
# this circumfix as a productive AV paradigm; S&O's closest forms
# (e.g., `magpagandahan`, `magpatayan`) are analyzed as `mag-` +
# derived-nominal-in-`-an`. Phase 7a.B grounds the implementation in
# user-source consultation + GT-productivity test, not direct
# reference-grammar attestation.
- voice: AV
  aspect: PFV
  mood: SOC
