# === IV — Instrumental / Benefactive Voice ===============================

# Bare IV `i-` carries APPL=CONVEY — the conveyed-pivot reading
# (Phase 4 §7.7). Other applicative variants (BEN via ipag-,
# INSTR via ipang-, REASON via ika-) live under their own affix
# classes below.
- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinain, ibinili

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: infix, value: in}
    - {op: prefix, value: "i"}
  notes: ikinakain, ibinibili

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "i"}
  notes: ikakain, ibibili

# Phase 9.X.pre-4.1: bare IV cell — i- prefix on bare root (no
# CV-redup, no realis infix). IV counterpart to the OV-in_oblig
# and DV-an_oblig SOC bare-hortative cells. Surfaces: itapon
# (i + tapon), ituro (i + turo), ibigay (i + bigay). Same
# distribution as the OV/DV bare cells (imperative, modal-XCOMP,
# dependent / non-finite IV positions).
- voice: IV
  aspect: CTPL
  mood: SOC
  transitivity: TR
  affix_class: i_oblig
  feats: {APPL: CONVEY, MOOD: SOC}
  operations:
    - {op: prefix, value: "i"}
  notes: itapon, ituro, ibigay (bare IV i- for hortative/imperative/modal-XCOMP)

# Phase 9.X.c6: ``i_oblig_ini`` variant for IV PFV/IPFV cells.
# Some roots produce the "ini-" prefix variant (in- before the
# i- prefix) rather than the standard "iCin-" infix shape that
# i_oblig produces. Both forms are attested in standard Tagalog:
#
#   handa → ihinahanda (i_oblig)  vs  inihahanda (i_oblig_ini)
#   hudyat → ihinuhudyat (i_oblig) vs  inihuhudyat (i_oblig_ini)
#
# The ini- variant attaches -in- as a prefix on the already-
# i-prefixed stem (treating "i-" as a vowel-initial host).
# Productive opt-in via ``affix_class: [i_oblig_ini]`` — kept
# separate from i_oblig because the same root family doesn't
# generally take both surface variants in actual usage; the
# distinction is per-root lex choice.

- voice: IV
  aspect: PFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig_ini
  feats: {APPL: CONVEY}
  operations:
    - {op: prefix, value: "i"}
    - {op: infix, value: in}
  notes: inihanda, inihudyat (PFV ini- variant)

- voice: IV
  aspect: IPFV
  mood: IND
  transitivity: TR
  affix_class: i_oblig_ini
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "i"}
    - {op: infix, value: in}
  notes: inihahanda, inihuhudyat (IPFV ini- variant)

- voice: IV
  aspect: CTPL
  mood: IND
  transitivity: TR
  affix_class: i_oblig_ini
  feats: {APPL: CONVEY}
  operations:
    - {op: cv_redup}
    - {op: prefix, value: "i"}
  notes: ihahanda, ihuhudyat (CTPL — same as i_oblig CTPL, kept for completeness)

- voice: IV
  aspect: CTPL
  mood: SOC
  transitivity: TR
  affix_class: i_oblig_ini
  feats: {APPL: CONVEY, MOOD: SOC}
  operations:
    - {op: prefix, value: "i"}
  notes: ihanda, ihudyat (bare IV — same as i_oblig SOC)

