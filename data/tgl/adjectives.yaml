# ang aklat.`` "I want / like the book.", ``Ayaw ko ang aklat.``
# "I don't want the book."). These surfaces are ALSO registered
# as VERB[CTRL_CLASS=PSYCH/MODAL] in particles.yaml for the
# linker-introduced XCOMP construction (``Gusto kong magluto`` /
# ``batang gustong kumain``); the two analyses coexist. The
# STATIVE_PRED ADJ-modifier-rule exclusion in cfg/nominal.py
