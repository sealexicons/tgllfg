# data/tgl/adjectives.yaml
#
# Adjective roots — Phase 5g §12.1 inventory. Each entry's citation
# is the bare root; the productive ``ma-`` paradigm in
# ``adj_paradigms.yaml`` derives the surface adjective form
# (``ganda`` → ``maganda``, ``talino`` → ``matalino``).
#
# Analytical commitment (roadmap §12.1): ``ma-`` adjectives are
# ``POS=ADJ`` with ``[PREDICATIVE+]``, NOT stative VERBs. The
# verbal-paradigm absence facts (``*pumagmaganda``,
# ``*magagaganda``, ``*magpamaganda``) ground the commitment.
#
# Naming-collision warning: the grammar code uses ``ADJ`` as the
# LFG f-attribute name for the adjunct set (``↓ ∈ (↑ ADJ)``). The
# Phase 5g ``ADJ`` is a category / POS string. The two namespaces
# don't intersect at the unifier level — category strings scan
# against ``MorphAnalysis.pos``, attribute names live in equation
# strings — but every code reader confuses them once.
#
# Phase 5g Commit 4 expands the seed inventory from 6 (Commit 1)
# to 30, covering size / quality / sensory / evaluative dimensions.
# Several roots also exist in ``verbs.yaml`` as INTR "be X" stative
# verbs (``ganda``, ``bilis``, ``ingay``, ``init``, ``lakas``,
# ``saya``, ``lungkot``, ``yaman``) or as TR/INTR verbs with a
# distinct sense (``baba`` "go down", ``linis`` "clean (TR)"). The
# additive policy leaves verbs.yaml untouched — the verbal entries
# produce inchoative / stative-verb surfaces (``gumanda``,
# ``naganda``, ``bumaba``, etc.) that don't collide with the
# adjectival ``ma + root`` surface produced here.
#
# Citations: R&B 1986, S&O 1972 §5, Ramos dictionary entries for
# adjective roots.

# === Size dimension =====================================================

- citation: laki
  pos: ADJ
  gloss: big, large
  affix_class: [ma_adj]

- citation: liit
  pos: ADJ
  gloss: small
  affix_class: [ma_adj]
  # R&G 1981 §12.9 integration benchmark — produces ``maliit``
  # for ``Maliit ang bahay.`` "The house is small".

- citation: taas
  pos: ADJ
  gloss: high, tall
  affix_class: [ma_adj]
  # R&G 1981 §12.9 integration benchmark — produces ``mataas``
  # for ``Mataas ang bundok.`` "The mountain is high". Note:
  # ``taas`` also exists in verbs.yaml as TR "raise, lift up"
  # (different sense); both citations coexist as separate roots
  # in the analyzer's index.

- citation: baba
  pos: ADJ
  gloss: low
  affix_class: [ma_adj]
  # ``mababa``. Also a verb root in verbs.yaml meaning "go down,
  # descend" (``bumaba`` etc.) — distinct sense.

- citation: haba
  pos: ADJ
  gloss: long
  affix_class: [ma_adj]

- citation: ikli
  pos: ADJ
  gloss: short (in length)
  affix_class: [ma_adj]
  # ``maikli``. Distinct from ``mababa`` "low" and from the
  # stature-short ``mapandak``.

- citation: lapad
  pos: ADJ
  gloss: wide, broad
  affix_class: [ma_adj]

- citation: kapal
  pos: ADJ
  gloss: thick
  affix_class: [ma_adj]

- citation: nipis
  pos: ADJ
  gloss: thin
  affix_class: [ma_adj]


# === Quality dimension ==================================================

- citation: ganda
  pos: ADJ
  gloss: beautiful
  affix_class: [ma_adj]
  # Note: ``ganda`` is also a verb root in verbs.yaml (gloss
  # "be beautiful" with affix_class [um, mag, ma, maka], producing
  # ``gumanda`` "become beautiful" and other inchoative / spurious
  # surfaces). The verbal entry is left untouched in Phase 5g —
  # see plan §4 for the additive policy.

- citation: talino
  pos: ADJ
  gloss: intelligent
  affix_class: [ma_adj]

- citation: tanda
  pos: ADJ
  gloss: old
  affix_class: [ma_adj]
  # R&G 1981 §12.9 integration benchmark — produces ``matanda``
  # for ``Matanda siya.`` "She is old".

- citation: bilis
  pos: ADJ
  gloss: quick, fast
  affix_class: [ma_adj]
  # ``mabilis`` "quick / fast"; combined with the linker also
  # serves as the manner-adverb form (``mabilis na tumakbo``
  # "ran quickly" — Phase 5g Commit 5).

- citation: bait
  pos: ADJ
  gloss: kind, well-behaved
  affix_class: [ma_adj]

- citation: sipag
  pos: ADJ
  gloss: diligent, industrious
  affix_class: [ma_adj]

- citation: tamad
  pos: ADJ
  gloss: lazy
  affix_class: [ma_adj]

- citation: tapang
  pos: ADJ
  gloss: brave
  affix_class: [ma_adj]

- citation: lakas
  pos: ADJ
  gloss: strong
  affix_class: [ma_adj]
  # Also in verbs.yaml as INTR "be strong"; additive twin.

- citation: hina
  pos: ADJ
  gloss: weak
  affix_class: [ma_adj]

- citation: linis
  pos: ADJ
  gloss: clean
  affix_class: [ma_adj]
  # ``linis`` is also in verbs.yaml as TR "clean" (the verbal
  # action of cleaning) — distinct from the adjectival "clean
  # (state)".


