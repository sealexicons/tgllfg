# c39, ``pinid`` c31, ``pilipino`` / ``iba`` c28). Composes via
# the existing ADJ + linker + N pre-N modifier rule
# (cfg/nominal.py:1901). VERB vs ADJ disambiguates by slot.
- citation: natitira
  pos: ADJ
