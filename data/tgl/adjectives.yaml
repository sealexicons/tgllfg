# data/tgl/adjectives.yaml
#
# Adjective roots. Each entry's citation is the bare root; the
# productive ``ma-`` paradigm in ``adj_paradigms.yaml`` derives
# the surface adjective form (``ganda`` → ``maganda``, ``talino``
# → ``matalino``). The inventory covers size, quality, sensory,
# and evaluative dimensions.
#
# Analytical commitment: ``ma-`` adjectives are ``POS=ADJ`` with
# ``[PREDICATIVE+]``, NOT stative VERBs. The verbal-paradigm
# absence facts (``*pumagmaganda``, ``*magagaganda``,
# ``*magpamaganda``) ground the commitment.
#
# Naming-collision warning: the grammar code uses ``ADJ`` as the
# LFG f-attribute name for the adjunct set (``↓ ∈ (↑ ADJ)``). The
# ``ADJ`` used here is a category / POS string. The two
# namespaces don't intersect at the unifier level — category
# strings scan against ``MorphAnalysis.pos``, attribute names
# live in equation strings — but every code reader confuses them
# once.
#
# Several roots also exist in ``verbs.yaml`` as INTR "be X"
# stative verbs (``ganda``, ``bilis``, ``ingay``, ``init``,
# ``lakas``, ``saya``, ``lungkot``, ``yaman``) or as TR/INTR
# verbs with a distinct sense (``baba`` "go down", ``linis``
# "clean (TR)"). The additive policy leaves verbs.yaml untouched
# — the verbal entries produce inchoative / stative-verb surfaces
# (``gumanda``, ``naganda``, ``bumaba``, etc.) that don't collide
# with the adjectival ``ma + root`` surface produced here.
#
# Citations: R&B 1986, S&O 1972 §5, Ramos dictionary entries for
# adjective roots.

- citation: aga
  pos: ADJ
  gloss: early
  affix_class: [ma_adj]

# Phase 9.X.c29: ``akay`` is polysemous. nouns.yaml carries the
# NOUN entries ("offspring of fowl; one led by the hand") and
# verbs.yaml carries the VERB entry (TR "lead by the hand").
# This bare ADJ entry covers the resultative-stative sense
# ("being led / led by the hand"; PANAHON sent-31 ``akay na
# ang kanilang mga kalabaw`` = "their carabaos are being led").
# Parallel to other bare-root stative-passive ADJs like
# ``tulog`` / ``sira``. Disambiguates by slot: ``ang akay`` (NOUN)
# vs. ``akay ang X`` (ADJ-pred).
- citation: akay
  pos: ADJ
  gloss: led, being led (resultative-stative)
  affix_class: []
  source: audit-corpus

# Phase 9.O.3 follow-on: ``ayaw`` / ``gusto`` / ``kailangan`` as
