# Phase 9.O.3: ``mahal`` has polysemous senses. The
# "expensive" reading is a pure predicative ADJ (``Mahal ang
# aklat.``) consumed by the 1-arg ADJ[PREDICATIVE] NP[CASE=NOM]
# rule. The "dear/beloved" reading is a stative-passive
# predicate licensing a GEN actor (``Mahal ko si Maria.`` "I
# love Maria"), consumed by the new STATIVE_PRED + GEN + NOM
# rule. Both rules fire on the same surface; the parser picks
# whichever leads to a complete parse based on the NP frame.
- citation: mahal
  pos: ADJ
  gloss: expensive; dear, beloved
  affix_class: []
  feats: {STATIVE_PRED: true}

