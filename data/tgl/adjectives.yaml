# Phase 9.O follow-on: bare-form ADJ for the predicative use of
# ``kilala`` ("known, acquainted") as in ``Kilala si Maria.``
# ("Maria is known.") and ``Kilala ko si Maria.`` ("I know
# Maria."). The V root in ``verbs.yaml`` generates inflected
# OV/AV/maki- forms (``kinilala``, ``magkikilala``, ``nakakilala``)
# but no bare predicative surface. Coexists with the V root —
# inflected forms continue to route through the V entry.
#
# ``STATIVE_PRED: true`` flags this ADJ as a stative-passive
# predicate that licenses a GEN-actor argument (the
# "by-X-is-known" reading). Phase 9.O.3 grammar rule
# ``S → ADJ[STATIVE_PRED] NP[CASE=GEN] NP[CASE=NOM]`` consumes
# this flag to allow ``Kilala ko si Maria.`` and friends.
- citation: kilala
  pos: ADJ
  gloss: known, acquainted
  affix_class: []
  feats: {STATIVE_PRED: true}

