# Plain-transitive AV / OV lex entries — Phase 5n.C.4 Commit 14.
#
# Each record migrates one ``LexicalEntry`` authored via ``_entry()``
# in the ``BASE`` dict at ``src/tgllfg/core/lexicon.py``. The
# defining property of this file: VOICE ∈ {AV, OV}, TR=TR,
# CAUS=NONE, APPL=NONE, no CTRL_CLASS. Applicative DV / IV / BV / LV
# entries live in ``applicative.yaml``; causative entries in
# ``causative.yaml``; control verbs in ``control.yaml``.
#
# Each lemma's AV entry precedes its OV entry to preserve the
# BASE-side first-match-wins order (the analyzer picks the first
# entry whose ``morph_constraints`` match the MorphAnalysis).

# kain — eat. AV transitive ("Kumain siya ng mansanas") + OV
# patient pivot ("Kinain niya ang mansanas").
- lemma: kain
  voice: AV
  pred: "EAT <SUBJ, OBJ>"
  a_structure: [AGENT, PATIENT]
  gf_defaults:
    AGENT: SUBJ
    PATIENT: OBJ
  intrinsic: AV_TR_AGENT_PATIENT

- lemma: kain
  voice: OV
  pred: "EAT <SUBJ, OBJ-AGENT>"
  a_structure: [AGENT, PATIENT]
  gf_defaults:
    PATIENT: SUBJ
    AGENT: OBJ-AGENT
  intrinsic: OV_TR_AGENT_PATIENT

