# bigay — give. AV ditransitive with 4 roles (AGENT pivot, THEME
# typed OBJ, RECIPIENT + LOCATION as obliques). The matching DV
# entries (Phase 5n.C.2 closure for §18 L29 / L77) live in
# applicative.yaml since their VOICE is DV.
- lemma: bigay
  voice: AV
  pred: "GIVE <SUBJ, OBJ, OBL-RECIP, OBL-LOC>"
  a_structure: [AGENT, THEME, RECIPIENT, LOCATION]
  gf_defaults:
    AGENT: SUBJ
    THEME: OBJ
    RECIPIENT: OBL-RECIP
    LOCATION: OBL-LOC
  intrinsic: AV_DITRANS_AGENT_THEME_RECIP_LOC

