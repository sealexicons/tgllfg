# Causative lex entries — Phase 5n.C.4 Commit 16.
#
# Two causative shapes:
#   * Direct (pa- / pa-…-an / pa-…-i): CAUSER pivot via OV or DV
#     voice; CAUSEE or LOCATION takes SUBJ. Two arities each
#     (2-arg = CAUSER + CAUSEE/LOC; 3-arg = adds PATIENT).
#   * Indirect (magpa-): biclausal control verb (XCOMP); CAUSER
#     is matrix SUBJ, the caused event is XCOMP.
#
# All entries use the explicit ``morph_constraints`` override
# form: BASE constructed them as bare ``LexicalEntry(...)`` with
# only ``{VOICE, CAUS}`` (or ``{VOICE, CAUS, CTRL_CLASS}``) — no
# CAUS=NONE default, no TR=TR, no APPL=NONE. Preserving the
# loose-match shape.

# kain — eat / feed / cause-to-eat.
- lemma: kain
  voice: OV
  pred: "CAUSE-EAT <SUBJ, OBJ-CAUSER>"
  a_structure: [CAUSER, CAUSEE]
  gf_defaults:
    CAUSEE: SUBJ
    CAUSER: OBJ-CAUSER
  morph_constraints:
    CAUS: DIRECT
  intrinsic: OV_CAUS_DIRECT

- lemma: kain
  voice: OV
  pred: "CAUSE-EAT <SUBJ, OBJ-CAUSER, OBJ-PATIENT>"
  a_structure: [CAUSER, PATIENT, CAUSEE]
  gf_defaults:
    CAUSEE: SUBJ
    CAUSER: OBJ-CAUSER
    PATIENT: OBJ-PATIENT
  morph_constraints:
    CAUS: DIRECT
  intrinsic: OV_CAUS_DIRECT_THREE_ARG

- lemma: kain
  voice: DV
  pred: "CAUSE-EAT-AT <SUBJ, OBJ-CAUSER>"
  a_structure: [CAUSER, LOCATION]
  gf_defaults:
    LOCATION: SUBJ
    CAUSER: OBJ-CAUSER
  morph_constraints:
    CAUS: DIRECT
  intrinsic: DV_CAUS_DIRECT

- lemma: kain
  voice: DV
  pred: "CAUSE-EAT-AT <SUBJ, OBJ-CAUSER, OBJ-PATIENT>"
  a_structure: [CAUSER, PATIENT, LOCATION]
  gf_defaults:
    LOCATION: SUBJ
    CAUSER: OBJ-CAUSER
    PATIENT: OBJ-PATIENT
  morph_constraints:
    CAUS: DIRECT
  intrinsic: DV_CAUS_DIRECT_THREE_ARG

- lemma: kain
  voice: AV
  pred: "CAUSE-EAT <SUBJ, XCOMP>"
  a_structure: [CAUSER, EVENT]
  gf_defaults:
    CAUSER: SUBJ
    EVENT: XCOMP
  morph_constraints:
    CAUS: INDIRECT
    CTRL_CLASS: INTRANS
  intrinsic: AV_CAUS_INDIRECT

# Phase 8.H: flat 3-arg AV-CAUS-INDIRECT companion to the
# biclausal-control entry above. S&O 1972 §10.4 documents both
# shapes: (a) biclausal ``Nagpakain ako kumain ng kanin sa
# kanila.`` with overt embedded V; (b) flat ``Nagpapakain sila
# ng kendi sa kanila.`` (S&O page 410 sent-593) where the
# embedded event's arguments surface directly as NP daughters
# of the matrix. Three arg slots: CAUSER (matrix SUBJ),
# PATIENT (what's caused-to-be-V'd; OBJ), CAUSEE (the one made
# to V; OBL-CAUSEE). Distinguished from the biclausal entry by
# the absence of XCOMP in the a-structure.
- lemma: kain
  voice: AV
  pred: "CAUSE-EAT <SUBJ, OBJ, OBL-CAUSEE>"
  a_structure: [CAUSER, PATIENT, CAUSEE]
  gf_defaults:
    CAUSER: SUBJ
    PATIENT: OBJ
    CAUSEE: OBL-CAUSEE
  morph_constraints:
    CAUS: INDIRECT
  intrinsic: AV_CAUS_INDIRECT_FLAT

