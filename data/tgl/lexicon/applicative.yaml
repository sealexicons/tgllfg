# Applicative DV / IV / BV / LV lex entries — Phase 5n.C.4 Commit 15.
#
# Each record migrates one ``LexicalEntry`` from ``BASE`` whose
# VOICE is DV / IV / BV / LV and that is NOT a causative
# (CAUS=NONE) and NOT a control verb (no CTRL_CLASS).
#
# Two morph_constraints shapes coexist:
#   * Full ``_entry()`` shape: ``{VOICE, CAUS=NONE, TR=TR, APPL}``.
#     Loader auto-fills these from voice + transitive flag +
#     extra_constraints. Used for DV/IV plain (CONVEY/RECIPIENT).
#   * Minimal direct shape: ``{VOICE, APPL}`` only. Used for
#     BEN / INSTR / REASON applicatives that intentionally omit
#     CAUS / TR for a looser analyzer match. Loader emits these
#     via the explicit ``morph_constraints`` field (see
#     docs/lex-yaml-schema.md note C).

# kain — eat. IV REASON applicative (eat-FOR-REASON-X).
- lemma: kain
  voice: IV
  pred: "EAT-FOR-REASON <SUBJ, OBJ-AGENT>"
  a_structure: [AGENT, REASON]
  gf_defaults:
    REASON: SUBJ
    AGENT: OBJ-AGENT
  morph_constraints:
    APPL: REASON
  intrinsic: IV_REASON_AGENT_REASON

- lemma: kain
  voice: IV
  pred: "EAT-FOR-REASON <SUBJ, OBJ-AGENT, OBJ-PATIENT>"
  a_structure: [AGENT, PATIENT, REASON]
  gf_defaults:
    REASON: SUBJ
    AGENT: OBJ-AGENT
    PATIENT: OBJ-PATIENT
  morph_constraints:
    APPL: REASON
  intrinsic: IV_REASON_AGENT_PATIENT_REASON

