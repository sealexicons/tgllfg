# Control verb lex entries — Phase 5n.C.4 Commit 16.
#
# Five sub-classes by ``CTRL_CLASS``:
#   * PSYCH    — gusto / ayaw / kaya. GEN experiencer is matrix
#                SUBJ; pseudo-verbs (no morphological voice).
#   * KNOW     — alam / akala / isip / naririnig / naaalala.
#                COMP complement (vs XCOMP); same SUBJ binding.
#   * MODAL    — dapat / puwede / maaari / kailangan. AGENT-pivot
#                modal pseudo-verbs.
#   * INTRANS  — payag (AV-inflected). AGENT pivot, XCOMP.
#   * TRANS    — pilit (OV) / utos (DV). 3-arg control with
#                a syntactic argument controlling the XCOMP SUBJ.
#   * RAISING  — mukha / baka / parang / tila. Bare COMPLEMENT
#                (no thematic role) with structure-sharing onto
#                XCOMP.SUBJ via the grammar's raising binding.
#
# Pseudo-verbs (PSYCH / KNOW / MODAL / RAISING) carry no ``voice``
# field — their morph_constraints have only CTRL_CLASS. Inflected
# control verbs (payag / pilit / utos) include voice.

# === PSYCH (XCOMP) ===
- lemma: gusto
  pred: "WANT <SUBJ, XCOMP>"
  a_structure: [EXPERIENCER, COMPLEMENT]
  gf_defaults:
    EXPERIENCER: SUBJ
    COMPLEMENT: XCOMP
  morph_constraints:
    CTRL_CLASS: PSYCH
  intrinsic: PSYCH_CONTROL

- lemma: ayaw
  pred: "DISLIKE <SUBJ, XCOMP>"
