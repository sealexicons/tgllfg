# Dev stack (Phase 13.H) for Docker Desktop. Profiles:
#   (default)        lean + anonymous: postgres + migrate + seed + tlbe + tlfe
#   auth             + keycloak (postgres-backed, realm imported on start)
#   observability    + alloy / LGTM (Phase 13.I)
# Env vars have safe in-cluster defaults (see .env.template); copy to .env to
# override. Enable Keycloak with:
#   AUTH_MODE=keycloak docker compose --profile auth up --build
name: tgllfg

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgllfg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgllfg}
      POSTGRES_DB: ${POSTGRES_DB:-tgllfg}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the (auth-profile) keycloak DB on first init; harmless otherwise.
      - ./deploy/postgres/init-keycloak-db.sql:/docker-entrypoint-initdb.d/10-keycloak-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgllfg} -d ${POSTGRES_DB:-tgllfg}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  migrate:
    image: tlbe:dev
    command: ["lex", "migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tgllfg:tgllfg@postgres:5432/tgllfg}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    image: tlbe:dev
    command: ["lex", "seed"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tgllfg:tgllfg@postgres:5432/tgllfg}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  tlbe:
    image: tlbe:dev
    build:
      context: ./tlbe
      dockerfile: ../Dockerfile.tlbe
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://tgllfg:tgllfg@postgres:5432/tgllfg}
      # Default anonymous; set AUTH_MODE=keycloak (+ --profile auth) to enforce.
      AUTH_MODE: ${AUTH_MODE:-anonymous}
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-tgllfg}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-tgllfg-api}
      # Empty => tracing is a no-op (13.E). 13.I sets http://alloy:4317.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-tgllfg}
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    # Liveness comes from the image's HEALTHCHECK (Dockerfile.tlbe).
    ports:
      - "${TLBE_PORT:-8000}:8000"

  tlfe:
    image: tlfe:dev
    build:
      context: ./tlfe
      dockerfile: ../Dockerfile.tlfe
    depends_on:
      tlbe:
        condition: service_healthy
    healthcheck:
      # busybox wget resolves `localhost` to ::1 first, but nginx binds IPv4
      # only (listen 8080), so an IPv6 probe is refused and flaps the container
      # unhealthy — probe 127.0.0.1 directly (matches Docker's IPv4 port map).
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "${TLFE_PORT:-8080}:8080"

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:26.4
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-tgllfg}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-tgllfg}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ./deploy/keycloak/tgllfg-realm.json:/opt/keycloak/data/import/tgllfg-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The keycloak image ships no curl/wget; use bash's /dev/tcp against the
      # management port (9000) health endpoint.
      test:
        - "CMD-SHELL"
        - "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"

  # --- observability profile (Phase 13.I): alloy -> tempo / prometheus /
  # loki + grafana. tlbe exports here when OTEL_EXPORTER_OTLP_ENDPOINT is
  # http://alloy:4317 (see .env.template). The default `up` skips all of these.
  alloy:
    profiles: ["observability"]
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/tmp/alloy
      - /etc/alloy/config.alloy
    volumes:
      - ./deploy/observability/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      # OTLP/gRPC published only for host senders; in-cluster tlbe uses alloy:4317.
      - "${ALLOY_OTLP_PORT:-4317}:4317"
      - "${ALLOY_HTTP_PORT:-12345}:12345" # Alloy UI + /metrics
    depends_on: [tempo, prometheus, loki]

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "${TEMPO_PORT:-3200}:3200"

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  loki:
    profiles: ["observability"]
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./deploy/observability/loki.yaml:/etc/loki/loki.yaml:ro
    ports:
      - "${LOKI_PORT:-3100}:3100"

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on: [tempo, prometheus, loki]

volumes:
  pgdata:
