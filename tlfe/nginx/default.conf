# nginx vhost for the tlfe SPA (Phase 13.G). nginx-unprivileged listens on
# 8080 as the non-root `nginx` user.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — lets the /api proxy resolve `tlbe` lazily (at
    # request time, via the $upstream variable) so this container still
    # starts standalone when no backend is present.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # SPA: serve the file if it exists, else fall back to index.html so the
    # client-side router owns the route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API to the backend (compose service `tlbe`), so the
    # whole app sits behind the single tlfe origin (req #8 / Phase 14).
    location /api/ {
        set $upstream http://tlbe:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
