# nginx vhost for the tlfe SPA (Phase 13.G; 14.C asset caching + gzip).
# nginx-unprivileged listens on 8080 as the non-root `nginx` user.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip the text bundles on the fly (the JS/CSS dominate; PNGs/woff are
    # already compressed). The bundle is small, so static pre-compression
    # isn't worth a build step. gzip_vary so shared caches key on encoding.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Docker's embedded DNS — lets the /api proxy resolve `tlbe` lazily (at
    # request time, via the $upstream variable) so this container still
    # starts standalone when no backend is present.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Vite emits content-hashed asset filenames (index-<hash>.js), so the hash
    # is the cache key — cache them forever; a new deploy ships new filenames.
    # A missing hashed asset is a hard 404 (never fall back to index.html, which
    # would hand JS/CSS an HTML body).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: serve the file if it exists, else fall back to index.html so the
    # client-side router owns the route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html points at the current hashed assets, so it must never be cached
    # — every load revalidates and a deploy's new hashes are picked up at once.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Reverse-proxy the API to the backend (compose service `tlbe`), so the
    # whole app sits behind the single tlfe origin (req #8 / Phase 14).
    location /api/ {
        set $upstream http://tlbe:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
