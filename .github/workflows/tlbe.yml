# Backend (tlbe) CI. Triggers on every push touching tlbe/ (all branches,
# incl main). The `static` job (ruff/mypy/pyright/yamllint) runs always —
# cheap early feedback. The `test` job (test-both) runs only on `main`
# (i.e. a merge), since test-both is the pre-commit gate run locally during
# branch work; re-running it on every feature push is redundant for a
# solo repo. Concurrency cancels superseded runs on the same ref.
name: tlbe

on:
  push:
    paths:
      - "tlbe/**"
      - ".github/workflows/tlbe.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: tlbe

jobs:
  static:
    name: static (ruff + mypy + pyright + yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # no moving v8 major tag; node24 full pin
        with:
          enable-cache: true
          cache-dependency-glob: "tlbe/uv.lock"
      - name: Sync (locked)
        run: uv sync --locked
      - name: Check (ruff + mypy + pyright + yamllint)
        run: uv run poe check
      - name: Verify openapi.json in sync
        run: uv run tgllfg openapi --check

  test:
    name: test (pytest test-both)
    # test-both runs only on merge to main; locally it's the pre-commit gate.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # no moving v8 major tag; node24 full pin
        with:
          enable-cache: true
          cache-dependency-glob: "tlbe/uv.lock"
      - name: Sync (locked)
        run: uv sync --locked
      - name: Test (test-both)
        run: uv run poe test-both
