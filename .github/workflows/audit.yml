# CI+ audit regression gate. Runs only on merge to main (push to main
# touching tlbe/) plus manual dispatch — the audit diff is run locally
# during development, so this is the canonical post-merge check on a fresh
# clone. One-wave-per-job matrix; parallelism comes from the matrix since
# multiprocessing.Pool collapses to one worker on 2-core GH runners, so
# each shard runs --workers 1. cancel-in-progress:false so a merge's audit
# always completes (merges are deliberate, rarely concurrent).
name: audit-gate

on:
  push:
    branches: [main]
    paths:
      - "tlbe/**"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: tlbe

jobs:
  audit-diff:
    name: audit diff
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        waves:
          - "wave1-exemplars"
          - "wave1-rb86-verbs"
          - "wave2-ramos1971"
          - "wave2-rc1990"
          - "wave2-rg-intermediate"
          - "wave3-rg-conversational"
          - "wave3-so1972"
          - "wave4-kroeger1991"
          - "wave5-zamar2023"
          - "unattributed-constructions"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: "tlbe/uv.lock"
      - name: Sync (locked)
        run: uv sync --locked
      - name: Audit diff (${{ matrix.waves }})
        run: uv run tgllfg audit diff --waves "${{ matrix.waves }}" --run --workers 1
