# Frontend (tlfe) CI. Mirrors tlbe's static/test split: the `static` job
# (eslint + prettier + tsc) runs on every push touching tlfe/ (all branches,
# incl main) for cheap early feedback; the `test` job (build + vitest) runs
# only on `main` (a merge), since the build/test pass is the local pre-commit
# gate during branch work and re-running it on every feature push is
# redundant for a solo repo. Concurrency cancels superseded runs per ref.
name: tlfe

on:
  push:
    paths:
      - "tlfe/**"
      - ".github/workflows/tlfe.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: tlfe

jobs:
  static:
    name: static (eslint + prettier + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tlfe/package-lock.json
      - name: Install (clean)
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Format check (prettier)
        run: npm run format:check
      - name: Typecheck (tsc -b)
        run: npm run typecheck

  test:
    name: test (build + vitest)
    # build + vitest run only on merge to main; locally they're the gate.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tlfe/package-lock.json
      - name: Install (clean)
        run: npm ci
      - name: Build (tsc -b + vite build)
        run: npm run build
      - name: Test (vitest run)
        run: npm test
