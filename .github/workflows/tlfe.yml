# Frontend (tlfe) CI. Runs on every push touching tlfe/ (all branches,
# incl main). Guarded behind a package.json check, so it's a no-op until
# the Phase 12.D scaffold. When the real scaffold lands in 12.D, split the
# cheap lint/typecheck (every push) from build + vitest (merge to main),
# mirroring tlbe's static/test split. Concurrency cancels superseded runs.
name: tlfe

on:
  push:
    paths:
      - "tlfe/**"
      - ".github/workflows/tlfe.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: tlfe

jobs:
  build:
    name: build (eslint + tsc + vite + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Detect scaffold
        id: scaffold
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tlfe scaffold not present yet (Phase 12.D) -- skipping build."
          fi
      - uses: actions/setup-node@v6
        if: steps.scaffold.outputs.present == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tlfe/package-lock.json
      - name: Install
        if: steps.scaffold.outputs.present == 'true'
        run: npm ci
      - name: Lint
        if: steps.scaffold.outputs.present == 'true'
        run: npm run lint --if-present
      - name: Typecheck
        if: steps.scaffold.outputs.present == 'true'
        run: npx --no-install tsc --noEmit
      - name: Build
        if: steps.scaffold.outputs.present == 'true'
        run: npm run build --if-present
      - name: Test
        if: steps.scaffold.outputs.present == 'true'
        run: npm test --if-present
