# Docs CI: markdownlint over tracked Markdown (repo-wide -- both trees +
# top level), same markdownlint-cli + .markdownlint.json as local. Runs on
# every push touching Markdown (all branches, incl main) -- linting is
# cheap. Concurrency cancels superseded runs on the same ref.
name: markdownlint

on:
  push:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdownlint.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint (tracked *.md)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint tracked Markdown
        run: git ls-files '*.md' | xargs markdownlint
